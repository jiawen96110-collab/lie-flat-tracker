<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>京城Z先生 · 3月推荐标的跟踪</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue}body{background:#fff;padding:24px;max-width:900px;margin:0 auto}h1{font-size:22px;margin-bottom:8px}.sub{font-size:14px;color:#666;margin-bottom:20px}table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:10px;text-align:left;border-bottom:1px solid #eee}th{background:#f7f7f7;color:#333}.up{color:#ff4444}.down{color:#00a854}.gray{color:#999}</style>
</head>
<body>
<h1>京城Z先生 · 3月历史推荐标的跟踪</h1>
<div class="sub">数据来源：腾讯财经 · 每30秒自动刷新 · 只读分享版</div>
<table><thead><tr><th>代码</th><th>名称</th><th>现价</th><th>当日涨跌幅</th><th>推荐以来收益</th><th>推荐日期</th></tr></thead><tbody id="list"></tbody></table>
<script>
const stocks=[{code:"601869",name:"长飞光纤",type:"sh",date:"2026-03-12"},{code:"MRVL",name:"迈威尔",type:"us",date:"2026-03-05"},{code:"600111",name:"北方稀土",type:"sh",date:"2026-03-08"},{code:"300782",name:"卓胜微",type:"sz",date:"2026-03-20"},{code:"300308",name:"中际旭创",type:"sz",date:"2026-03-15"},{code:"300502",name:"新易盛",type:"sz",date:"2026-03-22"},{code:"300394",name:"天孚通信",type:"sz",date:"2026-03-22"},{code:"NVDA",name:"英伟达",type:"us",date:"2026-03-01"},{code:"601899",name:"紫金矿业",type:"sh",date:"2026-03-25"},{code:"601012",name:"隆基绿能",type:"sh",date:"2026-03-23"}];
const INTERVAL=30*1000;function symbol(e){return"us"===e.type?"us"+e.code.toUpperCase():"sh"===e.type?"sh"+e.code:"sz"===e.type?"sz"+e.code:e.code}async function getPrice(e){try{const e=await fetch("https://qt.gtimg.cn/q="+e),t=await e.text(),a=t.split("~");return a.length<5?null:{price:Number(a[3]),pre:Number(a[4])}}catch{return null}}async function getBuyPrice(e,t){const a=e.replace(/us|sh|sz/g,""),s=e.startsWith("us")?"us":e.startsWith("sh")?"sh":"sz",i=t.replace(/-/g,"");try{const e=await fetch(`https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=${a},${s},day,${i},,,qfq`).then(e=>e.json()),t="us"===s?e.data[a]?.qfqday:e.data[a]?.day;return t?.length?Number(t[0][2]):null}catch{return null}}async function render(){const e=document.getElementById("list");e.innerHTML="";for(const t of stocks){const a=symbol(t),s=await getPrice(a);if(!s){e.innerHTML+=`<tr><td>${t.code}</td><td>${t.name}</td><td>-</td><td>-</td><td>-</td><td>${t.date}</td></tr>`;continue}const i=((s.price-s.pre)/s.pre*100).toFixed(2),n=await getBuyPrice(a,t.date),o=n?((s.price-n)/n*100).toFixed(2):null;e.innerHTML+=`<tr><td>${t.code}</td><td>${t.name}</td><td>${s.price.toFixed(2)}</td><td class="${i>=0?"up":"down"}">${i}%</td><td class="${o?o>=0?"up":"down":"gray"}">${o?o+"%":"-"}</td><td>${t.date}</td></tr>`}}render(),setInterval(render,INTERVAL);
</script>
</body>
</html>
