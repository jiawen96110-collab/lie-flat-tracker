body {

}

.header {

}

.header-inner {

.title-group h1 {

.status-bar {

}

#refreshBtn {

  border: none;
  background: var(--brand);
  color: #fff;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}

#refreshBtn:active {
  transform: scale(0.96);
  opacity: 0.9;
}

.tabbar {
  max-width: 720px;
  margin: 0 auto;
  padding: 8px 20px;
}

.tabs {
  display: flex;
  background: var(--flat-bg);
  border-radius: 12px;

}

.tab {

  padding: 8px 6px;
  border-radius: 10px;

  font-size: 13px;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.tab.active {
  background: var(--card);
  color: var(--text-primary);
  font-weight: 600;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 8px 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: var(--transition);
}

.section.hidden {

}

.card-header {

}

.card-left {

.badge {

.card-title {

.stat-up {

.stat-down {

.table-wrap {

}
table {

thead th {

thead th:first-child,
thead th:nth-child(2) {

tbody tr {
  border-bottom: 0.5px solid var(--border);
}
tbody tr:last-child {

}

td {
  padding: 14px 16px;
  font-size: 14px;
  text-align: right;

}

td:first-child,
td:nth-child(2) {

.weight {

.code {

  font-size: 14px;
  font-weight: 600;

  line-height: 1.1;

.name {

  margin-top: 2px;
}

.pct {
  display: inline-block;
  min-width: 72px;
  padding: 6px 8px;
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  line-height: 1;
}

.pct-up {
  color: var(--up);
  background: rgba(0, 180, 42, 0.08);
}
.pct-down {
  color: var(--down);
  background: rgba(247, 114, 114, 0.08);
}
.pct-flat {
  color: var(--text-secondary);
  background: var(--flat-bg);
}
.pct-loading {
  color: var(--text-tertiary);
  background: var(--flat-bg);
  font-size: 12px;
}

/* 自选板块专用样式 */
.add-stock-form {
  padding: 16px;
  background: var(--flat-bg);

  gap: 8px;

.stock-input {

.stock-input:focus {

.add-btn {

.delete-btn {

.watch-time {

.footer {

  padding: 12px 20px;
  text-align: center;
  font-size: 11px;
  color: var(--text-tertiary);
  line-height: 1.5;

<script>
// ==================== 配置常量 ====================
const CONFIG = {
  PROXY_URL: 'https://lieflat-proxy.jiawen96110.workers.dev',
  REFRESH_INTERVAL: 30000,
  TIME_UPDATE_INTERVAL: 1000

// 投资组合配置
const PORTFOLIOS = {

    ]
  },
  cn: {

      { weight: '25%', code: 'cn_588200', ticker: '588200', name: '科创芯片 ETF' },
      { weight: '15%', code: 'cn_515880', ticker: '515880', name: '通信 ETF' },
      { weight: '10%', code: 'cn_518880', ticker: '518880', name: '黄金 ETF' }
    ]
  }
};

const STATIC_DATA = {
  us_QQQ: { today: 0.68, ytd: -0.55, price: 456.23 },
  us_SPY: { today: 0.58, ytd: -0.02, price: 478.45 },
  us_RING: { today: 0.14, ytd: 14.83, price: 32.56 },
  us_COPX: { today: -0.57, ytd: 13.62, price: 41.23 },
  us_BITB: { today: 1.14, ytd: -17.41, price: 23.45 },
  hk_03455: { today: 1.21, ytd: -0.53, price: 38.45 },
  hk_03132: { today: 2.58, ytd: 25.08, price: 89.23 },
  hk_03147: { today: 4.99, ytd: 11.40, price: 12.34 },
  hk_03110: { today: 0.67, ytd: 9.10, price: 45.67 },
  hk_02840: { today: 0.85, ytd: 10.25, price: 1789.50 },
  cn_513390: { today: 1.01, ytd: -5.03, price: 1.234 },
  cn_159652: { today: -0.06, ytd: 8.54, price: 2.345 },
  cn_588200: { today: 2.42, ytd: 10.16, price: 0.987 },
  cn_515880: { today: 2.50, ytd: 19.77, price: 1.456 },
  cn_518880: { today: 0.90, ytd: 7.48, price: 4.567 }
};

const TENCENT_MAP = {
  us_QQQ: 'usQQQ',
  us_SPY: 'usSPY',
  us_RING: 'usRING',
  us_COPX: 'usCOPX',
  us_BITB: 'usBITB',
  hk_03455: 'hk03455',
  hk_03132: 'hk03132',
  hk_03147: 'hk03147',
  hk_03110: 'hk03110',
  hk_02840: 'hk02840',
  cn_513390: 'sh513390',
  cn_159652: 'sz159652',
  cn_588200: 'sh588200',
  cn_515880: 'sh515880',
  cn_518880: 'sh518880'
};

// ==================== 自选股管理 ====================
let watchlist = [];

// 加载自选股列表
function loadWatchlist() {
  const saved = localStorage.getItem('stock_watchlist');
  if (saved) {
    watchlist = JSON.parse(saved);
  }
  renderWatchlist();
}

// 保存自选股列表
function saveWatchlist() {
  localStorage.setItem('stock_watchlist', JSON.stringify(watchlist));
  document.getElementById('watchlist-count').textContent = watchlist.length;
}

// 获取股票实时数据（通过腾讯财经）
async function fetchStockRealtime(code, market) {
  let tencentCode = '';
  if (market === 'hk') {
    tencentCode = `hk${code}`;
  } else if (market === 'cn') {
    if (code.startsWith('6')) {
      tencentCode = `sh${code}`;
    } else {
      tencentCode = `sz${code}`;
    }
  } else if (market === 'us') {
    tencentCode = `us${code}`;
  }
  
  try {
    const url = `${CONFIG.PROXY_URL}?q=${tencentCode}`;
    const response = await fetch(url);
    const text = await response.text();
    const regex = new RegExp(`v_${tencentCode}="([^"]+)"`);
    const match = text.match(regex);
    
    if (match) {
      const fields = match[1].split('~');
      const price = parseFloat(fields[3]); // 最新价
      const change = parseFloat(fields[32]); // 涨跌幅
      const name = fields[1]; // 名称
      
      return { price, change, name, success: true };
    }
  } catch (error) {
    console.warn(`获取${code}数据失败:`, error);
  }
  return { success: false };
}

// 添加自选股
async function addStock() {
  const input = document.getElementById('stockCodeInput');
  let code = input.value.trim().toUpperCase();
  
  if (!code) {
    alert('请输入股票代码');
    return;
  }
  
  // 判断市场
  let market = '';
  if (/^\d{5}$/.test(code)) {
    market = 'hk';
  } else if (/^\d{6}$/.test(code)) {
    market = 'cn';
  } else if (/^[A-Z]{1,5}$/.test(code)) {
    market = 'us';
  } else {
    alert('请输入正确的股票代码格式：\n港股：5位数字\nA股：6位数字\n美股：字母代码');
    return;
  }
  
  // 检查是否已存在
  if (watchlist.some(item => item.code === code && item.market === market)) {
    alert('该股票已在自选列表中');
    return;
  }
  
  // 获取实时数据
  const stockData = await fetchStockRealtime(code, market);
  
  if (!stockData.success) {
    alert('获取股票信息失败，请检查代码是否正确');
    return;
  }
  
  // 添加到自选列表
  const newStock = {
    id: Date.now(),
    code: code,
    market: market,
    name: stockData.name,
    costPrice: stockData.price, // 添加时的价格作为成本价
    addTime: new Date().toLocaleString(),
    timestamp: Date.now()
  };
  
  watchlist.unshift(newStock);
  saveWatchlist();
  renderWatchlist();
  input.value = '';
}

// 删除自选股
function deleteStock(id) {
  if (confirm('确定要删除该自选股吗？')) {
    watchlist = watchlist.filter(item => item.id !== id);
    saveWatchlist();
    renderWatchlist();
  }
}

// 计算累计收益
function calculateProfit(costPrice, currentPrice) {
  if (!costPrice || !currentPrice) return null;
  return ((currentPrice - costPrice) / costPrice) * 100;
}

// 渲染自选列表
async function renderWatchlist() {
  const tbody = document.getElementById('watchlist-tbody');
  if (!tbody) return;
  
  if (watchlist.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px;">暂无自选股，请在上方添加</td></tr>';
    return;
  }
  
  // 获取所有自选股的实时数据
  const promises = watchlist.map(async (stock) => {
    const data = await fetchStockRealtime(stock.code, stock.market);
    return { ...stock, realtime: data };
  });
  
  const stocksWithData = await Promise.all(promises);
  
  let html = '';
  for (const stock of stocksWithData) {
    const realtime = stock.realtime;
    const profit = realtime.success ? calculateProfit(stock.costPrice, realtime.price) : null;
    
    const changeClass = realtime.change > 0 ? 'pct-up' : realtime.change < 0 ? 'pct-down' : 'pct-flat';
    const changeSign = realtime.change > 0 ? '+' : '';
    const profitClass = profit > 0 ? 'pct-up' : profit < 0 ? 'pct-down' : 'pct-flat';
    const profitSign = profit > 0 ? '+' : '';
    
    html += `
      <tr>
        <td><div class="code">${stock.code}</div></td>
        <td><div class="name">${realtime.success ? realtime.name : stock.name || '获取中...'}</div></td>
        <td class="stat-value">${realtime.success ? realtime.price.toFixed(2) : '--'}</td>
        <td>${realtime.success ? `<span class="${changeClass}">${changeSign}${realtime.change.toFixed(2)}%</span>` : '<span class="pct-loading">--</span>'}</td>
        <td>${realtime.success ? `<span class="${profitClass}">${profitSign}${profit.toFixed(2)}%</span>` : '<span class="pct-loading">--</span>'}</td>
        <td><div class="watch-time">${stock.addTime}</div></td>
        <td><button class="delete-btn" onclick="deleteStock(${stock.id})">删除</button></td>
      </tr>
    `;
  }
  
  tbody.innerHTML = html;
  document.getElementById('watchlist-count').textContent = watchlist.length;
}

// ==================== 原有功能 ====================
let liveData = {};
let isFetching = false;
let refreshTimer = null;
let timeUpdateTimer = null;

const formatPercentTag = (value) => {
  if (value === undefined || value === null || isNaN(value)) {
    return '<span class="pct-loading">--</span>';
  }
  const cls = value > 0 ? 'pct-up' : value < 0 ? 'pct-down' : 'pct-flat';
  const sign = value > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${value.toFixed(2)}%</span>`;
};

const formatStatTag = (value) => {
  if (value === undefined || value === null || isNaN(value)) return '--';
  const cls = value > 0 ? 'stat-up' : value < 0 ? 'stat-down' : '';
  const sign = value > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${value.toFixed(2)}%</span>`;
};

const updateTimeDisplay = () => {
  const now = new Date();
  const timeStr = now.toTimeString().slice(0, 8);
  const timeElement = document.getElementById('last-update');
  if (timeElement) timeElement.textContent = timeStr;
};

const calculatePortfolioStats = (holdings) => {
  let sumToday = 0, sumYtd = 0;
  holdings.forEach(item => {
    const weight = parseFloat(item.weight) / 100;
    const data = liveData[item.code] || STATIC_DATA[item.code] || {};
    if (!isNaN(data.today)) sumToday += weight * data.today;
    if (!isNaN(data.ytd)) sumYtd += weight * data.ytd;
  });
  return { today: sumToday, ytd: sumYtd };
};

const renderPortfolio = (key) => {
  const portfolio = PORTFOLIOS[key];
  if (!portfolio) return;
  const tbody = document.getElementById(`${key}-tbody`);
  if (!tbody) return;
  
  const stats = calculatePortfolioStats(portfolio.holdings);
  const todayElement = document.getElementById(`${key}-today`);
  const ytdElement = document.getElementById(`${key}-ytd`);
  if (todayElement) todayElement.innerHTML = formatStatTag(stats.today);
  if (ytdElement) ytdElement.innerHTML = formatStatTag(stats.ytd);
  
  const html = portfolio.holdings.map(item => {
    const data = liveData[item.code] || STATIC_DATA[item.code] || {};
    return `
      <tr>
        <td><div class="weight">${item.weight}</div></td>
        <td>
          <div class="code">${item.ticker}</div>
          <div class="name">${item.name}</div>
        </td>
        <td>${formatPercentTag(data.today)}</td>
        <td>${formatPercentTag(data.ytd)}</td>
      </tr>
    `;
  }).join('');
  tbody.innerHTML = html;
};

const renderAllPortfolios = () => {
  renderPortfolio('us');
  renderPortfolio('hk');
  renderPortfolio('cn');
};

const mergeLiveData = (newData) => {
  Object.keys(newData).forEach(code => {
    if (liveData[code]) {
      if (!isNaN(newData[code].today)) liveData[code].today = newData[code].today;
      if (!isNaN(newData[code].ytd)) liveData[code].ytd = newData[code].ytd;
    }
  });
};

const parseTencentResponse = (text) => {
  const result = {};
  const reverseMap = {};
  Object.entries(TENCENT_MAP).forEach(([code, symbol]) => {
    reverseMap[symbol] = code;
  });
  
  const regex = /v_([a-zA-Z0-9]+)="([^"]+)"/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    const symbol = match[1];
    const fields = match[2].split('~');
    const code = reverseMap[symbol];
    if (code && fields[32]) {
      const price = parseFloat(fields[32]);
      if (!isNaN(price)) {
        if (!result[code]) result[code] = {};
        result[code].today = price;
      }
    }
  }
  return result;
};

const fetchMarketData = async () => {
  if (isFetching) return null;
  isFetching = true;
  try {
    const symbols = Object.values(TENCENT_MAP).join(',');
    const url = `${CONFIG.PROXY_URL}?q=${symbols}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    const liveMarketData = parseTencentResponse(text);
    if (Object.keys(liveMarketData).length > 0) {
      mergeLiveData(liveMarketData);
      renderAllPortfolios();
      updateTimeDisplay();
    }
    return liveMarketData;
  } catch (error) {
    console.warn('数据获取失败，使用缓存数据:', error.message);
    return null;
  } finally {
    isFetching = false;
  }
};

// 同时刷新自选股数据
const refreshAllData = async () => {
  await fetchMarketData();
  await renderWatchlist();
  updateTimeDisplay();
};

const initLiveData = () => {
  const data = {};
  Object.keys(STATIC_DATA).forEach(key => {
    data[key] = { ...STATIC_DATA[key] };
  });
  return data;
};

const initTabs = () => {
  const tabs = document.querySelectorAll('.tab');
  const sections = document.querySelectorAll('.section');
  const switchTab = (target) => {
    sections.forEach(section => {
      const shouldHide = target !== 'all' && section.dataset.section !== target;
      section.classList.toggle('hidden', shouldHide);
    });
  };
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.target;
      switchTab(target);
    });
  });
};

const initRefreshButton = () => {
  const btn = document.getElementById('refreshBtn');
  if (btn) {
    btn.addEventListener('click', async () => {
      btn.disabled = true;
      btn.textContent = '刷新中...';
      await refreshAllData();
      btn.disabled = false;
      btn.textContent = '刷新';
    });
  }
};

const startTimers = () => {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(refreshAllData, CONFIG.REFRESH_INTERVAL);
  if (timeUpdateTimer) clearInterval(timeUpdateTimer);
  timeUpdateTimer = setInterval(updateTimeDisplay, CONFIG.TIME_UPDATE_INTERVAL);
};

const stopTimers = () => {
  if (refreshTimer) clearInterval(refreshTimer);
  if (timeUpdateTimer) clearInterval(timeUpdateTimer);
};

// ==================== 初始化 ====================
const init = () => {
  liveData = initLiveData();
  renderAllPortfolios();
  updateTimeDisplay();
  initTabs();
  initRefreshButton();
  loadWatchlist();
  startTimers();
  refreshAllData();
  
  // 绑定添加按钮
  document.getElementById('addStockBtn').addEventListener('click', addStock);
  document.getElementById('stockCodeInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') addStock();
  });
};

window.addEventListener('beforeunload', () => {
  stopTimers();
});

init();
</script>

</body>
</html>
