<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>躺平组合 · 京城Z先生</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f2f7;
  --card:#fff;
  --t1:#1c1c1e;--t2:#3a3a3c;--t3:#636366;--t4:#aeaeb2;
  --sep:rgba(60,60,67,.10);--border:rgba(60,60,67,.14);
  --fill:rgba(118,118,128,.12);
  --green:#34c759;--gbg:rgba(52,199,89,.11);
  --red:#ff3b30;--rbg:rgba(255,59,48,.11);
  --blue:#007aff;--bbg:rgba(0,122,255,.09);
  --gold:#ff9f0a;--gdbg:rgba(255,159,10,.10);
  --purple:#af52de;
  --font:-apple-system,'SF Pro Display','SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
  --mono:'SF Mono','Menlo','Monaco',monospace;
}

body{font-family:var(–font);background:var(–bg);color:var(–t1);min-height:100vh;padding-bottom:48px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

/* ── NAV ── */
.nav{
position:sticky;top:0;z-index:100;
background:rgba(242,242,247,.88);
backdrop-filter:saturate(200%) blur(24px);
-webkit-backdrop-filter:saturate(200%) blur(24px);
border-bottom:.5px solid var(–border);
}
.nav-inner{max-width:720px;margin:0 auto;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.nav-brand h1{font-size:17px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.nav-brand .sub{font-size:11px;color:var(–t3);margin-top:2px;letter-spacing:.1px}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* live clock */
.clock-wrap{display:flex;align-items:center;gap:6px;background:var(–card);border:.5px solid var(–border);padding:5px 10px;border-radius:20px;font-size:11.5px;font-weight:500;color:var(–t2);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(–green);flex-shrink:0;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.clock{font-family:var(–mono);font-size:11.5px;font-weight:600;color:var(–t1);min-width:52px}

/* refresh btn */
.refresh-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:none;background:var(–fill);color:var(–t2);cursor:pointer;font-size:14px;transition:background .15s,transform .25s;flex-shrink:0}
.refresh-btn:hover{background:var(–bbg);color:var(–blue)}
.refresh-btn:active{transform:rotate(180deg)}
.refresh-btn.spinning{animation:spin .6s linear}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SEGMENT ── */
.seg-wrap{max-width:720px;margin:0 auto;padding:8px 16px}
.segment{display:flex;background:var(–fill);border-radius:10px;padding:2px;gap:2px}
.seg{flex:1;padding:7px 2px;border:none;background:transparent;border-radius:8px;font-size:12px;font-weight:500;font-family:var(–font);color:var(–t3);cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:3px;letter-spacing:-.1px}
.seg.on{background:var(–card);color:var(–t1);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.10),0 0 0 .5px rgba(0,0,0,.04)}

/* ── WRAP ── */
.wrap{max-width:720px;margin:0 auto;padding:10px 16px 0;display:flex;flex-direction:column;gap:12px}

/* ── SUMMARY ROW ── */
.sum-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sum-card{
background:var(–card);border-radius:14px;padding:13px 14px;
box-shadow:0 1px 3px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04);
position:relative;overflow:hidden;
}
/* colored accent strip per market */
.sum-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.sum-card.us::before{background:linear-gradient(90deg,#007aff,#5ac8fa)}
.sum-card.hk::before{background:linear-gradient(90deg,#34c759,#30d158)}
.sum-card.cn::before{background:linear-gradient(90deg,#ff3b30,#ff6961)}
.sum-mkt{font-size:11px;color:var(–t3);margin-bottom:5px;display:flex;align-items:center;gap:4px;margin-top:2px}
.sum-today{font-family:var(–mono);font-size:18px;font-weight:700;letter-spacing:-.5px;line-height:1;min-height:22px}
.sum-ytd-row{display:flex;align-items:center;gap:4px;margin-top:4px}
.sum-ytd-lbl{font-size:10px;color:var(–t4)}
.sum-ytd-val{font-family:var(–mono);font-size:11px;font-weight:600}

/* ── SECTION CARD ── */
.sc{
background:var(–card);border-radius:16px;overflow:hidden;
box-shadow:0 1px 3px rgba(0,0,0,.05),0 2px 10px rgba(0,0,0,.05);
animation:fadeUp .38s cubic-bezier(.22,1,.36,1) both;
}
.sc:nth-child(1){animation-delay:.04s}.sc:nth-child(2){animation-delay:.09s}
.sc:nth-child(3){animation-delay:.14s}.sc:nth-child(4){animation-delay:.18s}.sc:nth-child(5){animation-delay:.22s}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.sc.hide{display:none}

/* section header with gradient bg */
.sc-hd{
padding:14px 16px 12px;
display:flex;align-items:center;justify-content:space-between;
border-bottom:.5px solid var(–sep);
}
.sc-hd.us-hd{background:linear-gradient(135deg,rgba(0,122,255,.06) 0%,rgba(90,200,250,.04) 100%)}
.sc-hd.hk-hd{background:linear-gradient(135deg,rgba(52,199,89,.06) 0%,rgba(48,209,88,.03) 100%)}
.sc-hd.cn-hd{background:linear-gradient(135deg,rgba(255,59,48,.06) 0%,rgba(255,105,97,.03) 100%)}
.sc-hd.watch-hd{background:linear-gradient(135deg,rgba(255,159,10,.07) 0%,rgba(175,82,222,.05) 100%)}

.sc-hd-l{display:flex;align-items:center;gap:7px}
.mkt{font-family:var(–mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;letter-spacing:.3px}
.m-us{background:rgba(0,122,255,.13);color:#0062cc}
.m-hk{background:rgba(52,199,89,.13);color:#1a8a3a}
.m-cn{background:rgba(255,59,48,.13);color:#c0281e}
.m-watch{background:rgba(255,159,10,.15);color:#c47a00}
.sc-title{font-size:15px;font-weight:600;letter-spacing:-.3px}
.sc-tag{font-size:9px;background:var(–fill);color:var(–t3);padding:2px 6px;border-radius:4px;font-weight:600;letter-spacing:.2px}
.sc-hd-r{text-align:right}
.hd-row{display:flex;align-items:center;justify-content:flex-end;gap:4px;font-size:11px;color:var(–t3);line-height:1.9}
.hd-lbl{font-size:10px}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
thead th{font-size:10.5px;font-weight:500;color:var(–t4);padding:7px 16px 5px;text-align:right;border-bottom:.5px solid var(–sep);letter-spacing:.2px}
thead th:first-child,thead th:nth-child(2){text-align:left}
tbody tr{border-bottom:.5px solid var(–sep)}
tbody tr:last-child{border-bottom:none}
@media(hover:hover){tbody tr:hover{background:rgba(0,0,0,.016)}}
td{padding:12px 16px;font-size:14px;text-align:right;vertical-align:top}
td:first-child,td:nth-child(2){text-align:left}
.wt{font-family:var(–mono);font-size:11px;color:var(–t4);font-weight:500}
.tk{font-family:var(–mono);font-size:13px;font-weight:700;color:var(–blue);display:block;line-height:1.2}
.nm{font-size:12px;color:var(–t2);display:block;margin-top:2px;line-height:1.3}
.wm{font-size:10px;color:var(–t4);font-family:var(–mono);display:block;margin-top:2px}

/* ── PCT PILL ── */
.p{font-family:var(–mono);font-size:13px;font-weight:600;padding:4px 8px;border-radius:7px;display:inline-block;min-width:68px;text-align:center;letter-spacing:-.2px}
.p.g{color:var(–green);background:var(–gbg)}
.p.r{color:var(–red);background:var(–rbg)}
.p.z{color:var(–t3);background:var(–fill)}
.p.ld{color:var(–t4);background:var(–fill);font-size:11px}
.pi{font-family:var(–mono);font-weight:700}
.pi.g{color:var(–green)}.pi.r{color:var(–red)}.pi.z{color:var(–t3)}

/* ── WATCHLIST ── */
.watch-banner{
background:linear-gradient(135deg,rgba(255,159,10,.08),rgba(175,82,222,.07));
border-bottom:.5px solid var(–sep);
padding:10px 16px;
display:flex;align-items:center;gap:10px;
}
.wb-icon{font-size:20px;flex-shrink:0}
.wb-text{font-size:12px;color:var(–t2);line-height:1.5}
.wb-text strong{color:var(–t1);font-weight:600}

.sector-tag{
display:inline-block;font-size:10px;font-weight:600;
padding:2px 7px;border-radius:4px;margin-bottom:4px;
background:var(–gdbg);color:#c47a00;
}
.note-wrap{font-size:11px;color:var(–t3);line-height:1.5;max-width:200px;display:block}
.since-big{font-family:var(–mono);font-size:16px;font-weight:700;display:block;line-height:1.2;letter-spacing:-.3px}
.since-sub{font-size:10px;color:var(–t4);display:block;margin-top:2px;font-family:var(–mono)}

/* ── FOOTER ── */
.footer{text-align:center;font-size:11px;color:var(–t4);line-height:1.8;padding:16px 16px 0}

@media(max-width:390px){
.p{min-width:58px;font-size:12px}
td{padding:10px 12px}
.sum-today{font-size:15px}
.sum-row{gap:6px}
}
</style>

</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <h1>躺平组合</h1>
      <span class="sub">跟踪 · 京城Z先生</span>
    </div>
    <div class="nav-right">
      <button class="refresh-btn" id="refreshBtn" title="手动刷新" onclick="manualRefresh()">↻</button>
      <div class="clock-wrap">
        <div class="live-dot"></div>
        <span class="clock" id="clock">--:--:--</span>
      </div>
    </div>
  </div>
  <div class="seg-wrap">
    <div class="segment">
      <button class="seg on" data-tab="all">全部</button>
      <button class="seg" data-tab="us">🇺🇸 美股</button>
      <button class="seg" data-tab="hk">🇭🇰 港股</button>
      <button class="seg" data-tab="cn">🇨🇳 A股</button>
      <button class="seg" data-tab="watch">⭐ 自选</button>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- 概览 -->

  <div class="sum-row" id="sum-row">
    <div class="sum-card us">
      <div class="sum-mkt">🇺🇸 美股</div>
      <div class="sum-today" id="s-us-t">--</div>
      <div class="sum-ytd-row"><span class="sum-ytd-lbl">YTD</span><span class="sum-ytd-val" id="s-us-y">--</span></div>
    </div>
    <div class="sum-card hk">
      <div class="sum-mkt">🇭🇰 港股</div>
      <div class="sum-today" id="s-hk-t">--</div>
      <div class="sum-ytd-row"><span class="sum-ytd-lbl">YTD</span><span class="sum-ytd-val" id="s-hk-y">--</span></div>
    </div>
    <div class="sum-card cn">
      <div class="sum-mkt">🇨🇳 A股</div>
      <div class="sum-today" id="s-cn-t">--</div>
      <div class="sum-ytd-row"><span class="sum-ytd-lbl">YTD</span><span class="sum-ytd-val" id="s-cn-y">--</span></div>
    </div>
  </div>

  <!-- US -->

  <div class="sc" data-sec="us">
    <div class="sc-hd us-hd">
      <div class="sc-hd-l">
        <span class="mkt m-us">US</span>
        <span class="sc-title">美股躺平组合</span>
        <span class="sc-tag">被动</span>
      </div>
      <div class="sc-hd-r">
        <div class="hd-row"><span class="hd-lbl">今日</span><span id="us-t">--</span></div>
        <div class="hd-row"><span class="hd-lbl">YTD</span><span id="us-y">--</span></div>
      </div>
    </div>
    <table>
      <thead><tr><th>仓位</th><th>标的</th><th>今日</th><th>YTD</th></tr></thead>
      <tbody id="us-body"></tbody>
    </table>
  </div>

  <!-- HK -->

  <div class="sc" data-sec="hk">
    <div class="sc-hd hk-hd">
      <div class="sc-hd-l">
        <span class="mkt m-hk">HK</span>
        <span class="sc-title">港股躺平组合</span>
        <span class="sc-tag">被动</span>
      </div>
      <div class="sc-hd-r">
        <div class="hd-row"><span class="hd-lbl">今日</span><span id="hk-t">--</span></div>
        <div class="hd-row"><span class="hd-lbl">YTD</span><span id="hk-y">--</span></div>
      </div>
    </div>
    <table>
      <thead><tr><th>仓位</th><th>标的</th><th>今日</th><th>YTD</th></tr></thead>
      <tbody id="hk-body"></tbody>
    </table>
  </div>

  <!-- CN -->

  <div class="sc" data-sec="cn">
    <div class="sc-hd cn-hd">
      <div class="sc-hd-l">
        <span class="mkt m-cn">CN</span>
        <span class="sc-title">A股躺平组合</span>
        <span class="sc-tag">被动</span>
      </div>
      <div class="sc-hd-r">
        <div class="hd-row"><span class="hd-lbl">今日</span><span id="cn-t">--</span></div>
        <div class="hd-row"><span class="hd-lbl">YTD</span><span id="cn-y">--</span></div>
      </div>
    </div>
    <table>
      <thead><tr><th>仓位</th><th>标的</th><th>今日</th><th>YTD</th></tr></thead>
      <tbody id="cn-body"></tbody>
    </table>
  </div>

  <!-- WATCHLIST -->

  <div class="sc" data-sec="watch">
    <div class="sc-hd watch-hd">
      <div class="sc-hd-l">
        <span class="mkt m-watch">⭐</span>
        <span class="sc-title">Z先生自选追踪</span>
      </div>
    </div>
    <div class="watch-banner">
      <span class="wb-icon">📡</span>
      <span class="wb-text">实时跟踪 Z 先生推荐标的 · <strong>推荐以来</strong>从推荐日收盘价起算</span>
    </div>
    <table>
      <thead><tr><th>标的</th><th>行业 / 逻辑</th><th>今日</th><th>推荐以来</th></tr></thead>
      <tbody id="watch-body"></tbody>
    </table>
  </div>

  <div class="footer">
    数据来源：腾讯财经 · 每30秒自动拉取 · 仅供参考，不构成投资建议
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// 躺平 ETF 组合（固定，跟随Z先生躺平策略）
// ═══════════════════════════════════════════════════════
const ETF = {
  us:{h:[
    {w:'25%',c:'us_QQQ',t:'QQQ',n:'纳指100 ETF'},
    {w:'25%',c:'us_SPY',t:'SPY',n:'标普500 ETF'},
    {w:'20%',c:'us_RING',t:'RING',n:'黄金矿股 ETF'},
    {w:'20%',c:'us_COPX',t:'COPX',n:'全球铜矿 ETF'},
    {w:'10%',c:'us_BITB',t:'BITB',n:'比特币 ETF'},
  ]},
  hk:{h:[
    {w:'25%',c:'hk_03455',t:'03455',n:'纳指100 ETF'},
    {w:'20%',c:'hk_03132',t:'03132',n:'全球半导体 ETF'},
    {w:'20%',c:'hk_03147',t:'03147',n:'中国创业板 ETF'},
    {w:'20%',c:'hk_03110',t:'03110',n:'恒生高股息 ETF'},
    {w:'15%',c:'hk_02840',t:'02840',n:'黄金 ETF'},
  ]},
  cn:{h:[
    {w:'25%',c:'cn_513390',t:'513390',n:'纳指100 ETF'},
    {w:'25%',c:'cn_159652',t:'159652',n:'有色50 ETF'},
    {w:'25%',c:'cn_588200',t:'588200',n:'科创芯片 ETF'},
    {w:'15%',c:'cn_515880',t:'515880',n:'通信 ETF'},
    {w:'10%',c:'cn_518880',t:'518880',n:'黄金 ETF'},
  ]}
};

// ═══════════════════════════════════════════════════════
// ⭐ Z先生推荐自选追踪
// 新增标的：告诉我代码+推荐日期，我查收盘价写进来
// ═══════════════════════════════════════════════════════
const WATCH = [
  {
    ticker:  '300782',
    name:    '卓胜微',
    sym:     'sz300782',
    date:    '2026-03-26',
    price:   87.00,           // 推荐日收盘价
    sector:  '射频芯片',
    note:    '国内射频前端芯片龙头，射频开关/LNA/PA/滤波器全系覆盖，安卓手机国产替代核心标的'
  },
  // ── 下次添加在这里，格式同上 ──
];

// ═══════════════════════════════════════════════════════
// YTD 静态兜底（今日涨跌从API实时取，API失败才用下面的）
// ═══════════════════════════════════════════════════════
const YTD_DATA = {
  us_QQQ:-0.55,us_SPY:-0.02,us_RING:+14.83,us_COPX:+13.62,us_BITB:-17.41,
  hk_03455:-0.53,hk_03132:+25.08,hk_03147:+11.40,hk_03110:+9.10,hk_02840:+10.25,
  cn_513390:-5.03,cn_159652:+8.54,cn_588200:+10.16,cn_515880:+19.77,cn_518880:+7.48,
};

// 腾讯API symbol映射
const TMAP = {
  us_QQQ:'usQQQ',us_SPY:'usSPY',us_RING:'usRING',us_COPX:'usCOPX',us_BITB:'usBITB',
  hk_03455:'hk03455',hk_03132:'hk03132',hk_03147:'hk03147',hk_03110:'hk03110',hk_02840:'hk02840',
  cn_513390:'sh513390',cn_159652:'sz159652',cn_588200:'sh588200',cn_515880:'sh515880',cn_518880:'sh518880',
};

const PROXY = 'https://lieflat-proxy.jiawen96110.workers.dev';
const live = {};
let apiOK = false;

// ─── 渲染工具 ──────────────────────────────────────────
function pill(v) {
  if (v===null||v===undefined||isNaN(v)) return '<span class="p ld">--</span>';
  const c=v>0?'g':v<0?'r':'z', s=v>0?'+':'';
  return `<span class="p ${c}">${s}${v.toFixed(2)}%</span>`;
}
function inl(v, fs='12px') {
  if (v===null||v===undefined||isNaN(v)) return `<span style="color:var(--t4);font-family:var(--mono);font-size:${fs};font-weight:600">--</span>`;
  const c=v>0?'g':v<0?'r':'z', s=v>0?'+':'';
  return `<span class="pi ${c}" style="font-size:${fs}">${s}${v.toFixed(2)}%</span>`;
}

// ─── 渲染 ETF 组合 ─────────────────────────────────────
function renderETF(key) {
  const g=ETF[key], tbody=document.getElementById(`${key}-body`);
  let tw=0, yw=0, rows='';
  for (const h of g.h) {
    // 今日：只用实时数据，API未响应前显示 "--"
    const today = apiOK ? (live[h.c]?.today ?? null) : null;
    const ytd   = YTD_DATA[h.c] ?? null;
    const w = parseFloat(h.w)/100;
    if (today!==null&&!isNaN(today)) tw += w*today;
    if (ytd!==null) yw += w*ytd;
    rows += `<tr>
      <td class="wt">${h.w}</td>
      <td><span class="tk">${h.t}</span><span class="nm">${h.n}</span></td>
      <td>${pill(today)}</td>
      <td>${pill(ytd)}</td>
    </tr>`;
  }
  tbody.innerHTML = rows;
  const todayDisp = apiOK ? tw : null;
  document.getElementById(`${key}-t`).innerHTML = inl(todayDisp,'12px');
  document.getElementById(`${key}-y`).innerHTML = inl(yw,'12px');
  // 概览卡片
  const st=document.getElementById(`s-${key}-t`), sy=document.getElementById(`s-${key}-y`);
  if(st) st.innerHTML = inl(todayDisp,'17px');
  if(sy) sy.innerHTML = inl(yw,'11px');
}

// ─── 渲染自选 ──────────────────────────────────────────
function renderWatch() {
  const tbody=document.getElementById('watch-body');
  if (!WATCH.length) {
    tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--t4);font-size:13px">暂无追踪标的</td></tr>';
    return;
  }
  let rows='';
  for (let i=0;i<WATCH.length;i++) {
    const w=WATCH[i], d=live[`w${i}`]||{};
    let sinceHtml;
    if (w.price && d.price>0) {
      const pct=(d.price-w.price)/w.price*100;
      const cls=pct>0?'g':pct<0?'r':'z', s=pct>0?'+':'';
      sinceHtml=`<span class="since-big pi ${cls}">${s}${pct.toFixed(2)}%</span>
        <span class="since-sub">参考价 ¥${w.price.toFixed(2)} → ¥${d.price.toFixed(2)}</span>
        <span class="since-sub">自 ${w.date}</span>`;
    } else {
      sinceHtml=`<span class="since-big" style="color:var(--t4)">--%</span>
        <span class="since-sub">自 ${w.date}</span>`;
    }
    rows+=`<tr>
      <td>
        <span class="tk">${w.ticker}</span>
        <span class="nm">${w.name}</span>
      </td>
      <td>
        <span class="sector-tag">${w.sector}</span>
        <span class="note-wrap">${w.note}</span>
      </td>
      <td>${pill(d.today)}</td>
      <td>${sinceHtml}</td>
    </tr>`;
  }
  tbody.innerHTML=rows;
}

// ─── Tab 切换 ──────────────────────────────────────────
document.querySelectorAll('.seg').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.seg').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    const t=btn.dataset.tab;
    document.getElementById('sum-row').style.display=t==='all'?'':'none';
    document.querySelectorAll('.sc').forEach(c=>{
      c.classList.toggle('hide',t!=='all'&&c.dataset.sec!==t);
    });
  });
});

// ─── 时钟（每秒更新）─────────────────────────────────
function tickClock(){
  document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8);
}
tickClock();
setInterval(tickClock,1000);

// ─── 手动刷新 ─────────────────────────────────────────
function manualRefresh(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  fetchAll().finally(()=>{
    setTimeout(()=>btn.classList.remove('spinning'),600);
  });
}

// ─── 数据拉取 ─────────────────────────────────────────
async function fetchAll(){
  const symMap={};
  for(const[k,s]of Object.entries(TMAP)) symMap[s]=k;
  WATCH.forEach((w,i)=>{symMap[w.sym]=`w${i}`;});
  const ql=Object.keys(symMap).join(',');
  try{
    const raw=await(await fetch(`${PROXY}?q=${ql}`)).text();
    const re=/v_([a-zA-Z0-9]+)="([^"]+)"/g; let m;
    while((m=re.exec(raw))!==null){
      const sym=m[1],f=m[2].split('~'),key=symMap[sym];
      if(!key) continue;
      if(!live[key]) live[key]={};
      const pct=parseFloat(f[32]),pr=parseFloat(f[3]);
      if(!isNaN(pct)) live[key].today=pct;
      if(!isNaN(pr))  live[key].price=pr;
      apiOK=true;
    }
  } catch(e){}
  renderAll();
}

function renderAll(){
  renderETF('us');renderETF('hk');renderETF('cn');renderWatch();
}

// ─── 初始化 ───────────────────────────────────────────
renderAll();       // 先渲染YTD，今日显示--
fetchAll();        // 拉实时数据
setInterval(fetchAll,30000);
</script>
