<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>躺平组合 · 京城Z先生无偿分享</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f8f9fa;--card:#ffffff;
  --t1:#1d1d1f;--t2:#3a3a3c;--t3:#666;--t4:#8e8e93;
  --sep:rgba(60,60,67,.08);--border:rgba(60,60,67,.12);--fill:rgba(118,118,128,.09);
  --red:#ff2d55;--green:#00b050;--blue:#0071e3;--gold:#ff9500;
  --font:-apple-system,'SF Pro Display','SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
  --mono:'SF Mono','Menlo','Monaco',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;padding-bottom:60px;-webkit-font-smoothing:antialiased}

.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:760px;margin:0 auto;padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.nav-brand h1{font-size:22px;font-weight:700;letter-spacing:-0.8px}
.nav-brand .sub{font-size:13px;color:var(--t3);margin-top:2px}
.nav-right{display:flex;align-items:center;gap:12px}
.clock-wrap{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);padding:6px 16px;border-radius:9999px;font-size:13.5px;font-weight:500;color:var(--t2);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.live-dot{width:8px;height:8px;border-radius:50%;background:#34c759;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.clock{font-family:var(--mono);font-weight:600;letter-spacing:0.5px;min-width:158px}
.refresh-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--fill);color:var(--t2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
.refresh-btn:hover{background:#e5e5ea;color:var(--blue)}
.refresh-btn.spinning{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.seg-wrap{max-width:760px;margin:0 auto;padding:12px 20px}
.segment{display:flex;background:var(--fill);border-radius:9999px;padding:4px}
.seg{flex:1;padding:10px 16px;border:none;background:transparent;border-radius:9999px;font-size:14.5px;font-weight:600;color:var(--t3);cursor:pointer}
.seg.on{background:var(--card);color:var(--t1);box-shadow:0 2px 8px rgba(0,0,0,.08)}

.wrap{max-width:760px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:24px}

/* 高级卡片 */
.sc{background:var(--card);border-radius:24px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.04);border:1px solid var(--border)}
.sc-hd{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sep)}
.sc-title{font-size:18px;font-weight:700;letter-spacing:-0.4px}
.mkt{font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 12px;border-radius:9999px}

/* 自选区 - 长桥+苹果高级风 */
.watch-hd{background:linear-gradient(90deg,#0071e3,#00b050)}
.watch-banner{background:linear-gradient(90deg,rgba(0,113,227,.06),rgba(0,176,80,.06));padding:16px 24px;font-size:14px;color:var(--t2)}
.watch-item{padding:22px 24px;border-bottom:1px solid var(--sep);display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center}
.watch-item:last-child{border-bottom:none}
.watch-ticker{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--blue)}
.watch-name{font-size:15px;color:var(--t2);font-weight:500}
.sector-tag{font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:9999px;background:rgba(255,149,0,.12);color:#c47a00}
.logic-tag{font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:9999px;background:rgba(0,113,227,.1);color:#0066cc;margin-left:4px}
.watch-note{font-size:13.5px;color:var(--t3);line-height:1.6;margin-top:8px}
.watch-meta{font-size:13.5px;margin-top:10px}
.watch-right{text-align:right}
.since-pct{font-family:var(--mono);font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1}
.since-date{font-size:12.5px;color:var(--t4);margin-top:6px}

/* 涨跌样式 */
.p{font-family:var(--mono);font-size:14px;font-weight:700;padding:6px 12px;border-radius:9999px;min-width:74px;text-align:center}
.p.up{color:var(--red);background:rgba(255,45,85,.1)}
.p.dn{color:var(--green);background:rgba(0,176,80,.1)}
.p.z{color:var(--t3);background:var(--fill)}

.footer{text-align:center;font-size:12.5px;color:var(--t4);padding:40px 20px;line-height:1.8}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <h1>躺平组合</h1>
      <div class="sub">跟踪 · 京城Z先生无偿分享</div>
    </div>
    <div class="nav-right">
      <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()" title="刷新数据">↻</button>
      <div class="clock-wrap">
        <div class="live-dot"></div>
        <span class="clock" id="clock"></span>
      </div>
    </div>
  </div>
  <div style="max-width:760px;margin:0 auto;padding:0 20px 8px;text-align:right">
    <span id="data-updated" style="font-size:11px;color:var(--t4);font-family:var(--mono)"></span>
  </div>
  <div class="seg-wrap">
    <div class="segment">
      <button class="seg on" data-tab="all">全部</button>
      <button class="seg" data-tab="us">🇺🇸 美股</button>
      <button class="seg" data-tab="hk">🇭🇰 港股</button>
      <button class="seg" data-tab="cn">🇨🇳 A股</button>
      <button class="seg" data-tab="watch">⭐ 自选</button>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- 概览 -->
  <div class="sum-row" id="sum-row"></div>

  <!-- 美股组合 -->
  <div class="sc" data-sec="us">
    <div class="sc-hd">
      <div class="sc-hd-l">
        <span class="mkt" style="background:rgba(0,113,227,.12);color:#0066cc">US</span>
        <span class="sc-title">美股躺平组合</span>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr><th style="text-align:left;padding:16px 24px">仓位</th><th style="text-align:left">标的</th><th>今日</th><th>今年以来</th></tr></thead>
      <tbody id="us-body"></tbody>
    </table>
  </div>

  <!-- 港股组合 -->
  <div class="sc" data-sec="hk">
    <div class="sc-hd">
      <div class="sc-hd-l">
        <span class="mkt" style="background:rgba(52,199,89,.12);color:#1a8a3a">HK</span>
        <span class="sc-title">港股躺平组合</span>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr><th style="text-align:left;padding:16px 24px">仓位</th><th style="text-align:left">标的</th><th>今日</th><th>今年以来</th></tr></thead>
      <tbody id="hk-body"></tbody>
    </table>
  </div>

  <!-- A股组合 -->
  <div class="sc" data-sec="cn">
    <div class="sc-hd">
      <div class="sc-hd-l">
        <span class="mkt" style="background:rgba(255,59,48,.12);color:#c0281e">CN</span>
        <span class="sc-title">A股躺平组合</span>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr><th style="text-align:left;padding:16px 24px">仓位</th><th style="text-align:left">标的</th><th>今日</th><th>今年以来</th></tr></thead>
      <tbody id="cn-body"></tbody>
    </table>
  </div>

  <!-- 自选区 -->
  <div class="sc" data-sec="watch">
    <div class="sc-hd watch-hd">
      <div class="sc-hd-l">
        <span class="mkt" style="background:rgba(255,255,255,0.25);color:#fff">⭐</span>
        <span class="sc-title" style="color:#fff">Z先生分享标的追踪</span>
      </div>
    </div>
    <div class="watch-banner">
      📡 实时跟踪 · <strong>分享以来涨跌</strong> 从推荐日收盘价起算
    </div>
    <div id="watch-list"></div>
  </div>

  <div class="footer">
    数据来源：腾讯财经 · GitHub Actions 每30分钟更新<br>
    仅供参考，不构成任何投资建议 · 祝大家投资顺利 🙏
  </div>
</div>

<script>
// ==================== 配置 ====================
const ETF = {
  us: {h: [{w:'25%',c:'us_QQQ',t:'QQQ',n:'纳斯达克100 ETF'},{w:'25%',c:'us_SPY',t:'SPY',n:'标普500 ETF'},{w:'20%',c:'us_RING',t:'RING',n:'黄金矿业 ETF'},{w:'20%',c:'us_COPX',t:'COPX',n:'全球铜矿 ETF'},{w:'10%',c:'us_BITB',t:'BITB',n:'比特币 ETF'}]},
  hk: {h: [{w:'25%',c:'hk_03455',t:'03455',n:'纳斯达克100 ETF'},{w:'20%',c:'hk_03132',t:'03132',n:'全球半导体 ETF'},{w:'20%',c:'hk_03147',t:'03147',n:'中国创业板 ETF'},{w:'20%',c:'hk_03110',t:'03110',n:'恒生高股息 ETF'},{w:'15%',c:'hk_02840',t:'02840',n:'黄金 ETF'}]},
  cn: {h: [{w:'25%',c:'cn_513390',t:'513390',n:'纳斯达克100 ETF'},{w:'25%',c:'cn_159652',t:'159652',n:'有色金属50 ETF'},{w:'25%',c:'cn_588200',t:'588200',n:'科创芯片 ETF'},{w:'15%',c:'cn_515880',t:'515880',n:'通信设备 ETF'},{w:'10%',c:'cn_518880',t:'518880',n:'黄金 ETF'}]}
};

const WATCH = [
  {ticker:'300782',name:'卓胜微',sym:'sz300782',date:'2026-03-26',price:87.00,sector:'射频芯片',logic:'AI手机射频升级 + 国产替代',note:'国内射频前端龙头，垄断安卓高端机射频模组，受益AI手机射频复杂度提升与美国制裁替代窗口'},
  {ticker:'MRVL',name:'迈威尔科技',sym:'usMRVL',date:'2026-03-18',price:87.58,sector:'AI芯片/光互连',logic:'AI数据中心定制芯片 + 英伟达战略投资加持',note:'AI数据中心核心标的，ASIC定制芯片+硅光互连双轮驱动，英伟达20亿战略入股，光模块需求爆发最大受益者之一'},
  {ticker:'AAOI',name:'应用光电',sym:'usAAOI',date:'2026-04-10',price:150.60,sector:'光模块/光通信',logic:'AI算力光互连爆发 + 1.6T超高速光模块放量',note:'美国光模块龙头，垂直整合自研激光器降本，已获云厂商2亿美元1.6T订单，2026年目标营收超10亿美元'}
];

const YTD = {
  us_QQQ:-0.55,us_SPY:-0.02,us_RING:+14.83,us_COPX:+13.62,us_BITB:-17.41,
  hk_03455:-0.53,hk_03132:+25.08,hk_03147:+11.40,hk_03110:+9.10,hk_02840:+10.25,
  cn_513390:-5.03,cn_159652:+8.54,cn_588200:+10.16,cn_515880:+19.77,cn_518880:+7.48
};

const live = {};
let apiOK = false;

// 工具函数
function pill(v) {
  if (v===null||v===undefined||isNaN(v)) return '<span class="p z">--</span>';
  const cls = v>0 ? 'up' : 'dn';
  const s = v>0 ? '+' : '';
  return `<span class="p ${cls}">${s}${v.toFixed(2)}%</span>`;
}

function inl(v, fs='13px') {
  if (v===null||v===undefined||isNaN(v)) return `<span style="color:var(--t4);font-family:var(--mono);font-size:${fs};">--</span>`;
  const cls = v>0 ? 'up' : 'dn';
  const s = v>0 ? '+' : '';
  return `<span class="pi ${cls}" style="font-size:${fs}">${s}${v.toFixed(2)}%</span>`;
}

// 渲染ETF
function renderETF(key) {
  const g = ETF[key];
  const tbody = document.getElementById(`${key}-body`);
  let tw = 0, yw = 0, rows = '';
  for (const h of g.h) {
    const today = apiOK ? (live[h.c]?.today ?? null) : null;
    const ytd = YTD[h.c] ?? null;
    const w = parseFloat(h.w)/100;
    if (today !== null && !isNaN(today)) tw += w * today;
    if (ytd !== null) yw += w * ytd;
    rows += `<tr><td style="padding:14px 24px">${h.w}</td><td style="padding:14px 24px"><span style="font-family:var(--mono);font-weight:700">${h.t}</span><br><span style="font-size:13px;color:var(--t3)">${h.n}</span></td><td>${pill(today)}</td><td>${pill(ytd)}</td></tr>`;
  }
  tbody.innerHTML = rows;
  document.getElementById(`${key}-t`).innerHTML = inl(tw);
}

// 渲染自选（高级版）
function renderWatch() {
  const container = document.getElementById('watch-list');
  let html = '';
  for (let i = 0; i < WATCH.length; i++) {
    const w = WATCH[i];
    const d = live[`w${i}`] || {};
    let sinceHtml = `<span class="since-pct" style="color:var(--t4)">--</span>`;
    if (w.price && d.price > 0) {
      const pct = ((d.price - w.price) / w.price) * 100;
      const color = pct > 0 ? 'var(--red)' : (pct < 0 ? 'var(--green)' : 'var(--t3)');
      const sign = pct > 0 ? '+' : '';
      sinceHtml = `<span class="since-pct" style="color:${color}">${sign}${pct.toFixed(2)}%</span>`;
    }
    html += `<div class="watch-item">
      <div>
        <div class="watch-header">
          <span class="watch-ticker">${w.ticker}</span>
          <span class="watch-name">${w.name}</span>
          <span class="sector-tag">${w.sector}</span>
          ${w.logic ? `<span class="logic-tag">${w.logic}</span>` : ''}
        </div>
        <div class="watch-note">${w.note}</div>
        <div class="watch-meta">今日 ${pill(d.today)}</div>
      </div>
      <div class="watch-right">
        ${sinceHtml}
        <div class="since-date">自 ${w.date}<br>¥${w.price.toFixed(2)} → ¥${(d.price||w.price).toFixed(2)}</div>
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

// Tab切换
document.querySelectorAll('.seg').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.seg').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    const t = btn.dataset.tab;
    document.getElementById('sum-row').style.display = t === 'all' ? '' : 'none';
    document.querySelectorAll('.sc').forEach(c => {
      c.style.display = (t === 'all' || c.dataset.sec === t) ? 'block' : 'none';
    });
  });
});

// 时钟
function updateClock() {
  const now = new Date();
  const str = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  document.getElementById('clock').textContent = str;
}
setInterval(updateClock, 1000);
updateClock();

// 手动刷新
async function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.disabled = true;
  try { await fetchAll(); } catch(e) { console.error(e); }
  setTimeout(() => { btn.classList.remove('spinning'); btn.disabled = false; }, 800);
}

// 数据加载
async function fetchAll() {
  try {
    const res = await fetch(`data.json?t=${Date.now()}`);
    if (!res.ok) throw new Error('data.json not found');
    const json = await res.json();
    const d = json.data || {};

    for (const [k, v] of Object.entries(d)) {
      if (!live[k]) live[k] = {};
      live[k].today = v.today;
      live[k].price = v.price;
    }

    WATCH.forEach((w, i) => {
      const key = `watch_${w.ticker}`;
      if (d[key]) {
        if (!live[`w${i}`]) live[`w${i}`] = {};
        live[`w${i}`].today = d[key].today;
        live[`w${i}`].price = d[key].price;
      }
    });

    apiOK = true;
    if (json.updated) {
      const t = new Date(json.updated);
      const bj = new Date(t.getTime() + 8*3600*1000);
      document.getElementById('data-updated').textContent = `数据 ${bj.toISOString().slice(0,10)} ${bj.toTimeString().slice(0,8)}`;
    }
  } catch (e) {
    console.warn('data.json fetch failed:', e);
  }
  renderAll();
}

function renderAll() {
  renderETF('us');
  renderETF('hk');
  renderETF('cn');
  renderWatch();
}

renderAll();
fetchAll();
setInterval(fetchAll, 60000);
</script>
</body>
</html>
