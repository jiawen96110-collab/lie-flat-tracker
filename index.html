<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>躺平组合 · 京城Z先生无偿分享</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f8f9fa;--card:#ffffff;
  --t1:#1d1d1f;--t2:#3a3a3c;--t3:#666;--t4:#8e8e93;
  --sep:rgba(60,60,67,.08);--border:rgba(60,60,67,.12);--fill:rgba(118,118,128,.09);
  --green:#00b050;--red:#ff2d55;--blue:#0071e3;--gold:#ff9500;
  --font:-apple-system,'SF Pro Display','SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
  --mono:'SF Mono','Menlo','Monaco',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;padding-bottom:60px;-webkit-font-smoothing:antialiased}

.nav{position:sticky;top:0;z-index:100;background:rgba(248,249,250,.95);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:760px;margin:0 auto;padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.nav-brand h1{font-size:20px;font-weight:700;letter-spacing:-.6px}
.nav-brand .sub{font-size:13px;color:var(--t3);margin-top:3px}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.clock-wrap{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);padding:6px 14px;border-radius:9999px;font-size:13px;font-weight:500;color:var(--t2);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#34c759;flex-shrink:0;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.clock{font-family:var(--mono);font-weight:600;color:var(--t1);letter-spacing:.5px}

.seg-wrap{max-width:760px;margin:0 auto;padding:10px 20px}
.segment{display:flex;background:var(--fill);border-radius:12px;padding:3px;gap:2px}
.seg{flex:1;padding:9px 4px;border:none;background:transparent;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--t3);cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:3px}
.seg.on{background:var(--card);color:var(--t1);box-shadow:0 2px 8px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.05)}

.wrap{max-width:760px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:16px}

.sum-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sum-card{background:var(--card);border-radius:18px;padding:16px 14px 14px;box-shadow:0 4px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);position:relative;overflow:hidden;display:flex;flex-direction:column}
.sum-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0}
.sum-card.us::before{background:linear-gradient(90deg,#0071e3,#5ac8fa)}
.sum-card.hk::before{background:linear-gradient(90deg,#34c759,#30d158)}
.sum-card.cn::before{background:linear-gradient(90deg,#ff3b30,#ff6961)}
.sum-mkt{font-size:12px;color:var(--t3);font-weight:500;margin-bottom:8px;margin-top:2px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.sum-today{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:-.8px;line-height:1;height:24px;display:flex;align-items:center}
.sum-divider{height:.5px;background:var(--sep);margin:10px 0}
.sum-ytd-row{display:flex;align-items:center;gap:6px}
.sum-ytd-lbl{font-size:11.5px;color:var(--t4);flex-shrink:0}
.sum-ytd-val{font-family:var(--mono);font-size:12px;font-weight:600}

.sc{background:var(--card);border-radius:20px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05)}
.sc.hide{display:none}
.sc-hd{padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sep)}
.sc-hd.us-hd{background:linear-gradient(135deg,rgba(0,113,227,.06),rgba(90,200,250,.03))}
.sc-hd.hk-hd{background:linear-gradient(135deg,rgba(52,199,89,.06),rgba(48,209,88,.03))}
.sc-hd.cn-hd{background:linear-gradient(135deg,rgba(255,59,48,.06),rgba(255,105,97,.03))}
.sc-hd.watch-hd{background:linear-gradient(135deg,rgba(255,149,0,.07),rgba(175,82,222,.04))}
.sc-hd-l{display:flex;align-items:center;gap:10px}
.mkt{font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;letter-spacing:.4px}
.m-us{background:rgba(0,113,227,.12);color:#0066cc}
.m-hk{background:rgba(52,199,89,.12);color:#1a8a3a}
.m-cn{background:rgba(255,59,48,.12);color:#c0281e}
.m-watch{background:rgba(255,149,0,.15);color:#c47a00}
.sc-title{font-size:17px;font-weight:700;letter-spacing:-.4px}
.sc-tag{font-size:10px;background:var(--fill);color:var(--t3);padding:3px 8px;border-radius:6px;font-weight:600}
.sc-hd-r{text-align:right;flex-shrink:0}
.hd-row{font-size:13px;color:var(--t3);display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-top:4px}
.hd-lbl{font-size:12px;color:var(--t4);font-weight:500}

table{width:100%;border-collapse:collapse}
thead th{font-size:12px;font-weight:500;color:var(--t4);padding:10px 20px 8px;text-align:right;letter-spacing:.3px}
thead th:first-child,thead th:nth-child(2){text-align:left}
tbody tr{border-bottom:1px solid var(--sep)}
tbody tr:last-child{border-bottom:none}
@media(hover:hover){tbody tr:hover{background:rgba(0,0,0,.018)}}
td{padding:14px 20px;font-size:15px;text-align:right;vertical-align:middle}
td:first-child,td:nth-child(2){text-align:left}
.wt{font-family:var(--mono);font-size:13px;color:var(--t4);font-weight:600}
.tk{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--blue);display:block;line-height:1.1}
.nm{font-size:13.5px;color:var(--t2);display:block;margin-top:3px}

.p{font-family:var(--mono);font-size:14px;font-weight:700;padding:6px 10px;border-radius:8px;display:inline-block;min-width:76px;text-align:center;letter-spacing:-.3px}
.p.up{color:var(--red);background:rgba(255,45,85,.10)}
.p.dn{color:var(--green);background:rgba(0,176,80,.10)}
.p.z{color:var(--t3);background:var(--fill)}
.pi{font-family:var(--mono);font-weight:700}
.pi.up{color:var(--red)}.pi.dn{color:var(--green)}.pi.z{color:var(--t3)}

.watch-banner{background:linear-gradient(135deg,rgba(255,149,0,.08),rgba(175,82,222,.06));border-bottom:1px solid var(--sep);padding:12px 20px;display:flex;align-items:center;gap:10px}
.wb-text{font-size:13px;color:var(--t2);line-height:1.5}
.wb-text strong{color:var(--t1);font-weight:600}

.watch-item{padding:16px 20px;border-bottom:1px solid var(--sep);display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.watch-item:last-child{border-bottom:none}
.watch-header{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.watch-flag{font-size:18px;margin-right:4px;vertical-align:middle}
.watch-ticker{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--blue)}
.watch-name{font-size:14px;color:var(--t2);font-weight:500}
.sector-tag{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:5px;background:rgba(255,149,0,.13);color:#c47a00}
.logic-tag{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:5px;background:rgba(0,113,227,.10);color:#0066cc;margin-left:2px}
.watch-note{font-size:12px;color:var(--t3);line-height:1.5;margin-top:5px}
.watch-meta{font-size:11px;color:var(--t4);font-family:var(--mono);margin-top:5px}
.watch-right{text-align:right;flex-shrink:0;min-width:110px}
.since-pct{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:-.5px;display:block;line-height:1.1}
.since-date{font-size:11px;color:var(--t4);font-family:var(--mono);margin-top:4px;display:block}

@media(max-width:430px){
.sum-today{font-size:17px}
.sum-mkt{font-size:11px}
.p{min-width:66px;font-size:13px}
td{padding:12px 14px}
.sc-hd{padding:14px 14px 12px}
.watch-item{padding:14px 16px}
.nav-inner{padding:14px 16px 10px}
.seg-wrap{padding:8px 16px}
.wrap{padding:0 16px}
}
.footer{text-align:center;font-size:12px;color:var(--t4);line-height:1.6;margin-top:30px;padding:0 20px;}
</style>
</head>
<body>

<div class="nav">

<script>
// 组合配置
const ETF = {
  us: {h: [{w:'25%',c:'us_QQQ',t:'QQQ',n:'纳斯达克100 ETF'},{w:'25%',c:'us_SPY',t:'SPY',n:'标普500 ETF'},{w:'20%',c:'us_RING',t:'RING',n:'黄金矿业 ETF'},{w:'20%',c:'us_COPX',t:'COPX',n:'全球铜矿 ETF'},{w:'10%',c:'us_BITB',t:'BITB',n:'比特币 ETF'}]},
  hk: {h: [{w:'25%',c:'hk_03455',t:'03455',n:'纳斯达克100 ETF'},{w:'20%',c:'hk_03132',t:'03132',n:'全球半导体 ETF'},{w:'20%',c:'hk_03147',t:'03147',n:'中国创业板 ETF'},{w:'20%',c:'hk_03110',t:'03110',n:'恒生高股息 ETF'},{w:'15%',c:'hk_02840',t:'02840',n:'黄金 ETF'}]},
  cn: {h: [{w:'25%',c:'cn_513390',t:'513390',n:'纳斯达克100 ETF'},{w:'25%',c:'cn_159652',t:'159652',n:'有色金属50 ETF'},{w:'25%',c:'cn_588200',t:'588200',n:'科创芯片 ETF'},{w:'15%',c:'cn_515880',t:'515880',n:'通信设备 ETF'},{w:'10%',c:'cn_518880',t:'518880',n:'黄金 ETF'}]}
};

// 自选标的
const WATCH = [
  {ticker:'300782',name:'卓胜微',sym:'sz300782',date:'2026-03-26',price:87.00,flag:'🇨🇳',currency:'¥',sector:'射频芯片',logic:'AI手机射频升级 + 国产替代',note:'国内射频前端龙头，垄断安卓高端机射频模组。12英寸SiGe产线当前产能7000片/月，良率稳定92%以上，成本较6英寸低50%，兼容SOI工艺，平台直接对标以色列Tower半导体。地缘政治+产能稀缺下，是国内极少数能承接转单的厂商。未来计划扩产，满足光通信与射频前端需求。'},
  {ticker:'MRVL',name:'迈威尔',sym:'usMRVL',date:'2026-03-18',price:87.58,flag:'🇺🇸',currency:'$',sector:'AI光互连芯片',logic:'1.6T光学DSP平台',note:'光模块机会中最具代表性的美股核心标的。专注PAM4和coherent光学DSP芯片，主导800G向1.6T升级。作为XPO MSA成员之一，直接受益AI集群对高速互连的爆发式需求，是光模块产业链中长期最受益的芯片平台之一。'}
];

// 今年涨幅（固定）
const YTD = {
  us_QQQ:-0.55, us_SPY:-0.02, us_RING:14.83, us_COPX:13.62, us_BITB:-17.41,
  hk_03455:-0.53, hk_03132:25.08, hk_03147:11.40, hk_03110:9.10, hk_02840:10.25,
  cn_513390:-5.03, cn_159652:8.54, cn_588200:10.16, cn_515880:19.77, cn_518880:7.48
};

// 你的API KEY
const API_KEY = 'ZG6SRYSDOYDRJBXV';
const live = {};
let apiOK = false;

// 样式格式化
function pill(v) {
  if (v == null || isNaN(v)) return '<span class="p z">--</span>';
  const cls = v > 0 ? 'up' : 'dn';
  const s = v > 0 ? '+' : '';
  return `<span class="p ${cls}">${s}${v.toFixed(2)}%</span>`;
}
function inl(v, fs='13px') {
  if (v == null || isNaN(v)) return `<span style="color:var(--t4);font-family:var(--mono);font-size:${fs};font-weight:700">--</span>`;
  const cls = v > 0 ? 'up' : 'dn';
  const s = v > 0 ? '+' : '';
  return `<span class="pi ${cls}" style="font-size:${fs}">${s}${v.toFixed(2)}%</span>`;
}

// 渲染组合
function renderETF(key) {
  const g = ETF[key];
  const tbody = document.getElementById(`${key}-body`);
  let tw = 0, yw = 0, rows = '';
  for (const h of g.h) {
    const today = apiOK ? (live[h.c]?.changePercent ?? null) : null;
    const ytd = YTD[h.c] ?? null;
    const w = parseFloat(h.w) / 100;
    if (today != null && !isNaN(today)) tw += w * today;
    if (ytd != null) yw += w * ytd;
    rows += `<tr>
      <td class="wt">${h.w}</td>
      <td><span class="tk">${h.t}</span><span class="nm">${h.n}</span></td>
      <td>${pill(today)}</td>
      <td>${pill(ytd)}</td>
    </tr>`;
  }
  tbody.innerHTML = rows || '<tr><td colspan="4" style="text-align:center;color:var(--t4);padding:20px">加载中...</td></tr>';
  const td = apiOK ? tw : null;
  document.getElementById(`${key}-t`).innerHTML = inl(td, '13px');
  document.getElementById(`${key}-y`).innerHTML = inl(yw, '13px');
  document.getElementById(`s-${key}-t`).innerHTML = inl(td, '20px');
  document.getElementById(`s-${key}-y`).innerHTML = inl(yw, '12px');
}

// 核心：从Alpha Vantage获取精准价格
async function fetchPrice(symbol) {
  try {
    const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    const gq = data?.['Global Quote'];
    if (!gq || !gq['01. symbol']) return null;

    const price = parseFloat(gq['05. price'] || 0);
    const close = parseFloat(gq['08. previous close'] || 0);
    if (price <= 0 || close <= 0) return null;

    const changePercent = ((price / close) - 1) * 100;
    return { price, close, changePercent };
  } catch (e) {
    console.error('API错误', symbol, e);
    return null;
  }
}

// 统一拉取美股数据
async function fetchAll() {
  try {
    apiOK = true;
    const usList = ETF.us.h;
    for (const item of usList) {
      const data = await fetchPrice(item.t);
      if (data) live[item.c] = data;
      await new Promise(r => setTimeout(r, 2000));
    }
    renderAll();
  } catch (e) {
    console.error('拉取失败', e);
  }
}

// 渲染自选
function renderWatch() {
  const container = document.getElementById('watch-list');
  let html = '';
  for (let i = 0; i < WATCH.length; i++) {
    const w = WATCH[i];
    const d = live[`us_${w.ticker}`] || {};
    let sinceHtml = `<span class="since-pct" style="color:var(--t4)">--%</span><span class="since-date">自 ${w.date}</span>`;
    
    if (w.price && d.price && !isNaN(d.price) && d.price > 0) {
      const pct = ((d.price - w.price) / w.price) * 100;
      const cls = pct > 0 ? 'up' : (pct < 0 ? 'dn' : 'z');
      const s = pct > 0 ? '+' : '';
      const curr = w.currency || '¥';
      sinceHtml = `<span class="since-pct pi ${cls}">${s}${pct.toFixed(2)}%</span>
<span class="since-date">自 ${w.date}<br>${curr}${w.price.toFixed(2)} → ${curr}${d.price.toFixed(2)}</span>`;
    }
    
    html += `<div class="watch-item">
      <div class="watch-left">
        <div class="watch-header">
          <span class="watch-flag">${w.flag}</span>
          <span class="watch-ticker">${w.ticker}</span>
          <span class="watch-name">${w.name}</span>
          <span class="sector-tag">${w.sector}</span>
          ${w.logic ? `<span class="logic-tag">${w.logic}</span>` : ''}
        </div>
        <div class="watch-note">${w.note}</div>
        <div class="watch-meta">今日 ${pill(d.changePercent)}</div>
      </div>
      <div class="watch-right">${sinceHtml}</div>
    </div>`;
  }
  container.innerHTML = html || '<div style="text-align:center;padding:40px;color:var(--t4);font-size:14px">暂无分享标的或数据加载中...</div>';
}

function renderAll() {
  renderETF('us');
  renderETF('hk');
  renderETF('cn');
  renderWatch();
}

// 标签切换
document.querySelectorAll('.seg').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.seg').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    const t = btn.dataset.tab;
    document.getElementById('sum-row').style.display = t === 'all' ? '' : 'none';
    document.querySelectorAll('.sc').forEach(c => c.classList.toggle('hide', t !== 'all' && c.dataset.sec !== t));
  });
});

// 时钟：年月日 + 星期 + 时间
function updateClock() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  const week = weekdays[now.getDay()];
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${year}-${month}-${day} ${week} ${hh}:${mm}:${ss}`;
}
setInterval(updateClock, 1000);
updateClock();

// 启动
renderAll();
fetchAll();
setInterval(fetchAll, 60000);
</script>
</body>
</html>
