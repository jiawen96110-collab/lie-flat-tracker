<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>躺平投资组合追踪器</title>

<style>
:root {
  --bg: #0f1117;
  --bg-soft: #141824;

  --card: #1a1d28;
  --card-hover: #202535;

  --border: #2a2e3e;

  --text: #e2e8f0;
  --text-dim: #8892a8;

  --accent-us: #6366f1;
  --accent-hk: #f59e0b;
  --accent-a: #ef4444;
  --accent-watch: #f97316;

  /* 🔴红涨 🟢绿跌 */
  --up: #ef4444;
  --down: #22c55e;

  --up-bg: rgba(239,68,68,0.10);
  --down-bg: rgba(34,197,94,0.10);
}

/* 基础 */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "PingFang SC", sans-serif;
  background:
    radial-gradient(circle at 20% 30%, rgba(99,102,241,0.10), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(245,158,11,0.08), transparent 40%),
    var(--bg);

  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}

/* 标题 */
.header {
  text-align: center;
  padding: 30px 0 10px;
}
.header h1 {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.header .subtitle {
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* 状态栏 */
.status-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  margin: 16px 0 24px;
  flex-wrap: wrap;
}
.status-bar .time {
  color: var(--text-dim);
  font-size: 0.85rem;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--down);
}
.dot.loading { background: var(--accent-us); }
.dot.error { background: var(--up); }

/* 按钮 */
.btn-refresh {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
}
.btn-refresh:hover {
  border-color: var(--accent-us);
  color: var(--accent-us);
}

/* 布局 */
.portfolios {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
  gap: 24px;
}

/* 卡片 */
.portfolio,
.watch-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}

.portfolio:hover,
.watch-card:hover {
  background: var(--card-hover);
}

/* 头部 */
.portfolio-header {
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.label {
  display: flex;
  align-items: center;
  gap: 10px;
}
.flag { font-size: 1.5rem; }
.name { font-size: 1.1rem; font-weight: 600; }

.market-tag {
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 6px;
  background: rgba(255,255,255,0.04);
}

/* 汇总 */
.portfolio-summary {
  padding: 16px 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.summary-item {
  padding: 12px;
  border-radius: 10px;
  text-align: center;
}
.summary-label {
  font-size: 0.75rem;
  color: var(--text-dim);
}
.summary-value {
  font-size: 1.4rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

/* 红涨绿跌 */
.positive-text { color: var(--up); }
.negative-text { color: var(--down); }

.summary-item.positive { background: var(--up-bg); }
.summary-item.negative { background: var(--down-bg); }

/* 持仓 */
.holdings { padding: 8px 12px 16px; }

.holding {
  display: grid;
  grid-template-columns: 44px 1fr 80px 80px;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-radius: 10px;
}

.holding:hover {
  background: rgba(255,255,255,0.03);
}

.weight {
  background: rgba(255,255,255,0.06);
  border-radius: 6px;
  font-size: 0.75rem;
  text-align: center;
  color: var(--text-dim);
}

.ticker { font-weight: 600; }
.name-cn { font-size: 0.75rem; color: var(--text-dim); }

.change {
  text-align: right;
  font-size: 0.85rem;
  font-weight: 600;
}

/* 表头 */
.change-header {
  display: grid;
  grid-template-columns: 44px 1fr 80px 80px;
  padding: 6px 12px;
  font-size: 0.7rem;
  color: var(--text-dim);
}

/* 自选 */
.watch-section {
  max-width: 1400px;
  margin: 24px auto 0;
}

.watch-card-header {
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.watch-items { padding: 8px 12px 16px; }

.watch-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  padding: 14px 12px;
  border-bottom: 1px solid var(--border);
}

.watch-item:hover {
  background: rgba(255,255,255,0.03);
}

.since-pct {
  font-size: 1.4rem;
  font-weight: 700;
}

/* 底部 */
.footer {
  text-align: center;
  padding: 32px 0;
  color: var(--text-dim);
  font-size: 0.75rem;
}
</style>
</head>

<body>

<div class="header">
  <h1>躺平投资组合追踪器</h1>
  <p class="subtitle">三市场 ETF 组合 · 实时行情 · Z先生自选追踪</p>
</div>

<div class="status-bar">
  <div class="dot" id="statusDot"></div>
  <span class="time" id="statusText">正在加载数据...</span>
  <button class="btn-refresh" onclick="refreshAll()">刷新</button>
</div>

</body>
</html>
