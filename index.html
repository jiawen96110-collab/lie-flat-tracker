<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>躺平投资组合追踪器</title>
<style>
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117; --card: #1a1d28; --card-hover: #22263a; --border: #2a2e3e;
      --text: #e2e8f0; --text-dim: #8892a8;
      --red: #ef4444; --green: #22c55e;
      --red-bg: rgba(239,68,68,0.1); --green-bg: rgba(34,197,94,0.1);
    }
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff; --card: #f8f9fa; --card-hover: #e9ecef; --border: #dee2e6;
      --text: #212529; --text-dim: #6c757d;
      --red: #dc2626; --green: #16a34a;
      --red-bg: rgba(220,38,38,0.08); --green-bg: rgba(22,163,74,0.08);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    padding: 20px;
  }

  /* ========== 上方躺平组合【完全原版 一丝不改】 ========== */
  .header { text-align: center; margin-bottom: 15px; }
  .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
  .subtitle { color: var(--text-dim); font-size: 0.9rem; }
  .status-bar { display: flex; justify-content: center; align-items: center; gap: 12px; margin: 10px 0 20px; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--green); }
  .time { color: var(--text-dim); }
  .btn-refresh { padding:5px 12px; border-radius:6px; border:none; background:rgba(99,102,241,.15); color:#818cf8; cursor:pointer; }

  .portfolios { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 16px; }
  .portfolio { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .portfolio-header { padding:14px; display:flex; justify-content:space-between; border-bottom:1px solid var(--border); }
  .market-tag { font-size:0.7rem; padding:2px 6px; border-radius:4px; background:rgba(99,102,241,.15); color:#818cf8; }
  .portfolio-summary { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px; border-bottom:1px solid var(--border); }
  .summary-item { padding:10px; border-radius:8px; text-align:center; }
  .summary-label { font-size:0.7rem; color:var(--text-dim); }
  .summary-value { font-size:1.2rem; font-weight:700; }
  .neutral { background:var(--text-dim); opacity:0.1; color:var(--text-dim); }

  .holdings { padding:8px; }
  .holding { display:grid; grid-template-columns:40px 1fr 70px 70px; align-items:center; padding:8px; gap:6px; }
  .weight { font-size:0.7rem; color:var(--text-dim); text-align:center; }
  .ticker { font-weight:600; font-size:0.9rem; }
  .name-cn { font-size:0.75rem; color:var(--text-dim); white-space: nowrap; }
  .change { text-align:right; font-size:0.85rem; font-weight:600; }
  .positive-text { color: var(--red); }
  .negative-text { color: var(--green); }
  .change-header { display:grid; grid-template-columns:40px 1fr 70px 70px; padding:6px 8px; font-size:0.7rem; color:var(--text-dim); }
  .change-header span:nth-child(3),.change-header span:nth-child(4) { text-align:right; }

  /* ========== 只修改：下方分享标的区域【整体缩小字号】 ========== */
  .watch-section { max-width: 1000px; margin: 24px auto 0; }
  .watch-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .watch-card-header { padding:12px; display:flex; justify-content:space-between; border-bottom:1px solid var(--border); }
  
  .watch-items { padding: 0; }
  .watch-item { border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .watch-item:last-child { border-bottom: none; }

  .watch-header {
    display: grid;
    grid-template-columns: 1fr 75px 75px;
    padding: 6px 16px;
    font-size: 11px; /* 缩小表头字号 */
    color: var(--text-dim);
  }
  .watch-header span:nth-child(2),
  .watch-header span:nth-child(3) { text-align: right; }

  .watch-row {
    display: grid;
    grid-template-columns: 1fr 75px 75px;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
  }
  .watch-left { display: flex; align-items: center; gap: 8px; }
  .watch-flag { font-size: 12px; }
  .watch-ticker { font-size: 12px; }
  .watch-name {
    font-size: 12px; /* 标的名称缩小 */
    white-space: nowrap;
    overflow: visible; /* 强制完整显示，不省略 */
  }
  .watch-daily, .watch-since {
    font-size: 12px; /* 涨跌数字缩小 */
    text-align: right;
    font-style: normal; /* 取消斜体 */
  }

  .watch-detail {
    margin-top:0;
    padding: 0 16px 12px;
    border-top:1px dashed var(--border);
    display: none;
  }
  .watch-detail.open { display: block; }
  .tags { display:flex; gap:6px; margin:8px 0; flex-wrap:wrap; }
  .tag { font-size:11px; padding:2px 6px; border-radius:4px; background:rgba(99,102,241,.15); color:#818cf8; }
  .watch-logic, .watch-note { font-size:11px; line-height:1.5; margin:4px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>躺平投资组合追踪器</h1>
  <p class="subtitle">三市场ETF · 实时行情 · 自选追踪</p>
</div>

<div class="status-bar">
  <div class="dot"></div>
  <span class="time" id="statusText">加载中...</span>
  <button class="btn-refresh" onclick="refreshAll()">刷新</button>
</div>

<div class="portfolios">
  <div class="portfolio us">
    <div class="portfolio-header">
      <div>🇺🇸 美股躺平组合</div>
      <span class="market-tag">US</span>
    </div>
    <div class="portfolio-summary">
      <div class="summary-item neutral">
        <div class="summary-label">当日</div>
        <div class="summary-value">—</div>
      </div>
      <div class="summary-item neutral">
        <div class="summary-label">YTD</div>
        <div class="summary-value">—</div>
      </div>
    </div>
    <div class="holdings">
      <div class="change-header">
        <span></span>
        <span>持仓</span>
        <span>当日</span>
        <span>YTD</span>
      </div>
      <div id="holdings-us"></div>
    </div>
  </div>

  <div class="portfolio hk">
    <div class="portfolio-header">
      <div>🇭🇰 港股躺平组合</div>
      <span class="market-tag">HK</span>
    </div>
    <div class="portfolio-summary">
      <div class="summary-item neutral">
        <div class="summary-label">当日</div>
        <div class="summary-value">—</div>
      </div>
      <div class="summary-item neutral">
        <div class="summary-label">YTD</div>
        <div class="summary-value">—</div>
      </div>
    </div>
    <div class="holdings">
      <div class="change-header">
        <span></span>
        <span>持仓</span>
        <span>当日</span>
        <span>YTD</span>
      </div>
      <div id="holdings-hk"></div>
    </div>
  </div>

  <div class="portfolio a">
    <div class="portfolio-header">
      <div>🇨🇳 A股躺平组合</div>
      <span class="market-tag">A</span>
    </div>
    <div class="portfolio-summary">
      <div class="summary-item neutral">
        <div class="summary-label">当日</div>
        <div class="summary-value">—</div>
      </div>
      <div class="summary-item neutral">
        <div class="summary-label">YTD</div>
        <div class="summary-value">—</div>
      </div>
    </div>
    <div class="holdings">
      <div class="change-header">
        <span></span>
        <span>持仓</span>
        <span>当日</span>
        <span>YTD</span>
      </div>
      <div id="holdings-a"></div>
    </div>
  </div>
</div>

<div class="watch-section">
  <div class="watch-card">
    <div class="watch-card-header">
      <div>⭐ Z先生分享标的</div>
      <span class="market-tag">自选</span>
    </div>
    <div class="watch-items" id="watch-list"></div>
  </div>
</div>

<script>
// 上方躺平组合 原版完整数据 完全保留
const PORTFOLIOS = {
  us: {
    holdings: [
      { code: 'usQQQ', display: 'QQQ', nameCn: '纳指100', weight:25 },
      { code: 'usSPY', display: 'SPY', nameCn: '标普500', weight:25 },
      { code: 'usRING',display:'RING',nameCn:'黄金矿股',weight:20 },
      { code: 'usCOPX',display:'COPX',nameCn:'铜矿股',weight:20 },
      { code: 'usBITB',display:'BITB',nameCn:'比特币',weight:10 },
    ]
  },
  hk: {
    holdings: [
      { code: 'hk03455',display:'03455',nameCn:'纳指100',weight:25 },
      { code: 'hk03132',display:'03132',nameCn:'半导体',weight:20 },
      { code: 'hk03147',display:'03147',nameCn:'创业板',weight:20 },
      { code: 'hk03110',display:'03110',nameCn:'高股息',weight:20 },
      { code: 'hk02840',display:'02840',nameCn:'黄金',weight:15 },
    ]
  },
  a: {
    holdings: [
      { code: 'sh513390',display:'513390',nameCn:'纳指100',weight:25 },
      { code: 'sz159652',display:'159652',nameCn:'有色50',weight:25 },
      { code: 'sh588200',display:'588200',nameCn:'科创芯片',weight:25 },
      { code: 'sh515880',display:'515880',nameCn:'通信',weight:15 },
      { code: 'sh518880',display:'518880',nameCn:'黄金',weight:10 },
    ]
  }
};

const WATCH = [
  { ticker:'300782',name:'卓胜微',sym:'sz300782',date:'2026-03-26',price:87.00,sector:'射频芯片',logic:'AI手机射频升级+国产替代',note:'国内射频前端龙头，垄断安卓高端机射频模组，受益AI手机射频复杂度提升与国产替代加速',flag:'🇨🇳' },
  { ticker:'002428',name:'云南锗业',sym:'sz002428',date:'2026-04-10',price:56.79,sector:'磷化铟/锗半导体材料',logic:'光模块上游核心晶圆材料',note:'国内稀缺量产磷化铟晶圆企业，主营磷化铟单晶、锗基半导体衬底，AI光模块激光器核心上游原材料',flag:'🇨🇳' },
  { ticker:'300136',name:'信维通信',sym:'sz300136',date:'2026-04-22',price:79.52,sector:'射频连接器/商业航天',logic:'SpaceX星链终端核心供应商',note:'国内射频器件龙头，深度绑定星链供应链，供应高频高速连接器，适配卫星终端航天级要求',flag:'🇨🇳' },
  { ticker:'002149',name:'西部材料',sym:'sz002149',date:'2026-04-22',price:64.10,sector:'高温合金/特种航天材料',logic:'SpaceX火箭发动机耐热材料',note:'稀有金属高端材料龙头，供应火箭发动机高温特种合金，切入猎鹰、星舰供应链',flag:'🇨🇳' },
  { ticker:'603308',name:'应流股份',sym:'sh603308',date:'2026-04-22',price:75.45,sector:'高端精密铸造/航空航天',logic:'SpaceX动力系统精密铸件',note:'高温合金精密铸造龙头，通过航天体系认证，为火箭发动机提供核心铸件',flag:'🇨🇳' },
  { ticker:'603601',name:'再升科技',sym:'sh603601',date:'2026-04-22',price:15.82,sector:'玻纤隔热新材料/航天热控',logic:'SpaceX箭体卫星隔热材料',note:'高端绝热玻纤材料龙头，供货航天级耐高温隔热制品，应用于星链卫星与火箭箭体热控防护',flag:'🇨🇳' },
  { ticker:'605123',name:'派克新材',sym:'sh605123',date:'2026-04-22',price:104.29,sector:'高端合金锻件/航天结构件',logic:'SpaceX箭体及发动机锻件',note:'航空航天高端锻件核心厂商，产品覆盖火箭结构件、发动机关键锻件',flag:'🇨🇳' },
  { ticker:'MRVL',name:'迈威尔科技',sym:'usMRVL',date:'2026-03-18',price:87.58,sector:'AI芯片/光互连',logic:'AI数据中心定制芯片+光互连芯片',note:'AI数据中心核心标的，ASIC定制芯片+硅光互连双轮驱动，深度受益全球算力基建扩张',flag:'🇺🇸' },
  { ticker:'AAOI',name:'应用光电',sym:'usAAOI',date:'2026-04-10',price:150.60,sector:'光模块/光通信',logic:'AI算力光互连爆发+1.6T高速光模块',note:'高速光模块龙头，垂直整合激光器芯片，深度受益AI算力网络需求爆发',flag:'🇺🇸' },
  { ticker:'06869',name:'长飞光纤',sym:'hk06869',date:'2026-04-17',price:206.00,sector:'光纤光缆/光通信',logic:'AI算力光纤光缆刚需+海外出海',note:'全球光纤光缆龙头，受益AI算力网络建设、海外需求复苏',flag:'🇭🇰' }
];

let WATCH_CACHE = {};
function fmt(v){if(v==null||isNaN(v))return'—';return(v>0?'+':'')+v.toFixed(2)+'%'}
function toggleDetail(i){document.getElementById('detail-'+i).classList.toggle('open')}

// ==============================================
// 【核心修复】换回你之前100%能出数据的原生接口
// ==============================================
function getData(){
  let codes = WATCH.map(item=>item.sym).join(',');
  window.getStockData = function(res){
    let arr = res.split(';');
    for(let i=0;i<WATCH.length;i++){
      let line = arr[i];
      if(!line) continue;
      let d = line.split('~');
      let now = parseFloat(d[3]);
      let last = parseFloat(WATCH[i].sym.indexOf('hk')>-1 ? d[5] : d[4]);
      if(now && last){
        WATCH_CACHE[WATCH[i].sym] = {
          price: now,
          dailyPct: (now - last) / last * 100
        }
      }
    }
    renderWatch();
  }
  let s = document.createElement('script');
  s.src = "https://qt.gtimg.cn/q="+codes+"&callback=getStockData";
  document.head.appendChild(s);
}

// 渲染下方标的 表头：当日 / 累计
function renderWatch(){
  let html = `<div class="watch-header"><span>持仓</span><span>当日</span><span>累计</span></div>`;
  WATCH.forEach((w,i)=>{
    let d = WATCH_CACHE[w.sym] || {};
    let rate = d.price ? ((d.price - w.price) / w.price * 100) : null;
    let dc = d.dailyPct>0 ? "positive-text" : d.dailyPct<0 ? "negative-text" : "";
    let rc = rate>0 ? "positive-text" : rate<0 ? "negative-text" : "";
    html += `
    <div class="watch-item" onclick="toggleDetail(${i})">
      <div class="watch-row">
        <div class="watch-left">
          <span class="watch-flag">${w.flag}</span>
          <span class="watch-ticker">${w.ticker}</span>
          <span class="watch-name">${w.name}</span>
        </div>
        <div class="watch-daily ${dc}">${fmt(d.dailyPct)}</div>
        <div class="watch-since ${rc}">${fmt(rate)}</div>
      </div>
      <div class="watch-detail" id="detail-${i}">
        <div class="tags"><span class="tag">行业：${w.sector}</span></div>
        <div class="watch-logic">📈 核心逻辑：${w.logic}</div>
        <div class="watch-note">📝 详细备注：${w.note}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:6px">分享日收盘价：${w.price} 元 · 分享日期：${w.date}</div>
      </div>
    </div>`;
  })
  document.getElementById('watch-list').innerHTML = html;
}

// 渲染上方躺平组合 原版不动
function renderPort(){
  Object.keys(PORTFOLIOS).forEach(key=>{
    let dom = document.getElementById('holdings-'+key);
    let html = "";
    PORTFOLIOS[key].holdings.forEach(item=>{
      html += `
      <div class="holding">
        <div class="weight">${item.weight}%</div>
        <div>
          <div class="ticker">${item.display}</div>
          <div class="name-cn">${item.nameCn}</div>
        </div>
        <div class="change">—</div>
        <div class="change">—</div>
      </div>`;
    })
    dom.innerHTML = html;
  })
}

function refreshAll(){
  document.getElementById('statusText').innerText = "刷新中...";
  getData();
  setTimeout(()=>{
    document.getElementById('statusText').innerText = "已更新 "+new Date().toLocaleTimeString();
  },500);
}

// 页面加载自动执行，强制拉数据
window.onload = function(){
  renderPort();
  renderWatch();
  getData(); // 进入页面立刻请求真实行情
  setInterval(refreshAll, 30000);
}
</script>
</body>
</html>
