<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>躺平投资组合追踪器</title>
<style>
  /* 自动日间/夜间模式 */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117;
      --card: #1a1d28;
      --card-hover: #22263a;
      --border: #2a2e3e;
      --text: #e2e8f0;
      --text-dim: #8892a8;
      --accent-us: #6366f1;
      --accent-hk: #f59e0b;
      --accent-a: #ef4444;
      --accent-watch: #f97316;
      --red: #ef4444;
      --green: #22c55e;
      --red-bg: rgba(239,68,68,0.1);
      --green-bg: rgba(34,197,94,0.1);
    }
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --card: #f8f9fa;
      --card-hover: #e9ecef;
      --border: #dee2e6;
      --text: #212529;
      --text-dim: #6c757d;
      --accent-us: #4f46e5;
      --accent-hk: #d97706;
      --accent-a: #dc2626;
      --accent-watch: #ea580c;
      --red: #dc2626;
      --green: #16a34a;
      --red-bg: rgba(220,38,38,0.08);
      --green-bg: rgba(22,163,74,0.08);
    }
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    transition: background 0.3s, color 0.3s;
  }
  .header {
    text-align: center;
    padding: 30px 0 10px;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #f59e0b, #ef4444);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  .status-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin: 16px 0 24px;
    flex-wrap: wrap;
  }
  .status-bar .time {
    color: var(--text-dim);
    font-size: 0.85rem;
  }
  .status-bar .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  .status-bar .dot.loading { background: var(--accent-us); }
  .status-bar .dot.error { background: var(--red); animation: none; }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.4; }
  }
  .btn-refresh {
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    color: var(--accent-us);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .btn-refresh:hover { background: rgba(99,102,241,0.25); }
  .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

  .portfolios {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 24px;
  }
  .portfolio {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, background 0.3s, border-color 0.3s;
  }
  .portfolio:hover { transform: translateY(-2px); }
  .portfolio-header {
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .portfolio-header .label {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .portfolio-header .flag { font-size: 1.5rem; }
  .portfolio-header .name { font-size: 1.1rem; font-weight: 600; }
  .portfolio-header .market-tag {
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 500;
  }
  .us .market-tag { background: rgba(99,102,241,0.15); color: var(--accent-us); }
  .hk .market-tag { background: rgba(245,158,11,0.15); color: var(--accent-hk); }
  .a  .market-tag { background: rgba(239,68,68,0.15);  color: var(--accent-a); }

  .portfolio-summary {
    padding: 16px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .summary-item {
    padding: 12px;
    border-radius: 10px;
    text-align: center;
  }
  .summary-item .summary-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }
  .summary-item .summary-value { font-size: 1.4rem; font-weight: 700; font-variant-numeric: tabular-nums; }

  .summary-item.positive { background: var(--red-bg); color: var(--red); }
  .summary-item.negative { background: var(--green-bg); color: var(--green); }
  .summary-item.neutral { background: rgba(136,146,168,0.1); color: var(--text-dim); }

  .holdings { padding: 8px 12px 16px; }
  .holding {
    display: grid;
    grid-template-columns: 44px 1fr 80px 80px;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 10px;
    transition: background 0.15s;
  }
  .holding:hover { background: var(--card-hover); }
  .holding .weight {
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 4px 0;
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: 500;
  }
  .holding .info .ticker { font-weight: 600; font-size: 0.9rem; }
  .holding .info .name-cn { font-size: 0.75rem; color: var(--text-dim); margin-top: 1px; }
  .holding .change {
    text-align: right;
    font-size: 0.85rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .positive-text { color: var(--red); }
  .negative-text { color: var(--green); }
  .neutral-text { color: var(--text-dim); }

  .change-header {
    display: grid;
    grid-template-columns: 44px 1fr 80px 80px;
    gap: 8px;
    padding: 6px 12px;
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .change-header span:nth-child(3),
  .change-header span:nth-child(4) { text-align: right; }

  .watch-section {
    max-width: 1400px;
    margin: 24px auto 0;
  }
  .watch-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, background 0.3s, border-color 0.3s;
  }
  .watch-card:hover { transform: translateY(-2px); }
  .watch-card-header {
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: rgba(249,115,22,0.04);
  }
  .watch-card-header .label {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .watch-card-header .flag { font-size: 1.5rem; }
  .watch-card-header .name { font-size: 1.1rem; font-weight: 600; }
  .watch-market-tag {
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 500;
    background: rgba(249,115,22,0.15);
    color: var(--accent-watch);
  }
  .watch-banner {
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-dim);
    background: rgba(249,115,22,0.03);
  }
  .watch-items { padding: 8px 12px 16px; }
  /* 核心优化：三栏布局，当日左、累计右，左右对称 */
  .watch-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 20px;
    align-items: center;
    padding: 16px 12px;
    border-radius: 12px;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .watch-item:last-child { border-bottom: none; }
  .watch-item:hover { background: var(--card-hover); }
  .watch-left { flex: 1; }
  .watch-header {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .watch-flag { font-size: 1rem; }
  .watch-ticker {
    font-weight: 700;
    font-size: 1rem;
    color: #818cf8;
  }
  .watch-name { font-size: 0.9rem; color: var(--text); font-weight: 500; }
  .sector-tag {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 5px;
    background: rgba(249,115,22,0.15);
    color: var(--accent-watch);
  }
  .logic-tag {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 5px;
    background: rgba(99,102,241,0.15);
    color: var(--accent-us);
  }
  .watch-note { font-size: 0.78rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 6px; }
  /* 当日涨幅列（左） */
  .today-col {
    text-align: right;
    flex-shrink: 0;
    min-width: 100px;
  }
  .today-pill {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .today-pill.up   { color: var(--red); background: var(--red-bg); }
  .today-pill.down { color: var(--green); background: var(--green-bg); }
  .today-pill.flat { color: var(--text-dim); background: rgba(136,146,168,0.1); }
  /* 累计涨幅列（右） */
  .since-col {
    text-align: right;
    flex-shrink: 0;
    min-width: 120px;
  }
  .since-pct {
    font-size: 1.5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .since-date {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .loading-skeleton {
    height: 20px;
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position:  200% 0; }
  }

  .footer {
    text-align: center;
    padding: 32px 0 16px;
    color: var(--text-dim);
    font-size: 0.75rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* 响应式：手机端自动切换为上下排列 */
  @media (max-width: 768px) {
    .watch-item {
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .today-col, .since-col {
      text-align: left;
      margin-top: 8px;
    }
  }

  @media (max-width: 500px) {
    .portfolios { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.5rem; }
    .holding {
      grid-template-columns: 36px 1fr 64px 64px;
      gap: 4px;
      padding: 8px;
    }
    .change-header {
      grid-template-columns: 36px 1fr 64px 64px;
      gap: 4px;
    }
  }
</style>
</head>

// 日间/夜间模式切换监听（自动）
if (window.matchMedia) {
  const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
  function updateMode() {
    document.documentElement.setAttribute('data-theme', darkModeMediaQuery.matches ? 'dark' : 'light');
  }
  darkModeMediaQuery.addEventListener('change', updateMode);
  updateMode();
}

function dbg(msg) {
  const el = document.getElementById('dbg');
  if (el) { el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n'; el.scrollTop = el.scrollHeight; }
}

function formatFullDate() {
  const weekArr = ['周日','周一','周二','周三','周四','周五','周六'];
  const now = new Date();
  const y = now.getFullYear();
  const m = (now.getMonth()+1).toString().padStart(2,'0');
  const d = now.getDate().toString().padStart(2,'0');
  const w = weekArr[now.getDay()];
  const h = now.getHours().toString().padStart(2,'0');
  const mi = now.getMinutes().toString().padStart(2,'0');
  const s = now.getSeconds().toString().padStart(2,'0');
  return `${y}年${m}月${d}日 ${w} ${h}:${mi}:${s}`;
}

// 统一：涨红 跌绿
function getColorClass(val) {
  if (val == null || isNaN(val)) return 'neutral-text';
  return val > 0.001 ? 'positive-text' : val < -0.001 ? 'negative-text' : 'neutral-text';
}
function getSummaryClass(val) {
  if (val == null || isNaN(val)) return 'neutral';
  return val > 0.001 ? 'positive' : val < -0.001 ? 'negative' : 'neutral';
}
function getPillClass(val) {
  if (val == null || isNaN(val)) return 'flat';
  return val > 0.001 ? 'up' : val < -0.001 ? 'down' : 'flat';
}

let _jid = 0;
function qqJsonp(codes, timeout = 8000) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    const timer = setTimeout(() => { s.remove(); reject(new Error('timeout')); }, timeout);
    s.onload = () => {
      clearTimeout(timer); s.remove();
      const results = {};
      codes.forEach(c => { const val = window['v_' + c]; if (val) results[c] = val; });
      resolve(results);
    };
    s.onerror = () => { clearTimeout(timer); s.remove(); reject(new Error('script error')); };
    s.src = `https://qt.gtimg.cn/q=${codes.join(',')}`;
    document.head.appendChild(s);
  });
}

function parseQuote(code, raw) {
  if (!raw) return null;
  const parts = raw.split('~');
  const price = parseFloat(parts[3]);
  if (!price || price <= 0) return null;
  let dailyPct = parseFloat(parts[32]);
  if (isNaN(dailyPct)) {
    const prev = parseFloat(code.startsWith('hk') ? parts[5] : parts[4]);
    if (prev > 0) dailyPct = ((price - prev) / prev) * 100;
  }
  return { code, price, dailyPct: isNaN(dailyPct) ? null : dailyPct };
}

const CACHE = {
  us:  { rt: {}, ytd: {}, loaded: false },
  hk:  { rt: {}, ytd: {}, loaded: false },
  a:   { rt: {}, ytd: {}, loaded: false },
};
const WATCH_CACHE = {};

function fmt(v) {
  if (v == null || isNaN(v)) return '—';
  return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
}

function renderHoldings(key, rt, ytd) {
  const port = PORTFOLIOS[key];
  document.getElementById(`holdings-${key}`).innerHTML = port.holdings.map(h => {
    const q = rt[h.code] || {};
    const d = q.dailyPct, y = ytd[h.code];
    const dc = getColorClass(d);
    const yc = getColorClass(y);
    return `<div class="holding">
      <div class="weight">${h.weight}%</div>
      <div class="info"><div class="ticker">${h.display}</div><div class="name-cn">${h.nameCn}</div></div>
      <div class="change ${dc}">${fmt(d)}</div>
      <div class="change ${yc}">${fmt(y)}</div>
    </div>`;
  }).join('');
}

function renderSummary(key, rt, ytd) {
  const port = PORTFOLIOS[key];
  let dW=0, yW=0, dOk=false, yOk=false;
  port.holdings.forEach(h => {
    const w = h.weight/100, q = rt[h.code]||{}, y = ytd[h.code];
    if (q.dailyPct != null) { dW += q.dailyPct*w; dOk=true; }
    if (y != null) { yW += y*w; yOk=true; }
  });
  const dv = dOk?dW:null, yv = yOk?yW:null;
  const dsc = getSummaryClass(dv);
  const ysc = getSummaryClass(yv);
  document.getElementById(`summary-${key}`).innerHTML = `
    <div class="summary-item ${dsc}"><div class="summary-label">当日涨跌</div><div class="summary-value">${fmt(dv)}</div></div>
    <div class="summary-item ${ysc}"><div class="summary-label">年初至今</div><div class="summary-value">${fmt(yv)}</div></div>`;
}

function renderLoadingHoldings(key) {
  const port = PORTFOLIOS[key];
  document.getElementById(`holdings-${key}`).innerHTML = port.holdings.map(h =>
    `<div class="holding">
      <div class="weight">${h.weight}%</div>
      <div class="info"><div class="ticker">${h.display}</div><div class="name-cn">${h.nameCn}</div></div>
      <div class="change"><div class="loading-skeleton" style="width:50px;height:16px;margin-left:auto"></div></div>
      <div class="change"><div class="loading-skeleton" style="width:50px;height:16px;margin-left:auto"></div></div>
    </div>`
  ).join('');
}

function renderWatch() {
  const container = document.getElementById('watch-list');
  if (!WATCH.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:14px">暂无分享标的</div>';
    return;
  }
  container.innerHTML = WATCH.map((w, i) => {
    const d = WATCH_CACHE[w.sym] || {};
    let sinceHtml, sinceClass = 'neutral-text';
    if (w.price && d.price > 0) {
      const pct = (d.price - w.price) / w.price * 100;
      sinceClass = getColorClass(pct);
      sinceHtml = `
        <span class="since-pct ${sinceClass}">${fmt(pct)}</span>
        <span class="since-date">${w.date} · ${w.price.toFixed(2)} → ${d.price.toFixed(2)}</span>`;
    } else {
      sinceHtml = `
        <span class="since-pct neutral-text" style="font-size:1.2rem"><div class="loading-skeleton" style="width:70px;height:22px"></div></span>
        <span class="since-date">${w.date}</span>`;
    }
    return `<div class="watch-item">
      <div class="watch-left">
        <div class="watch-header">
          <span class="watch-flag">${w.flag || ''}</span>
          <span class="watch-ticker">${w.ticker}</span>
          <span class="watch-name">${w.name}</span>
          <span class="sector-tag">${w.sector}</span>
          ${w.logic ? `<span class="logic-tag">${w.logic}</span>` : ''}
        </div>
        <div class="watch-note">${w.note}</div>
      </div>
      <!-- 当日涨幅列（左） -->
      <div class="today-col">
        <span class="today-pill ${getPillClass(d.dailyPct)}">今日 ${fmt(d.dailyPct)}</span>
      </div>
      <!-- 累计涨幅列（右） -->
      <div class="since-col">${sinceHtml}</div>
    </div>`;
  }).join('');
}

async function loadPortfolio(key) {
  const port = PORTFOLIOS[key];
  const c = CACHE[key];
  if (!c.loaded) renderLoadingHoldings(key);
  try {
    const codes = port.holdings.map(h => h.code);
    const rawMap = await qqJsonp(codes);
    port.holdings.forEach(h => {
      const raw = rawMap[h.code];
      if (raw) {
        const q = parseQuote(h.code, raw);
        if (q) {
          c.rt[h.code] = q;
          const base = YTD_BASE[h.code];
          if (base > 0 && q.price > 0) c.ytd[h.code] = ((q.price - base) / base) * 100;
        }
      }
    });
  } catch(e) { dbg(`${key} 失败: ${e.message}`); }
  renderHoldings(key, c.rt, c.ytd);
  renderSummary(key, c.rt, c.ytd);
  c.loaded = true;
}

async function loadWatch() {
  try {
    const codes = WATCH.map(w => w.sym);
    const rawMap = await qqJsonp(codes);
    WATCH.forEach(w => {
      const raw = rawMap[w.sym];
      if (raw) {
        const q = parseQuote(w.sym, raw);
        if (q) WATCH_CACHE[w.sym] = q;
      }
    });
  } catch(e) { dbg(`自选失败: ${e.message}`); }
  renderWatch();
}

function setStatus(s, m) {
  document.getElementById('statusDot').className = 'dot ' + (s==='ok'?'':s==='loading'?'loading':'error');
  document.getElementById('statusText').textContent = m;
}

let _timer = null, _first = true;
async function refreshAll() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  const t0 = performance.now();
  setStatus('loading', _first ? '正在获取数据...' : '刷新中...');
  try {
    await Promise.allSettled([
      ...['us','hk','a'].map(k => loadPortfolio(k)),
      loadWatch()
    ]);
    _first = false;
    const ms = ((performance.now()-t0)/1000).toFixed(1);
    const fullDate = formatFullDate();
    setStatus('ok', ` ${fullDate} (${ms}s)`);
  } catch(e) {
    setStatus('error', '加载失败');
  }
  btn.disabled = false;
  clearTimeout(_timer);
  _timer = setTimeout(refreshAll, 30000);
}

document.addEventListener('DOMContentLoaded', () => {
  ['us','hk','a'].forEach(k => renderLoadingHoldings(k));
  renderWatch();
  refreshAll();
});
</script>
