<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>躺平投资组合追踪器</title>
<style>
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0e1a;
      --card: #151c2e;
      --card-hover: #1d2538;
      --border: #2a3145;
      --text: #e8eef9;
      --text-dim: #8a94a8;
      --accent-us: #4e9ef8;
      --accent-hk: #f9a825;
      --accent-a: #f76c6c;
      --accent-share: #ff9800;
      --red: #f76c6c;
      --green: #4caf7d;
      --red-bg: rgba(247, 108, 108, 0.12);
      --green-bg: rgba(76, 175, 125, 0.12);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f8ff;
      --card: #ffffff;
      --card-hover: #f8fafc;
      --border: #e2e8f0;
      --text: #1a202c;
      --text-dim: #718096;
      --accent-us: #3b82f6;
      --accent-hk: #f59e0b;
      --accent-a: #ef4444;
      --accent-share: #f97316;
      --red: #ef4444;
      --green: #10b981;
      --red-bg: rgba(239, 68, 68, 0.08);
      --green-bg: rgba(16, 185, 129, 0.08);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
  }

  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
  }
  
  html, body {
    width: 100%;
    min-height: 100vh;
    background-color: var(--bg) !important;
    background-image: none !important;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    padding: 16px;
    line-height: 1.5;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  
  .main-container {
    max-width: 1200px;
    margin: 0 auto;
  }
  
  .header { 
    text-align: center; 
    padding: 32px 0 24px; 
  }
  
  .header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  
  .header .subtitle { 
    font-size: 1rem; 
    color: var(--text-dim); 
    max-width: 500px;
    margin: 0 auto;
  }
  
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    margin: 0 auto 24px;
    font-size: 0.85rem;
  }
  
  .status-info {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .status-bar .dot { 
    width: 8px; 
    height: 8px; 
    border-radius: 50%; 
    background: var(--green); 
  }
  
  .status-bar .dot.loading { 
    background: var(--accent-us);
    animation: pulse 1.5s infinite;
  }
  
  .status-bar .dot.error { 
    background: var(--red);
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  
  .status-bar .time { 
    color: var(--text);
    font-weight: 500;
  }
  
  .btn-refresh {
    background: var(--accent-us);
    border: none;
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .btn-refresh:hover {
    opacity: 0.9;
  }
  
  .btn-refresh:disabled { 
    opacity: 0.5; 
    cursor: not-allowed; 
  }
  
  .portfolios {
    max-width: 1200px; 
    margin: 0 auto 32px;
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); 
    gap: 20px;
  }
  
  .portfolio {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.2s;
  }
  
  .portfolio:hover { 
    box-shadow: var(--shadow);
  }
  
  .portfolio-header {
    padding: 16px 20px; 
    display: flex; 
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  
  .portfolio-header .left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .portfolio-header .flag { 
    font-size: 1.4rem; 
  }
  
  .portfolio-header .name { 
    font-size: 1.1rem; 
    font-weight: 700; 
  }
  
  .market-tag { 
    font-size: 0.7rem; 
    padding: 4px 8px; 
    border-radius: 6px; 
    font-weight: 600;
    color: #fff;
  }
  
  .us .market-tag { 
    background: var(--accent-us);
  }
  .hk .market-tag { 
    background: var(--accent-hk);
  }
  .a  .market-tag { 
    background: var(--accent-a);
  }
  
  .portfolio-summary {
    padding: 12px 20px; 
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  
  .summary-item { 
    text-align: center; 
    flex: 1;
  }
  
  .summary-item .summary-label { 
    font-size: 0.75rem; 
    color: var(--text-dim); 
    margin-bottom: 6px; 
  }
  
  .summary-value {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
  }

  .summary-item.positive .summary-value {
    background: var(--red-bg);
    color: var(--red);
  }
  .summary-item.negative .summary-value {
    background: var(--green-bg);
    color: var(--green);
  }
  .summary-item.neutral .summary-value {
    background: rgba(136, 146, 168, 0.1);
    color: var(--text-dim);
  }
  
  .holdings { 
    padding: 8px 12px 12px; 
  }
  
  .change-header {
    display: grid; 
    grid-template-columns: 40px 1fr 70px 70px;
    gap: 10px; 
    padding: 8px 12px;
    font-size: 0.7rem; 
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  
  .change-header span:nth-child(3),
  .change-header span:nth-child(4) { 
    text-align: right; 
  }
  
  .holding {
    display: grid; 
    grid-template-columns: 40px 1fr 70px 70px;
    align-items: center; 
    gap: 10px; 
    padding: 10px 12px;
  }
  
  .holding:hover { 
    background: var(--card-hover);
  }
  
  .holding .weight {
    background: var(--accent-us);
    border-radius: 6px;
    padding: 6px 0;
    text-align: center;
    font-size: 0.8rem;
    color: white;
    font-weight: 600;
  }
  
  .holding .info .ticker { 
    font-weight: 600; 
    font-size: 0.9rem; 
  }
  
  .holding .info .name-cn { 
    font-size: 0.75rem; 
    color: var(--text-dim); 
  }
  
  .holding .change {
    text-align: right;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .positive-text { color: var(--red) !important; }
  .negative-text { color: var(--green) !important; }

  .share-section { 
    max-width: 1200px; 
    margin: 0 auto 40px; 
  }
  
  .share-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  
  .share-card-header {
    padding: 16px 20px; 
    display: flex; 
    justify-content: space-between;
    align-items: center; 
    border-bottom: 1px solid var(--border);
    flex-wrap: nowrap;
    gap: 12px;
  }
  
  .share-card-header .label { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    white-space: nowrap;
    flex-shrink: 0;
  }
  
  .share-card-header .flag { 
    font-size: 1.4rem; 
  }
  
  .share-card-header .name { 
    font-size: 1.1rem; 
    font-weight: 700; 
  }
  
  .share-note {
    font-size: 0.7rem; 
    padding: 4px 10px; 
    border-radius: 6px; 
    font-weight: 600;
    background: #6b7280;
    color: white;
    white-space: nowrap;
    flex-shrink: 0;
  }
  
  .share-table-header {
    display: grid;
    grid-template-columns: 1fr 70px 70px;
    padding: 10px 12px;
    font-size: 0.75rem;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
  }
  .share-table-header span:first-child { text-align:left; }
  
  .share-items { padding: 0; }
  .share-item { border-bottom: 1px solid var(--border); cursor: pointer; }
  .share-item:last-child { border-bottom: none; }
  .share-item:hover .share-row { background: var(--card-hover); }
  
  .share-row {
    display: grid;
    grid-template-columns: 1fr 70px 70px;
    align-items: center;
    padding: 12px;
    font-size: 12px;
    text-align:right;
    white-space: nowrap;
  }
  .share-row .share-left { text-align:left; }
  
  .share-left {
    display: flex; 
    align-items: center; 
    gap: 8px;
  }
  
  .share-flag { font-size: 12px; }
  .share-ticker { font-weight: 600; color: var(--accent-us); }
  .share-name { font-weight: 600; }
  
  .share-day, .share-since { 
    font-weight: 600;
  }
  
  .share-detail {
    padding: 16px 12px;
    border-top: 1px dashed var(--border);
    display: none;
    font-size: 12px; 
  }
  
  .share-detail.open { display: block; }
  
  .detail-row { 
    margin: 8px 0; 
    padding: 8px 10px;
    border-radius: 6px;
  }
  
  .sector-row {
    background: rgba(59, 130, 246, 0.08);
    border-left: 3px solid var(--accent-us);
  }
  
  .logic-row {
    background: rgba(249, 115, 22, 0.08);
    border-left: 3px solid var(--accent-share);
  }
  
  .analysis-row {
    background: rgba(168, 85, 247, 0.08);
    border-left: 3px solid #a855f7;
  }
  
  .info-row {
    background: rgba(136, 146, 168, 0.08);
    border-left: 3px solid var(--text-dim);
  }
  
  .detail-label { font-weight: 600; margin-right: 8px; }
  
  .loading-skeleton {
    height: 16px;
    background: linear-gradient(90deg, rgba(255,255,255,0.08) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.08) 75%);
    background-size: 400% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }
  
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  
  .footer {
    text-align: center; 
    padding: 24px 0 16px;
    color: var(--text-dim); 
    font-size: 0.8rem;
  }
  
  .footer-note {
    font-size: 0.75rem;
    margin-top: 8px;
    opacity: 0.7;
  }

  @media (max-width: 900px) {
    .portfolios { grid-template-columns: 1fr; }
  }
  
  @media (max-width: 768px) {
    body { padding: 12px; }
    .holding {
      grid-template-columns: 36px 1fr 60px 60px;
      padding: 8px;
    }
  }
</style>
</head>

function formatFullDate() {
  const weekArr = ['周日','周一','周二','周三','周四','周五','周六'];
  const now = new Date();
  const y=now.getFullYear(), m=(now.getMonth()+1).toString().padStart(2,'0');
  const d=now.getDate().toString().padStart(2,'0'), w=weekArr[now.getDay()];
  const h=now.getHours().toString().padStart(2,'0'), mi=now.getMinutes().toString().padStart(2,'0');
  const s=now.getSeconds().toString().padStart(2,'0');
  return `${y}年${m}月${d}日 ${w} ${h}:${mi}:${s}`;
}

function getColorClass(val) {
  if (val==null||isNaN(val)) return '';
  return val>0.001 ? 'positive-text' : val<-0.001 ? 'negative-text' : '';
}
function getSummaryClass(val) {
  if (val==null||isNaN(val)) return 'neutral';

let _jid = 0;
function qqJsonp(codes, timeout=8000) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    const timer = setTimeout(() => { s.remove(); reject(new Error('timeout')); }, timeout);
    s.onload = () => { clearTimeout(timer); s.remove(); const results = {}; codes.forEach(c => { const val = window['v_'+c]; if(val) results[c]=val; }); resolve(results); };
    s.onerror = () => { clearTimeout(timer); s.remove(); reject(new Error('script error')); };
    s.src = `https://qt.gtimg.cn/q=${codes.join(',')}`;
    document.head.appendChild(s);
  });
}

function parseQuote(code, raw) {
  if (!raw) return null;
  const parts = raw.split('~');
  const price = parseFloat(parts[3]);
  if (!price||price<=0) return null;
  let dailyPct = parseFloat(parts[32]);
  if (isNaN(dailyPct)) {
    const prev = parseFloat(code.startsWith('hk') ? parts[5] : parts[4]);
    if (prev>0) dailyPct = ((price-prev)/prev)*100;
  }
  return { code, price, dailyPct: isNaN(dailyPct)?null:dailyPct };
}

const CACHE = { us: {rt:{},ytd:{},loaded:false}, hk: {rt:{},ytd:{},loaded:false}, a: {rt:{},ytd:{},loaded:false} };
const SHARE_CACHE = {};

function fmt(v) {
  if (v==null||isNaN(v)) return '—';
  return (v>0?'+':'')+v.toFixed(2)+'%';
}

function renderHoldings(key, rt, ytd) {
  const port = PORTFOLIOS[key];
  document.getElementById(`holdings-${key}`).innerHTML = port.holdings.map(h => {
    const q=rt[h.code]||{}, d=q.dailyPct, y=ytd[h.code];
    return `<div class="holding">
      <div class="weight">${h.weight}%</div>
      <div class="info"><div class="ticker">${h.display}</div><div class="name-cn">${h.nameCn}</div></div>
      <div class="change ${getColorClass(d)}">${fmt(d)}</div>
      <div class="change ${getColorClass(y)}">${fmt(y)}</div>
    </div>`;
  }).join('');
}

function renderSummary(key, rt, ytd) {
  const port = PORTFOLIOS[key];
  let dW=0,yW=0,dOk=false,yOk=false;
  port.holdings.forEach(h => {
    const w=h.weight/100, q=rt[h.code]||{}, y=ytd[h.code];
    if(q.dailyPct!=null){dW+=q.dailyPct*w;dOk=true;}
    if(y!=null){yW+=y*w;yOk=true;}
  });
  const dv=dOk?dW:null, yv=yOk?yW:null;
  document.getElementById(`summary-${key}`).innerHTML = `
    <div class="summary-item ${getSummaryClass(dv)}"><div class="summary-label">当日</div><div class="summary-value">${fmt(dv)}</div></div>
    <div class="summary-item ${getSummaryClass(yv)}"><div class="summary-label">YTD</div><div class="summary-value">${fmt(yv)}</div></div>`;
}

function renderLoadingHoldings(key) {
  document.getElementById(`holdings-${key}`).innerHTML = PORTFOLIOS[key].holdings.map(h =>
    `<div class="holding">
      <div class="weight">${h.weight}%</div>
      <div class="info"><div class="ticker">${h.display}</div><div class="name-cn">${h.nameCn}</div></div>
      <div class="change"><div class="loading-skeleton" style="width:50px;height:16px;margin-left:auto"></div></div>
      <div class="change"><div class="loading-skeleton" style="width:50px;height:16px;margin-left:auto"></div></div>
    </div>`
  ).join('');
}

function renderShareRecords() {
  const container = document.getElementById('share-list');
  container.innerHTML = SHARE_RECORDS.map((w, idx) => {
    const d = SHARE_CACHE[w.sym] || {};
    const since = (d.price&&w.price) ? ((d.price-w.price)/w.price*100) : null;
    const c1 = getColorClass(d.dailyPct);
    const c2 = getColorClass(since);
    const priceStr = d.price ? d.price.toFixed(2) : '--';
    return `
    <div class="share-item" onclick="toggleShareDetail(${idx})">
      <div class="share-row">
        <div class="share-left">
          <span class="share-flag">${w.flag}</span>
          <span class="share-ticker">${w.ticker}</span>
          <span class="share-name">${w.name}</span>
        </div>
        <div class="${c1}">${fmt(d.dailyPct)}</div>
        <div class="${c2}">${fmt(since)}</div>
      </div>
      <div class="share-detail" id="share-detail-${idx}">
        <div class="detail-row sector-row"><span class="detail-label">行业：</span>${w.sector}</div>
        <div class="detail-row logic-row"><span class="detail-label">逻辑：</span>${w.logic}</div>
        <div class="detail-row analysis-row"><span class="detail-label">分析：</span>${w.analysis}</div>
        <div class="detail-row info-row"><span class="detail-label">记录：</span>${w.date} · 参考价 ${w.price.toFixed(2)} → 现价 ${priceStr}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleShareDetail(i) {
  document.getElementById('share-detail-'+i).classList.toggle('open');
}

async function loadPortfolio(key) {
  const port=PORTFOLIOS[key], c=CACHE[key];
  if (!c.loaded) renderLoadingHoldings(key);
  try {
    const codes = port.holdings.map(h=>h.code);
    const rawMap = await qqJsonp(codes);
    port.holdings.forEach(h => {
      const q = parseQuote(h.code, rawMap[h.code]);
      if (q) {
        c.rt[h.code]=q;
        const base=YTD_BASE[h.code];
        if(base>0&&q.price>0) c.ytd[h.code]=((q.price-base)/base)*100;
      }
    });
  } catch(e) {}
  renderHoldings(key,c.rt,c.ytd);
  renderSummary(key,c.rt,c.ytd);
  c.loaded=true;
}

async function loadShareRecords() {
  try {
    const codes = SHARE_RECORDS.map(w=>w.sym);
    const rawMap = await qqJsonp(codes);
    SHARE_RECORDS.forEach(w => {
      const q = parseQuote(w.sym, rawMap[w.sym]);
      if (q) SHARE_CACHE[w.sym]=q;
    });
  } catch(e) {}
  renderShareRecords();
}

function setStatus(s, m) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'dot ' + (s==='ok'?'':s==='loading'?'loading':'error');
  text.textContent = m;
}

let _timer=null, _first=true;
async function refreshAll() {
  const btn=document.getElementById('btnRefresh');
  btn.disabled=true;
  const t0=performance.now();
  setStatus('loading', _first?'正在获取数据...':'刷新中...');
  try {
    await Promise.allSettled([...['us','hk','a'].map(k=>loadPortfolio(k)), loadShareRecords()]);
    _first=false;
    const ms=((performance.now()-t0)/1000).toFixed(1);
    setStatus('ok', `${formatFullDate()} (${ms}s)`);
  } catch(e) { setStatus('error','加载失败'); }
  btn.disabled=false;
  clearTimeout(_timer);
  _timer=setTimeout(refreshAll,30000);
}

document.addEventListener('DOMContentLoaded', () => {
  ['us','hk','a'].forEach(k=>renderLoadingHoldings(k));
  renderShareRecords();
  refreshAll();
});
