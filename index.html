<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>躺平组合 · 专业行情版</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
--bg: #f5f7fa;
--card: #ffffff;
--border: #e4e7ec;
--text-primary: #1d2129;
--text-secondary: #4e5969;
--text-tertiary: #86909c;
--brand: #0070e0;
--up: #00b42a;
--down: #f77272;
--flat-bg: #f2f3f5;
--radius: 16px;
--shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
--transition: all 0.25s cubic-bezier(0.32, 0.72, 0, 1);
--font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
--mono: 'SF Mono', Menlo, Monaco, Consolas, monospace;
}

body {
font-family: var(--font);
background: var(--bg);
color: var(--text-primary);
padding-bottom: 40px;
-webkit-font-smoothing: antialiased;
}

.header {
position: sticky;
top: 0;
z-index: 99;
background: rgba(255, 255, 255, 0.85);
backdrop-filter: blur(20px);
border-bottom: 0.5px solid var(--border);
}

.header-inner {
max-width: 720px;
margin: 0 auto;
padding: 16px 20px 12px;
display: flex;
align-items: center;
justify-content: space-between;
}

.title-group h1 {
font-size: 19px;
font-weight: 600;
line-height: 1.1;
display: flex;
align-items: center;
gap: 6px;
}

.title-group .sub {
font-size: 12px;
color: var(--text-tertiary);
margin-top: 2px;
}

.status-bar {
display: flex;
align-items: center;
gap: 10px;
font-size: 12px;
color: var(--text-secondary);
}

#refreshBtn {
padding: 6px 12px;
border-radius: 12px;
border: none;
background: var(--brand);
color: #fff;
font-size: 12px;
font-weight: 500;
cursor: pointer;
transition: var(--transition);
}

#refreshBtn:active {
transform: scale(0.96);
opacity: 0.9;
}

.tabbar {
max-width: 720px;
margin: 0 auto;
padding: 8px 20px;
}

.tabs {
display: flex;
background: var(--flat-bg);
border-radius: 12px;
padding: 2px;
gap: 2px;
}

.tab {
flex: 1;
padding: 8px 6px;
border-radius: 10px;
border: none;
background: transparent;
font-size: 13px;
font-weight: 500;
color: var(--text-secondary);
cursor: pointer;
transition: var(--transition);
display: flex;
align-items: center;
justify-content: center;
gap: 4px;
}

.tab.active {
background: var(--card);
color: var(--text-primary);
font-weight: 600;
box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
}

/* 国旗图标样式 - 完全修复 */
.flag {
width: 18px;
height: 12px;
border-radius: 2px;
flex-shrink: 0;
}
.flag-us { background: linear-gradient(180deg, #B22234 33.3%, #fff 33.3%, #fff 66.6%, #3C3B6E 66.6%); }
.flag-hk { background: linear-gradient(180deg, #EA2839 50%, #fff 50%); }
.flag-cn { background: #DE2910; position: relative; }
.flag-cn::after {
content: '';
position: absolute;
top: 2px;
left: 3px;
width: 4px;
height: 4px;
background: #FFDE00;
border-radius: 50%;
box-shadow: 0 0 0 1px #FFDE00, 0 0 0 2px #FFDE00;
}
.flag-z { background: linear-gradient(135deg, #7b1fa2, #9c27b0); color: #fff; font-size: 8px; display: flex; align-items: center; justify-content: center; font-weight: 600; }

.container {
max-width: 720px;
margin: 0 auto;
padding: 8px 20px 20px;
display: flex;
flex-direction: column;
gap: 12px;
}

.card {
background: var(--card);
border-radius: var(--radius);
box-shadow: var(--shadow);
overflow: hidden;
transition: var(--transition);
}

.section.hidden {
display: none;
}

.card-header {
padding: 16px;
display: flex;
align-items: center;
justify-content: space-between;
border-bottom: 0.5px solid var(--border);
}

.card-left {
display: flex;
align-items: center;
gap: 8px;
}

.badge {
padding: 4px 8px;
border-radius: 8px;
font-size: 11px;
font-weight: 600;
line-height: 1;
white-space: nowrap;
display: flex;
align-items: center;
gap: 4px;
}

.badge-us {
background: rgba(0, 112, 224, 0.1);
color: var(--brand);
}

.badge-hk {
background: rgba(0, 180, 42, 0.1);
color: var(--up);
}

.badge-cn {
background: rgba(247, 114, 114, 0.1);
color: var(--down);
}

.badge-z {
background: rgba(123, 31, 162, 0.1);
color: #7b1fa2;
}

.card-title {
font-size: 15px;
font-weight: 600;
}

.card-stats {
text-align: right;
font-size: 12px;
line-height: 1.4;
}

.stat-label {
color: var(--text-tertiary);
margin-right: 4px;
}

.stat-value {
font-weight: 600;
font-family: var(--mono);
}

.stat-up {
color: var(--up);
}
.stat-down {
color: var(--down);
}

.table-wrap {
width: 100%;
}
table {
width: 100%;
border-collapse: collapse;
}

thead th {
padding: 10px 16px 8px;
font-size: 11px;
font-weight: 500;
color: var(--text-tertiary);
text-align: right;
border-bottom: 0.5px solid var(--border);
}

thead th:first-child,
thead th:nth-child(2) {
text-align: left;
}

/* 自选表头特殊布局 - 参考同花顺 */
.z-thead th {
text-align: center !important;
}
.z-thead th:first-child, .z-thead th:nth-child(2) {
text-align: left !important;
}

tbody tr {
border-bottom: 0.5px solid var(--border);
}
tbody tr:last-child {
border-bottom: none;
}

td {
padding: 14px 16px;
font-size: 14px;
text-align: right;
vertical-align: middle;
}

td:first-child,
td:nth-child(2) {
text-align: left;
}

.weight {
font-family: var(--mono);
font-size: 12px;
color: var(--text-secondary);
}

.code {
font-family: var(--mono);
font-size: 14px;
font-weight: 600;
color: var(--brand);
display: block;
line-height: 1.1;
}

.name {
font-size: 13px;
color: var(--text-secondary);
margin-top: 2px;
}

.pct {
display: inline-block;
min-width: 72px;
padding: 6px 8px;
border-radius: 10px;
font-family: var(--mono);
font-size: 13px;
font-weight: 600;
text-align: center;
line-height: 1;
}

.pct-up {
color: var(--up);
background: rgba(0, 180, 42, 0.08);
}
.pct-down {
color: var(--down);
background: rgba(247, 114, 114, 0.08);
}
.pct-flat {
color: var(--text-secondary);
background: var(--flat-bg);
}
.pct-loading {
color: var(--text-tertiary);
background: var(--flat-bg);
font-size: 12px;
}

.footer {
max-width: 720px;
margin: 0 auto;
padding: 12px 20px;
text-align: center;
font-size: 11px;
color: var(--text-tertiary);
line-height: 1.5;
}
</style>

</head>

<body>

<div class="header">
  <div class="header-inner">
    <div class="title-group">
      <h1>📈 躺平组合</h1>
      <div class="sub">ETF 全天候跟踪</div>
    </div>
    <div class="status-bar">
      <span id="last-update">--:--:--</span>
      <button id="refreshBtn">刷新</button>
    </div>
  </div>

  <div class="tabbar">
    <div class="tabs">
      <button class="tab active" data-target="all">全部</button>
      <button class="tab" data-target="us">
        <span class="flag flag-us"></span> 美股
      </button>
      <button class="tab" data-target="hk">
        <span class="flag flag-hk"></span> 港股
      </button>
      <button class="tab" data-target="cn">
        <span class="flag flag-cn"></span> A股
      </button>
      <button class="tab" data-target="z">
        <span class="flag flag-z">Z</span> 自选跟踪
      </button>
    </div>
  </div>
</div>

<div class="container">

  <div class="card section" data-section="us">
    <div class="card-header">
      <div class="card-left">
        <div class="badge badge-us">
          <span class="flag flag-us"></span> US
        </div>
        <div class="card-title">美股躺平组合</div>
      </div>
      <div class="card-stats">
        <div><span class="stat-label">今日</span><span id="us-today" class="stat-value">--</span></div>
        <div><span class="stat-label">今年</span><span id="us-ytd" class="stat-value">--</span></div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>仓位</th>
            <th>标的</th>
            <th>今日</th>
            <th>今年</th>
          </tr>
        </thead>
        <tbody id="us-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="card section" data-section="hk">
    <div class="card-header">
      <div class="card-left">
        <div class="badge badge-hk">
          <span class="flag flag-hk"></span> HK
        </div>
        <div class="card-title">港股躺平组合</div>
      </div>
      <div class="card-stats">
        <div><span class="stat-label">今日</span><span id="hk-today" class="stat-value">--</span></div>
        <div><span class="stat-label">今年</span><span id="hk-ytd" class="stat-value">--</span></div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>仓位</th>
            <th>标的</th>
            <th>今日</th>
            <th>今年</th>
          </tr>
        </thead>
        <tbody id="hk-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="card section" data-section="cn">
    <div class="card-header">
      <div class="card-left">
        <div class="badge badge-cn">
          <span class="flag flag-cn"></span> CN
        </div>
        <div class="card-title">A股躺平组合</div>
      </div>
      <div class="card-stats">
        <div><span class="stat-label">今日</span><span id="cn-today" class="stat-value">--</span></div>
        <div><span class="stat-label">今年</span><span id="cn-ytd" class="stat-value">--</span></div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>仓位</th>
            <th>标的</th>
            <th>今日</th>
            <th>今年</th>
          </tr>
        </thead>
        <tbody id="cn-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ============================================== -->
  <!-- ⭐ Z先生自选跟踪（优化版，完全匹配券商风格） -->
  <!-- ============================================== -->
  <div class="card section" data-section="z">
    <div class="card-header">
      <div class="card-left">
        <div class="badge badge-z">
          <span class="flag flag-z">Z</span> Z
        </div>
        <div class="card-title">Z先生机会跟踪</div>
      </div>
      <div class="card-stats">
        <div><span class="stat-label">分享日期</span><span id="z-date" class="stat-value">2026-03-16</span></div>
        <div><span class="stat-label">累计收益</span><span id="z-total" class="stat-value">+9.42%</span></div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead class="z-thead">
          <tr>
            <th>名称</th>
            <th>代码</th>
