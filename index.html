<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>躺平组合 · 专业行情版</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #f5f7fa;
  --card: #ffffff;
  --border: #e4e7ec;
  --text-primary: #1d2129;
  --text-secondary: #4e5969;
  --text-tertiary: #86909c;
  --brand: #0070e0;
  --up: #00b42a;
  --down: #f77272;
  --flat-bg: #f2f3f5;
  --radius: 16px;
  --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
  --transition: all 0.25s cubic-bezier(0.32, 0.72, 0, 1);
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
  --mono: 'SF Mono', Menlo, Monaco, Consolas, monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  padding-bottom: 40px;
  -webkit-font-smoothing: antialiased;
}

.header {
  position: sticky;
  top: 0;
  z-index: 99;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 0.5px solid var(--border);
}

.header-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.title-group h1 {
  font-size: 19px;
  font-weight: 600;
  line-height: 1.1;
  display: flex;
  align-items: center;
  gap: 6px;
}

.title-group .sub {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--text-secondary);
}

#refreshBtn {
  padding: 6px 12px;
  border-radius: 12px;
  border: none;
  background: var(--brand);
  color: #fff;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}

#refreshBtn:active {
  transform: scale(0.96);
  opacity: 0.9;
}

.tabbar {
  max-width: 720px;
  margin: 0 auto;
  padding: 8px 20px;
}

.tabs {
  display: flex;
  background: var(--flat-bg);
  border-radius: 12px;
  padding: 2px;
  gap: 2px;
}

.tab {
  flex: 1;
  padding: 8px 6px;
  border-radius: 10px;
  border: none;
  background: transparent;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.tab.active {
  background: var(--card);
  color: var(--text-primary);
  font-weight: 600;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 8px 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: var(--transition);
}

.section.hidden {
  display: none;
}

.card-header {
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
}

.card-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.badge {
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  line-height: 1;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}

.badge-us {
  background: rgba(0, 112, 224, 0.1);
  color: var(--brand);
}

.badge-hk {
  background: rgba(0, 180, 42, 0.1);
  color: var(--up);
}

.badge-cn {
  background: rgba(247, 114, 114, 0.1);
  color: var(--down);
}

.badge-watch {
  background: rgba(255, 107, 53, 0.1);
  color: #ff6b35;
}

.card-title {
  font-size: 15px;
  font-weight: 600;
}

.card-stats {
  text-align: right;
  font-size: 12px;
  line-height: 1.4;
}

.stat-label {
  color: var(--text-tertiary);
  margin-right: 4px;
}

.stat-value {
  font-weight: 600;
  font-family: var(--mono);
}

.stat-up {
  color: var(--up);
}
.stat-down {
  color: var(--down);
}

.table-wrap {
  width: 100%;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 360px;
}

thead th {
  padding: 10px 16px 8px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  text-align: right;
  border-bottom: 0.5px solid var(--border);
}

thead th:first-child,
thead th:nth-child(2) {
  text-align: left;
}

tbody tr {
  border-bottom: 0.5px solid var(--border);
}
tbody tr:last-child {
  border-bottom: none;
}

td {
  padding: 14px 16px;
  font-size: 14px;
  text-align: right;
  vertical-align: middle;
}

td:first-child,
td:nth-child(2) {
  text-align: left;
}

.weight {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-secondary);
}

.code {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--brand);
  display: block;
  line-height: 1.1;
}

.name {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.pct {
  display: inline-block;
  min-width: 72px;
  padding: 6px 8px;
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  line-height: 1;
}

.pct-up {
  color: var(--up);
  background: rgba(0, 180, 42, 0.08);
}
.pct-down {
  color: var(--down);
  background: rgba(247, 114, 114, 0.08);
}
.pct-flat {
  color: var(--text-secondary);
  background: var(--flat-bg);
}
.pct-loading {
  color: var(--text-tertiary);
  background: var(--flat-bg);
  font-size: 12px;
}

.add-stock-form {
  padding: 16px;
  background: var(--flat-bg);
  display: flex;
  gap: 8px;
  border-bottom: 0.5px solid var(--border);
}

.stock-input {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  font-family: var(--font);
  background: var(--card);
  transition: var(--transition);
}

.stock-input:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 2px rgba(0, 112, 224, 0.1);
}

.add-btn {
  padding: 8px 16px;
  background: var(--brand);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}

.add-btn:active {
  transform: scale(0.96);
}

.delete-btn {
  padding: 4px 12px;
  background: #f7f8fa;
  border: 0.5px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
}

.delete-btn:active {
  background: var(--down);
  color: white;
}

.watch-time {
  font-size: 11px;
  color: var(--text-tertiary);
  font-family: var(--mono);
}

.footer {
  max-width: 720px;
  margin: 0 auto;
  padding: 12px 20px;
  text-align: center;
  font-size: 11px;
  color: var(--text-tertiary);
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <div class="title-group">
      <h1>📈 躺平组合</h1>
      <div class="sub">ETF 全天候跟踪</div>
    </div>
    <div class="status-bar">
      <span id="last-update">--:--:--</span>
      <button id="refreshBtn">刷新</button>

  </div>

  <div class="tabbar">
    <div class="tabs" role="tablist">
      <button class="tab active" data-target="all" role="tab">全部</button>

  <!-- A股 -->

<div class="footer">
  数据来源：腾讯财经 · 每30秒自动刷新 · 手动刷新秒级更新<br>
  自选股数据保存在本地浏览器中 · 卓胜微自选日：2026-03-26

<script>
// ==================== 配置常量 ====================
const CONFIG = {
  PROXY_URL: 'https://lieflat-proxy.jiawen96110.workers.dev',
  REFRESH_INTERVAL: 30000,
  TIME_UPDATE_INTERVAL: 1000
};

// 投资组合配置
const PORTFOLIOS = {
  us: {
    holdings: [
      { weight: '25%', code: 'QQQ', ticker: 'QQQ', name: '纳指100 ETF' },
      { weight: '25%', code: 'SPY', ticker: 'SPY', name: '标普500 ETF' },
      { weight: '20%', code: 'RING', ticker: 'RING', name: '黄金矿股 ETF' },
      { weight: '20%', code: 'COPX', ticker: 'COPX', name: '全球铜矿 ETF' },
      { weight: '10%', code: 'BITB', ticker: 'BITB', name: '比特币 ETF' }
    ]
  },
  hk: {
    holdings: [
      { weight: '25%', code: '03455', ticker: '03455', name: '纳指100 ETF' },
      { weight: '20%', code: '03132', ticker: '03132', name: '全球半导体 ETF' },
      { weight: '20%', code: '03147', ticker: '03147', name: '中国创业板 ETF' },
      { weight: '20%', code: '03110', ticker: '03110', name: '恒生高股息 ETF' },
      { weight: '15%', code: '02840', ticker: '02840', name: '黄金 ETF' }
    ]
  },
  cn: {
    holdings: [
      { weight: '25%', code: '513390', ticker: '513390', name: '纳指100 ETF' },
      { weight: '25%', code: '159652', ticker: '159652', name: '有色50 ETF' },
      { weight: '25%', code: '588200', ticker: '588200', name: '科创芯片 ETF' },
      { weight: '15%', code: '515880', ticker: '515880', name: '通信 ETF' },
      { weight: '10%', code: '518880', ticker: '518880', name: '黄金 ETF' }
    ]
  }
};

// 腾讯财经API映射
function getTencentCode(code, market) {
  if (market === 'us') return `us${code}`;
  if (market === 'hk') return `hk${code}`;
  if (market === 'cn') {
    if (code.startsWith('6')) return `sh${code}`;
    return `sz${code}`;
  }
  return code;
}

// ==================== 数据获取核心 ====================
async function fetchRealtimeData(symbols) {
  try {
    const url = `${CONFIG.PROXY_URL}?q=${symbols.join(',')}`;
    const response = await fetch(url);
    const text = await response.text();
    
    const results = {};
    const regex = /v_([a-zA-Z0-9]+)="([^"]+)"/g;
    let match;
    
    while ((match = regex.exec(text)) !== null) {
      const symbol = match[1];
      const fields = match[2].split('~');
      
      // 腾讯财经字段说明：
      // fields[1] = 名称
      // fields[3] = 最新价
      // fields[31] = 涨跌额
      // fields[32] = 涨跌幅(%)
      // fields[33] = 成交量
      // fields[37] = 今年涨跌幅(%)
      
      if (fields.length > 32) {
        results[symbol] = {
          name: fields[1] || symbol,
          price: parseFloat(fields[3]) || 0,
          change: parseFloat(fields[32]) || 0,
          changeAmount: parseFloat(fields[31]) || 0,
          ytd: fields[37] ? parseFloat(fields[37]) : null
        };
      }
    }
    
    return results;
  } catch (error) {
    console.error('获取数据失败:', error);
    return {};
  }
}

// ==================== 组合数据管理 ====================
let portfolioData = {
  us: { holdings: [], today: 0, ytd: 0 },
  hk: { holdings: [], today: 0, ytd: 0 },
  cn: { holdings: [], today: 0, ytd: 0 }
};

async function updatePortfolioData() {
  // 收集所有需要查询的代码
  const symbols = [];
  const codeMap = {};
  
  for (const [market, portfolio] of Object.entries(PORTFOLIOS)) {
    for (const holding of portfolio.holdings) {
      const tencentCode = getTencentCode(holding.code, market);
      symbols.push(tencentCode);
      codeMap[tencentCode] = { market, holding };
    }
  }
  
  const realtimeData = await fetchRealtimeData(symbols);
  
  // 更新组合数据
  for (const [market, portfolio] of Object.entries(PORTFOLIOS)) {
    let sumToday = 0;
    let sumYtd = 0;
    const holdingsData = [];
    
    for (const holding of portfolio.holdings) {
      const tencentCode = getTencentCode(holding.code, market);
      const data = realtimeData[tencentCode];
      
      if (data) {
        const weight = parseFloat(holding.weight) / 100;
        sumToday += weight * data.change;
        if (data.ytd) sumYtd += weight * data.ytd;
        
        holdingsData.push({
          ...holding,
          today: data.change,
          ytd: data.ytd || 0,
          price: data.price,
          name: data.name
        });
      } else {
        holdingsData.push({
          ...holding,
          today: 0,
          ytd: 0,
          price: 0,
          name: holding.name
        });
      }
    }
    
    portfolioData[market] = {
      holdings: holdingsData,
      today: sumToday,
      ytd: sumYtd
    };
  }
  
  renderAllPortfolios();
}

function renderAllPortfolios() {
  for (const market of ['us', 'hk', 'cn']) {
    renderPortfolio(market);
  }
}

function renderPortfolio(market) {
  const data = portfolioData[market];
  const tbody = document.getElementById(`${market}-tbody`);
  const todaySpan = document.getElementById(`${market}-today`);
  const ytdSpan = document.getElementById(`${market}-ytd`);
  
  if (!tbody) return;
  
  // 更新头部统计
  if (todaySpan) {
    todaySpan.innerHTML = formatStatValue(data.today);
  }
  if (ytdSpan) {
    ytdSpan.innerHTML = formatStatValue(data.ytd);
  }
  
  // 渲染表格
  const html = data.holdings.map(holding => `
    <tr>
      <td><div class="weight">${holding.weight}</div></td>
      <td>
        <div class="code">${holding.ticker}</div>
        <div class="name">${holding.name}</div>
      </div></td>
      <td>${formatPercentValue(holding.today)}</div></td>
      <td>${formatPercentValue(holding.ytd)}</div></td>
    </tr>
  `).join('');
  
  tbody.innerHTML = html;
}

// ==================== 自选股管理 ====================
let watchlist = [];

// 预置自选股：卓胜微(300782) 自选日 2026-03-26
const PRESET_WATCHLIST = [
  {
    id: 1732464000000,
    code: '300782',
    market: 'cn',
    name: '卓胜微',
    costPrice: 0, // 将从API获取2026-03-26的价格
    addTime: '2026-03-26',
    timestamp: 1742976000000
  }
];

async function loadWatchlist() {
  const saved = localStorage.getItem('stock_watchlist');
  if (saved) {
    watchlist = JSON.parse(saved);
  } else {
    watchlist = PRESET_WATCHLIST;
    // 获取卓胜微的历史价格（这里使用当前价格作为演示，实际应该调用历史API）
    await updateWatchlistCostPrice();
    saveWatchlist();
  }
  await renderWatchlist();
}

async function updateWatchlistCostPrice() {
  // 获取卓胜微当前价格作为成本价（演示用）
  // 实际应用中应该调用历史数据API获取2026-03-26的收盘价
  const data = await fetchRealtimeData(['sz300782']);
  if (data['sz300782']) {
    const preset = watchlist.find(w => w.code === '300782');
    if (preset && preset.costPrice === 0) {
      // 这里使用当前价格的95%模拟3月26日的价格（实际应该从历史API获取）
      preset.costPrice = data['sz300782'].price * 0.95;
    }
  }
}

function saveWatchlist() {
  localStorage.setItem('stock_watchlist', JSON.stringify(watchlist));
  const countSpan = document.getElementById('watchlist-count');
  if (countSpan) countSpan.textContent = watchlist.length;
}

async function addStock() {
  const input = document.getElementById('stockCodeInput');
  let code = input.value.trim().toUpperCase();
  
  if (!code) {
    alert('请输入股票代码');
    return;
  }
  
  // 判断市场
  let market = '';
  if (/^\d{5}$/.test(code)) {
    market = 'hk';
  } else if (/^\d{6}$/.test(code)) {
    market = 'cn';
  } else if (/^[A-Z]{1,5}$/.test(code)) {
    market = 'us';
  } else {
    alert('请输入正确的股票代码格式：\n港股：5位数字\nA股：6位数字\n美股：字母代码');
    return;
  }
  
  // 检查是否已存在
  if (watchlist.some(item => item.code === code && item.market === market)) {
    alert('该股票已在自选列表中');
    return;
  }
  
  // 获取实时数据
  const tencentCode = getTencentCode(code, market);
  const data = await fetchRealtimeData([tencentCode]);
  const stockData = data[tencentCode];
  
  if (!stockData || !stockData.price) {
    alert('获取股票信息失败，请检查代码是否正确');
    return;
  }
  
  // 添加到自选列表
  const newStock = {
    id: Date.now(),
    code: code,
    market: market,
    name: stockData.name,
    costPrice: stockData.price,
    addTime: new Date().toLocaleString(),
    timestamp: Date.now()
  };
  
  watchlist.unshift(newStock);
  saveWatchlist();
  await renderWatchlist();
  input.value = '';
  alert(`成功添加 ${stockData.name}(${code})`);
}

function deleteStock(id) {
  if (confirm('确定要删除该自选股吗？')) {
    watchlist = watchlist.filter(item => item.id !== id);
    saveWatchlist();
    renderWatchlist();
  }
}

async function renderWatchlist() {
  const tbody = document.getElementById('watchlist-tbody');
  if (!tbody) return;
  
  if (watchlist.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px;">暂无自选股，请在上方添加</td></tr>';
    return;
  }
  
  // 获取所有自选股的实时数据
  const symbols = watchlist.map(stock => getTencentCode(stock.code, stock.market));
  const realtimeData = await fetchRealtimeData(symbols);
  
  let html = '';
  for (const stock of watchlist) {
    const tencentCode = getTencentCode(stock.code, stock.market);
    const realtime = realtimeData[tencentCode];
    
    if (!realtime) {
      html += `
        <tr>
          <td><div class="code">${stock.code}</div></td>
          <td><div class="name">${stock.name || '获取中...'}</div></td>
          <td>--</td>
          <td><span class="pct-loading">--</span></td>
          <td><span class="pct-loading">--</span></td>
          <td><div class="watch-time">${stock.addTime}</div></td>
          <td><button class="delete-btn" onclick="deleteStock(${stock.id})">删除</button></td>
        </tr>
      `;
      continue;
    }
    
    // 计算累计收益
    const profit = ((realtime.price - stock.costPrice) / stock.costPrice) * 100;
    const changeClass = realtime.change > 0 ? 'pct-up' : realtime.change < 0 ? 'pct-down' : 'pct-flat';
    const changeSign = realtime.change > 0 ? '+' : '';
    const profitClass = profit > 0 ? 'pct-up' : profit < 0 ? 'pct-down' : 'pct-flat';
    const profitSign = profit > 0 ? '+' : '';
    
    html += `
      <tr>
        <td><div class="code">${stock.code}</div></td>
        <td><div class="name">${realtime.name}</div></td>
        <td class="stat-value">${realtime.price.toFixed(2)}</td>
        <td><span class="${changeClass}">${changeSign}${realtime.change.toFixed(2)}%</span></td>
        <td><span class="${profitClass}">${profitSign}${profit.toFixed(2)}%</span></td>
        <td><div class="watch-time">${stock.addTime}</div></td>
        <td><button class="delete-btn" onclick="deleteStock(${stock.id})">删除</button></td>
      </tr>
    `;
  }
  
  tbody.innerHTML = html;
  document.getElementById('watchlist-count').textContent = watchlist.length;
}

// ==================== 工具函数 ====================
function formatPercentValue(value) {
  if (value === undefined || value === null || isNaN(value)) {
    return '<span class="pct-loading">--</span>';
  }
  const cls = value > 0 ? 'pct-up' : value < 0 ? 'pct-down' : 'pct-flat';
  const sign = value > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${value.toFixed(2)}%</span>`;
}

function formatStatValue(value) {
  if (value === undefined || value === null || isNaN(value)) return '--';
  const cls = value > 0 ? 'stat-up' : value < 0 ? 'stat-down' : '';
  const sign = value > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${value.toFixed(2)}%</span>`;
}

function updateTimeDisplay() {
  const now = new Date();
  const timeStr = now.toTimeString().slice(0, 8);
  const timeElement = document.getElementById('last-update');
  if (timeElement) timeElement.textContent = timeStr;
}

// ==================== UI 交互 ====================
function initTabs() {
  const tabs = document.querySelectorAll('.tab');
  const sections = document.querySelectorAll('.section');
  
  const switchTab = (target) => {
    sections.forEach(section => {
      const shouldHide = target !== 'all' && section.dataset.section !== target;
      section.classList.toggle('hidden', shouldHide);
    });
  };
  
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      switchTab(tab.dataset.target);
    });
  });
}

async function refreshAllData() {
  await updatePortfolioData();
  await renderWatchlist();
  updateTimeDisplay();
}

// ==================== 初始化 ====================
async function init() {
  initTabs();
  await refreshAllData();
  await loadWatchlist();
  updateTimeDisplay();
  
  // 绑定事件
  document.getElementById('refreshBtn').addEventListener('click', async () => {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.textContent = '刷新中...';
    await refreshAllData();
    btn.disabled = false;
    btn.textContent = '刷新';
  });
  
  document.getElementById('addStockBtn').addEventListener('click', addStock);
  document.getElementById('stockCodeInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') addStock();
  });
  
  // 定时刷新
  setInterval(refreshAllData, CONFIG.REFRESH_INTERVAL);
  setInterval(updateTimeDisplay, CONFIG.TIME_UPDATE_INTERVAL);
}

// 启动应用
init();
</script>
