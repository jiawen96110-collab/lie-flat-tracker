<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>躺平组合·数据整理</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main-container">

  <div class="header">
    <h1>🛏 躺平组合·数据整理</h1>
    <p class="subtitle">三市场ETF组合 · 数据整理（Z先生参考）</p>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <div class="dot" id="statusDot"></div>
      <span class="time" id="statusText">正在加载数据...</span>
      <span class="update-badge" id="updateBadge"></span>
    </div>
    <div class="status-right">
      <button class="btn-refresh" id="btnRefresh" onclick="refreshAll()">⟳ 刷新</button>
    </div>
  </div>

  <!-- 三市场组合 -->
  <div class="portfolios" id="portfolios">
    <div class="portfolio us" id="port-us">
      <div class="portfolio-header">
        <div class="left"><span class="flag">🇺🇸</span><span class="name">美股躺平组合</span></div>
        <span class="market-tag">全球科技+资源与另类资产</span>
      </div>
      <div class="portfolio-summary" id="summary-us">
        <div class="summary-item neutral"><div class="summary-label">当日</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
        <div class="summary-item neutral"><div class="summary-label">YTD</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
      </div>
      <div class="holdings">
        <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
        <div id="holdings-us"></div>
      </div>
    </div>

    <div class="portfolio hk" id="port-hk">
      <div class="portfolio-header">
        <div class="left"><span class="flag">🇭🇰</span><span class="name">港股躺平组合</span></div>
        <span class="market-tag">跨市场平衡配置，攻守兼备</span>
      </div>
      <div class="portfolio-summary" id="summary-hk">
        <div class="summary-item neutral"><div class="summary-label">当日</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
        <div class="summary-item neutral"><div class="summary-label">YTD</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
      </div>
      <div class="holdings">
        <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
        <div id="holdings-hk"></div>
      </div>
    </div>

    <div class="portfolio a" id="port-a">
      <div class="portfolio-header">
        <div class="left"><span class="flag">🇨🇳</span><span class="name">A股躺平组合</span></div>
        <span class="market-tag">科技主线为主，周期资产辅助</span>
      </div>
      <div class="portfolio-summary" id="summary-a">
        <div class="summary-item neutral"><div class="summary-label">当日</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
        <div class="summary-item neutral"><div class="summary-label">YTD</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
      </div>
      <div class="holdings">
        <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
        <div id="holdings-a"></div>
      </div>
    </div>
  </div>

  <!-- 数据整理（Z先生参考） -->
  <div class="share-section">
    <div class="share-card">
      <div class="share-card-header">
        <div class="label">
          <span class="flag">📈</span>
          <span class="name">数据整理</span>
        </div>
        <span class="share-note">仅做记录</span>
      </div>

      <div class="share-toolbar">
        <span class="sort-label">排序：</span>
        <button class="sort-btn active" id="sort-default"    onclick="sortShares('default')">📋 默认</button>
        <button class="sort-btn"        id="sort-since-desc" onclick="sortShares('since-desc')">累计 ↓</button>
        <button class="sort-btn"        id="sort-date-desc"  onclick="sortShares('date-desc')">🕐 最新</button>
      </div>

      <div class="share-table-header">
        <span></span>
        <span>代码</span>
        <span>名称</span>
        <span style="text-align:right">当日</span>
        <span style="text-align:right">累计</span>
      </div>
      <div class="share-items" id="share-list"></div>
    </div>
  </div>

  <div class="footer">
    数据来源: 腾讯财经 · 自动刷新间隔 30s<br>
    <span class="footer-note">本内容为Z先生公开分享的ETF组合与行业概念数据整理，如要参与请自行研究决策。市场有风险，投资需谨慎。</span>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
