<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>躺平组合 · 专业行情版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --border: #e4e7ec;
      --text-primary: #1d2129;
      --text-secondary: #4e5969;
      --text-tertiary: #86909c;
      --brand: #0070e0;
      --up: #00b42a;
      --down: #f77272;
      --flat-bg: #f2f3f5;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --transition: all 0.25s cubic - bezier(0.32, 0.72, 0, 1);
      --font: -apple - system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans - serif;
      --mono: 'SF Mono', Menlo, Monaco, Consolas, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      padding-bottom: 40px;
      -webkit - font - smoothing: antialiased;
    }

    .header {
      position: sticky;
      top: 0;
      z - index: 99;
      background: rgba(255, 255, 255, 0.85);
      backdrop - filter: blur(20px);
      border-bottom: 0.5px solid var(--border);
    }

    .header - inner {
      max - width: 720px;
      margin: 0 auto;
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space - between;
    }

    .title - group h1 {
      font-size: 19px;
      font - weight: 600;
      line - height: 1.1;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .title - group.sub {
      font-size: 12px;
      color: var(--text - tertiary);
      margin - top: 2px;
    }

    .status - bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text - secondary);
    }

    #refreshBtn {
      padding: 6px 12px;
      border - radius: 12px;
      border: none;
      background: var(--brand);
      color: #fff;
      font-size: 12px;
      font - weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    #refreshBtn:active {
      transform: scale(0.96);
      opacity: 0.9;
    }

    .tabbar {
      max - width: 720px;
      margin: 0 auto;
      padding: 8px 20px;
    }

    .tabs {
      display: flex;
      background: var(--flat - bg);
      border - radius: 12px;
      padding: 2px;
      gap: 2px;
    }

    .tab {
      flex: 1;
      padding: 8px 6px;
      border - radius: 10px;
      border: none;
      background: transparent;
      font-size: 13px;
      font - weight: 500;
      color: var(--text - secondary);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .tab.active {
      background: var(--card);
      color: var(--text - primary);
      font - weight: 600;
      box - shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    }

    .container {
      max - width: 720px;
      margin: 0 auto;
      padding: 8px 20px 20px;
      display: flex;
      flex - direction: column;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border - radius: var(--radius);
      box - shadow: var(--shadow);
      overflow: hidden;
      transition: var(--transition);
    }

    .section.hidden {
      display: none;
    }

    .card - header {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space - between;
      border-bottom: 0.5px solid var(--border);
    }

    .card - left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      padding: 4px 8px;
      border - radius: 8px;
      font-size: 11px;
      font - weight: 600;
      line - height: 1;
      white - space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge - us {
      background: rgba(0, 112, 224, 0.1);
      color: var(--brand);
    }

    .badge - hk {
      background: rgba(0, 180, 42, 0.1);
      color: var(--up);
    }

    .badge - cn {
      background: rgba(247, 114, 114, 0.1);
      color: var(--down);
    }

    .badge - z {
      background: rgba(123, 31, 162, 0.1);
      color: #7b1fa2;
    }

    .card - title {
      font-size: 15px;
      font - weight: 600;
    }

    .card - stats {
      text - align: right;
      font-size: 12px;
      line - height: 1.4;
    }

    .stat - label {
      color: var(--text - tertiary);
      margin - right: 4px;
    }

    .stat - value {
      font - weight: 600;
      font - family: var(--mono);
    }

    .stat - up {
      color: var(--up);
    }

    .stat - down {
      color: var(--down);
    }

    .table - wrap {
      width: 100%;
    }

    table {
      width: 100%;
      border - collapse: collapse;
    }

    thead th {
      padding: 10px 16px 8px;
      font-size: 11px;
      font - weight: 500;
      color: var(--text - tertiary);
      text - align: right;
      border-bottom: 0.5px solid var(--border);
    }

    thead th:first - child,
    thead th:nth - child(2) {
      text - align: left;
    }

    tbody tr {
      border-bottom: 0.5px solid var(--border);
    }

    tbody tr:last - child {
      border-bottom: none;
    }

    td {
      padding: 14px 16px;
      font-size: 14px;
      text - align: right;
      vertical - align: middle;
    }

    td:first - child,
    td:nth - child(2) {
      text - align: left;
    }

    .weight {
      font - family: var(--mono);
      font-size: 12px;
      color: var(--text - secondary);
    }

    .code {
      font - family: var(--mono);
      font-size: 14px;
      font - weight: 600;
      color: var(--brand);
      display: block;
      line - height: 1.1;
    }

    .name {
      font-size: 13px;
      color: var(--text - secondary);
      margin - top: 2px;
    }

    .note {
      font-size: 11px;
      color: var(--text - tertiary);
      margin - top: 2px;
    }

    .pct {
      display: inline - block;
      min - width: 72px;
      padding: 6px 8px;
      border - radius: 10px;
      font - family: var(--mono);
      font-size: 13px;
      font - weight: 600;
      text - align: center;
      line - height: 1;
    }

    .pct - up {
      color: var(--up);
      background: rgba(0, 180, 42, 0.08);
    }

    .pct - down {
      color: var(--down);
      background: rgba(247, 114, 114, 0.08);
    }

    .pct - flat {
      color: var(--text - secondary);
      background: var(--flat - bg);
    }

    .pct - loading {
      color: var(--text - tertiary);
      background: var(--flat - bg);
      font-size: 12px;
    }

    .footer {
      max - width: 720px;
      margin: 0 auto;
      padding: 12px 20px;
      text - align: center;
      font-size: 11px;
      color: var(--text - tertiary);
      line - height: 1.5;
    }
  </style>
</head>

    <div class="card section" data - section="cn">

  </div>
