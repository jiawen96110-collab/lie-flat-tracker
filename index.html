<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>躺平投资组合追踪器</title>
<style>
  :root {
  --bg-deep: #05070f;
  --bg-mid: #0b1020;

  --card: rgba(18, 22, 36, 0.6);
  --card-hover: rgba(28, 34, 58, 0.7);

  --border: rgba(255,255,255,0.08);

  --text: #e6edf3;
  --text-dim: #7c8599;

  --up: #ef4444;
  --down: #22c55e;

  --up-bg: rgba(239,68,68,0.12);
  --down-bg: rgba(34,197,94,0.12);
}

/* 🌌 NASA级背景 */
body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  color: var(--text);
  padding: 20px;

  background:
    radial-gradient(circle at 20% 30%, rgba(124,140,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(255,184,77,0.12), transparent 40%),
    radial-gradient(circle at 50% 80%, rgba(255,107,107,0.12), transparent 40%),
    linear-gradient(180deg, var(--bg-deep), var(--bg-mid));

  background-attachment: fixed;
}

/* 星空颗粒 */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.12;
  pointer-events: none;
}

/* 标题 */
.header h1 {
  font-size: 2.2rem;
  letter-spacing: 1px;
  background: linear-gradient(135deg,#7c8cff,#ffb84d,#ff6b6b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 卡片（核心升级） */
.portfolio,
.watch-card {
  background: var(--card);
  backdrop-filter: blur(18px);

  border: 1px solid var(--border);
  border-radius: 18px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.7),
    inset 0 0 20px rgba(255,255,255,0.03);
}

.portfolio:hover,
.watch-card:hover {
  transform: translateY(-6px);

  box-shadow:
    0 30px 80px rgba(0,0,0,0.9),
    0 0 60px rgba(124,140,255,0.15);
}

/* 分割线 */
.portfolio-header,
.portfolio-summary,
.watch-card-header {
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

/* 数字（金融终端感） */
.summary-value,
.change,
.since-pct {
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
}

/* 🔴红涨 🟢绿跌 */
.positive-text { color: var(--up); }
.negative-text { color: var(--down); }

.summary-item.positive { background: var(--up-bg); }
.summary-item.positive .summary-value { color: var(--up); }

.summary-item.negative { background: var(--down-bg); }
.summary-item.negative .summary-value { color: var(--down); }

/* 行 hover */
.holding:hover,
.watch-item:hover {
  background: rgba(255,255,255,0.04);
}

/* 自选涨跌更突出 */
.since-pct {
  font-size: 1.6rem;
  font-weight: 700;
}

/* 标签 */
.market-tag,
.watch-market-tag {
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(6px);
}

/* 按钮 */
.btn-refresh {
  background: rgba(124,140,255,0.15);
  border: 1px solid rgba(124,140,255,0.4);
  color: #9aa8ff;
}
.btn-refresh:hover {
  background: rgba(124,140,255,0.3);
}

/* 状态灯 */
.dot {
  box-shadow: 0 0 12px currentColor;
}

/* 表头 */
.change-header {
  color: rgba(255,255,255,0.45);
}

/* 标签优化 */
.sector-tag {
  background: rgba(255,184,77,0.15);
  color: #ffb84d;
}
.logic-tag {
  background: rgba(124,140,255,0.15);
  color: #7c8cff;
}
</style>

</head>
<body>

<div class="header">
  <h1>躺平投资组合追踪器</h1>
  <p class="subtitle">三市场 ETF 组合 · 实时行情 · Z先生自选追踪</p>
</div>

<div class="status-bar">
  <div class="dot" id="statusDot"></div>
  <span class="time" id="statusText">正在加载数据...</span>
  <button class="btn-refresh" id="btnRefresh" onclick="refreshAll()">刷新</button>
</div>

<!-- ── ETF PORTFOLIOS ── -->

<div class="portfolios" id="portfolios">
  <!-- US -->
  <div class="portfolio us" id="port-us">
    <div class="portfolio-header">
      <div class="label"><span class="flag">🇺🇸</span><span class="name">美股躺平组合</span></div>
      <span class="market-tag">US Market</span>
    </div>
    <div class="portfolio-summary" id="summary-us">
      <div class="summary-item neutral"><div class="summary-label">当日涨跌</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
      <div class="summary-item neutral"><div class="summary-label">年初至今</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
    </div>
    <div class="holdings">
      <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
      <div id="holdings-us"></div>
    </div>
  </div>
  <!-- HK -->
  <div class="portfolio hk" id="port-hk">
    <div class="portfolio-header">
      <div class="label"><span class="flag">🇭🇰</span><span class="name">港股躺平组合</span></div>
      <span class="market-tag">HK Market</span>
    </div>
    <div class="portfolio-summary" id="summary-hk">
      <div class="summary-item neutral"><div class="summary-label">当日涨跌</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
      <div class="summary-item neutral"><div class="summary-label">年初至今</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
    </div>
    <div class="holdings">
      <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
      <div id="holdings-hk"></div>
    </div>
  </div>
  <!-- A -->
  <div class="portfolio a" id="port-a">
    <div class="portfolio-header">
      <div class="label"><span class="flag">🇨🇳</span><span class="name">A股躺平组合</span></div>
      <span class="market-tag">CN Market</span>
    </div>
    <div class="portfolio-summary" id="summary-a">
      <div class="summary-item neutral"><div class="summary-label">当日涨跌</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
      <div class="summary-item neutral"><div class="summary-label">年初至今</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
    </div>
    <div class="holdings">
      <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
      <div id="holdings-a"></div>
    </div>
  </div>
</div>

<!-- ── WATCHLIST ── -->

<div class="watch-section">
  <div class="watch-card">
    <div class="watch-card-header">
      <div class="label">
        <span class="flag">⭐</span>
        <span class="name">Z先生分享标的追踪</span>
      </div>
      <span class="watch-market-tag">自选追踪</span>
    </div>
    <div class="watch-banner">
      📡 实时跟踪 · <strong style="color:var(--text)">分享以来涨跌</strong>从推荐日收盘价起算
    </div>
    <div class="watch-items" id="watch-list"></div>
  </div>
</div>

<div class="footer">
  数据来源: 腾讯财经 · 自动刷新间隔 30s · 仅供参考，不构成投资建议
</div>

<details style="max-width:1400px;margin:8px auto;padding:0 0">
  <summary style="color:#444;font-size:12px;cursor:pointer;padding:0 4px">调试日志</summary>
  <pre id="dbg" style="background:#0a0a0f;color:#6a6;font-size:11px;padding:10px;border-radius:8px;max-height:300px;overflow:auto;white-space:pre-wrap"></pre>
</details>

<script>
// ============ 调试日志 ============
function dbg(msg) {
  const el = document.getElementById('dbg');
  if (el) { el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n'; el.scrollTop = el.scrollHeight; }
}

// ============ 组合定义 ============
const PORTFOLIOS = {
  us: {
    name: '美股躺平组合',
    holdings: [
      { code: 'usQQQ',  display: 'QQQ',  nameCn: '纳指100 ETF',     weight: 25 },
      { code: 'usSPY',  display: 'SPY',  nameCn: '标普500 ETF',      weight: 25 },
      { code: 'usRING', display: 'RING', nameCn: '全球黄金矿股 ETF', weight: 20 },
      { code: 'usCOPX', display: 'COPX', nameCn: '全球铜矿股 ETF',  weight: 20 },
      { code: 'usBITB', display: 'BITB', nameCn: '比特币 ETF',       weight: 10 },
    ]
  },
  hk: {
    name: '港股躺平组合',
    holdings: [
      { code: 'hk03455', display: '03455', nameCn: '纳指100 ETF',    weight: 25 },
      { code: 'hk03132', display: '03132', nameCn: '全球半导体 ETF', weight: 20 },
      { code: 'hk03147', display: '03147', nameCn: '中国创业板 ETF', weight: 20 },
      { code: 'hk03110', display: '03110', nameCn: '恒生高股息 ETF', weight: 20 },
      { code: 'hk02840', display: '02840', nameCn: '黄金 ETF',        weight: 15 },
    ]
  },
  a: {
    name: 'A股躺平组合',
    holdings: [
      { code: 'sh513390', display: '513390', nameCn: '纳指100 ETF',  weight: 25 },
      { code: 'sz159652', display: '159652', nameCn: '有色50 ETF',   weight: 25 },
      { code: 'sh588200', display: '588200', nameCn: '科创芯片 ETF', weight: 25 },
      { code: 'sh515880', display: '515880', nameCn: '通信 ETF',     weight: 15 },
      { code: 'sh518880', display: '518880', nameCn: '黄金 ETF',     weight: 10 },
    ]
  }
};

// ============ YTD 基准价 ============
const YTD_BASE = {
  'usQQQ':    613.537, 'usSPY':    680.063, 'usRING':   73.64,
  'usCOPX':   71.78,   'usBITB':   47.44,
  'hk03455':  4809.267,'hk03132':  37.56,   'hk03147':  12.46,
  'hk03110':  30.12,   'hk02840':  3112.00,
  'sh513390': 2.107,   'sz159652': 1.674,   'sh588200': 2.342,
  'sh515880': 1.027,   'sh518880': 9.301,
};

// ============ 自选追踪 ============
const WATCH = [
  {
    ticker:  '300782',
    name:    '卓胜微',
    sym:     'sz300782',
    date:    '2026-03-26',
    price:   87.00,
    sector:  '射频芯片',
    logic:   'AI手机射频升级 + 国产替代',
    note:    '国内射频前端龙头，垄断安卓高端机射频模组，受益AI手机射频复杂度提升与美国制裁替代窗口'
  },
  {
    ticker:  'MRVL',
    name:    '迈威尔科技',
    sym:     'usMRVL',
    date:    '2026-03-18',
    price:   87.58,
    sector:  'AI芯片/光互连',
    logic:   'AI数据中心定制芯片 + 英伟达战略投资加持',
    note:    'AI数据中心核心标的，ASIC定制芯片+硅光互连双轮驱动，英伟达20亿战略入股，光模块需求爆发最大受益者之一'
  },
  {
    ticker:  'AAOI',
    name:    '应用光电',
    sym:     'usAAOI',
    date:    '2026-04-10',
    price:   150.60,
    sector:  '光模块/光通信',
    logic:   'AI算力光互连爆发 + 1.6T超高速光模块放量',
    note:    '美国光模块龙头，垂直整合自研激光器降本，已获云厂商2亿美元1.6T订单，2026年目标营收超10亿美元'
  }
];

// ============ JSONP ============
let _jid = 0;
function qqJsonp(codes, timeout = 8000) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    const timer = setTimeout(() => { s.remove(); reject(new Error('timeout')); }, timeout);
    s.onload = () => {
      clearTimeout(timer); s.remove();
      const results = {};
      codes.forEach(c => { const val = window['v_' + c]; if (val) results[c] = val; });
      resolve(results);
    };
    s.onerror = () => { clearTimeout(timer); s.remove(); reject(new Error('script error')); };
    s.src = `https://qt.gtimg.cn/q=${codes.join(',')}`;
    document.head.appendChild(s);
  });
}

// ============ 解析行情 ============
function parseQuote(code, raw) {
  if (!raw) return null;
  const parts = raw.split('~');
  dbg(`  ${code} [0]=${parts[0]} [3]=${parts[3]} [32]=${parts[32]}`);
  const price = parseFloat(parts[3]);
  if (!price || price <= 0) return null;
  let dailyPct = parseFloat(parts[32]);
  if (isNaN(dailyPct)) {
    const prev = parseFloat(code.startsWith('hk') ? parts[5] : parts[4]);
    if (prev > 0) dailyPct = ((price - prev) / prev) * 100;
  }
  return { code, price, dailyPct: isNaN(dailyPct) ? null : dailyPct };
}

// ============ 缓存 ============
const CACHE = {
  us:  { rt: {}, ytd: {}, loaded: false },
  hk:  { rt: {}, ytd: {}, loaded: false },
  a:   { rt: {}, ytd: {}, loaded: false },
};
const WATCH_CACHE = {}; // sym -> { price, dailyPct }

// ============ 格式化 ============
function fmt(v) {
  if (v == null || isNaN(v)) return '—';
  return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
}
function pc(v) {
  if (v == null || isNaN(v)) return 'neutral-text';
  return v > 0.001 ? 'positive-text' : v < -0.001 ? 'negative-text' : 'neutral-text';
}
function sc(v) {
  if (v == null || isNaN(v)) return 'neutral';
  return v > 0.001 ? 'positive' : v < -0.001 ? 'negative' : 'neutral';
}

// ============ ETF 渲染 ============
function renderHoldings(key, rt, ytd) {
  const port = PORTFOLIOS[key];
  document.getElementById(`holdings-${key}`).innerHTML = port.holdings.map(h => {
    const q = rt[h.code] || {};
    const d = q.dailyPct, y = ytd[h.code];
    return `<div class="holding">
      <div class="weight">${h.weight}%</div>
      <div class="info"><div class="ticker">${h.display}</div><div class="name-cn">${h.nameCn}</div></div>
      <div class="change ${pc(d)}">${fmt(d)}</div>
      <div class="change ${pc(y)}">${fmt(y)}</div>
    </div>`;
  }).join('');
}

function renderSummary(key, rt, ytd) {
  const port = PORTFOLIOS[key];
  let dW=0, yW=0, dOk=false, yOk=false;
  port.holdings.forEach(h => {
    const w = h.weight/100, q = rt[h.code]||{}, y = ytd[h.code];
    if (q.dailyPct != null) { dW += q.dailyPct*w; dOk=true; }
    if (y != null) { yW += y*w; yOk=true; }
  });
  const dv = dOk?dW:null, yv = yOk?yW:null;
  document.getElementById(`summary-${key}`).innerHTML = `
    <div class="summary-item ${sc(dv)}"><div class="summary-label">当日涨跌</div><div class="summary-value">${fmt(dv)}</div></div>
    <div class="summary-item ${sc(yv)}"><div class="summary-label">年初至今</div><div class="summary-value">${fmt(yv)}</div></div>`;
}

function renderLoadingHoldings(key) {
  const port = PORTFOLIOS[key];
  document.getElementById(`holdings-${key}`).innerHTML = port.holdings.map(h =>
    `<div class="holding">
      <div class="weight">${h.weight}%</div>
      <div class="info"><div class="ticker">${h.display}</div><div class="name-cn">${h.nameCn}</div></div>
      <div class="change"><div class="loading-skeleton" style="width:50px;height:16px;margin-left:auto"></div></div>
      <div class="change"><div class="loading-skeleton" style="width:50px;height:16px;margin-left:auto"></div></div>
    </div>`
  ).join('');
}

// ============ 自选渲染 ============
function todayPill(v) {
  if (v == null || isNaN(v)) return '<span class="today-pill flat">今日 —</span>';
  const cls = v > 0.001 ? 'up' : v < -0.001 ? 'down' : 'flat';
  return `<span class="today-pill ${cls}">今日 ${fmt(v)}</span>`;
}

function renderWatch() {
  const container = document.getElementById('watch-list');
  if (!WATCH.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:14px">暂无分享标的</div>';
    return;
  }
  container.innerHTML = WATCH.map((w, i) => {
    const d = WATCH_CACHE[w.sym] || {};
    let sinceHtml, sinceClass = 'neutral-text';
    if (w.price && d.price > 0) {
      const pct = (d.price - w.price) / w.price * 100;
      sinceClass = pct > 0.001 ? 'positive-text' : pct < -0.001 ? 'negative-text' : 'neutral-text';
      sinceHtml = `
        <span class="since-pct ${sinceClass}">${fmt(pct)}</span>
        <span class="since-date">自 ${w.date}<br>¥${w.price.toFixed(2)} → ¥${d.price.toFixed(2)}</span>`;
    } else {
      sinceHtml = `
        <span class="since-pct neutral-text" style="font-size:1.2rem"><div class="loading-skeleton" style="width:70px;height:22px;margin-left:auto"></div></span>
        <span class="since-date">自 ${w.date}</span>`;
    }
    return `<div class="watch-item">
      <div class="watch-left">
        <div class="watch-header">
          <span class="watch-ticker">${w.ticker}</span>
          <span class="watch-name">${w.name}</span>
          <span class="sector-tag">${w.sector}</span>
          ${w.logic ? `<span class="logic-tag">${w.logic}</span>` : ''}
        </div>
        <div class="watch-note">${w.note}</div>
        <div class="watch-meta">${todayPill(d.dailyPct)}</div>
      </div>
      <div class="watch-right">${sinceHtml}</div>
    </div>`;
  }).join('');
}

// ============ 加载 ============
async function loadPortfolio(key) {
  const port = PORTFOLIOS[key];
  const c = CACHE[key];
  if (!c.loaded) renderLoadingHoldings(key);
  try {
    const codes = port.holdings.map(h => h.code);
    dbg(`加载 ${key}: ${codes.join(',')}`);
    const rawMap = await qqJsonp(codes);
    port.holdings.forEach(h => {
      const raw = rawMap[h.code];
      if (raw) {
        const q = parseQuote(h.code, raw);
        if (q) {
          c.rt[h.code] = q;
          const base = YTD_BASE[h.code];
          if (base > 0 && q.price > 0) c.ytd[h.code] = ((q.price - base) / base) * 100;
        }
      }
    });
  } catch(e) { dbg(`${key} 失败: ${e.message}`); }
  renderHoldings(key, c.rt, c.ytd);
  renderSummary(key, c.rt, c.ytd);
  c.loaded = true;
}

async function loadWatch() {
  try {
    const codes = WATCH.map(w => w.sym);
    dbg(`加载自选: ${codes.join(',')}`);
    const rawMap = await qqJsonp(codes);
    WATCH.forEach(w => {
      const raw = rawMap[w.sym];
      if (raw) {
        const q = parseQuote(w.sym, raw);
        if (q) WATCH_CACHE[w.sym] = q;
      }
    });
  } catch(e) { dbg(`自选失败: ${e.message}`); }
  renderWatch();
}

// ============ 状态 & 刷新 ============
function setStatus(s, m) {
  document.getElementById('statusDot').className = 'dot ' + (s==='ok'?'':s==='loading'?'loading':'error');
  document.getElementById('statusText').textContent = m;
}

let _timer = null, _first = true;
async function refreshAll() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  const t0 = performance.now();
  setStatus('loading', _first ? '正在获取数据...' : '刷新中...');
  try {
    await Promise.allSettled([
      ...['us','hk','a'].map(k => loadPortfolio(k)),
      loadWatch()
    ]);
    _first = false;
    const ms = ((performance.now()-t0)/1000).toFixed(1);
    const now = new Date().toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    setStatus('ok', `最后更新: ${now} (${ms}s)`);
  } catch(e) {
    setStatus('error', '加载失败');
  }
  btn.disabled = false;
  clearTimeout(_timer);
  _timer = setTimeout(refreshAll, 30000);
}

// ============ 启动 ============
document.addEventListener('DOMContentLoaded', () => {
  ['us','hk','a'].forEach(k => renderLoadingHoldings(k));
  renderWatch();
  dbg('启动, 协议: ' + location.protocol);
  refreshAll();
});
</script>

</body>
</html>
