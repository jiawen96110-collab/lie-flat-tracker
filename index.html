<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>躺平组合 · Z先生跟踪</title>
<style>
/* 新增旗帜渐变样式 */
.flag-us {
  background: linear-gradient(180deg, #B22234 33.3%, #fff 33.3%, #fff 66.6%, #3C3B6E 66.6%);
}

.flag-hk {
  background: #EA2839;
  position: relative;
}

.flag-hk::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 6px;
  background: #fff;
  border-radius: 50%;
}

.flag-cn {
  background: #DE2910;
  position: relative;
}

.flag-cn::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 3px;
  width: 4px;
  height: 4px;
  background: #FFDE00;
  border-radius: 50%;
  box-shadow: 2px 0 0 #FFDE00, 0 2px 0 #FFDE00;
}

.flag-z {
  background: #7b1fa2;
  color: #fff;
  font-size: 10px;
  padding: 2px 4px;
  border-radius: 2px;
}
</style>
</head>
<body>
<!-- 其他代码保持不变 -->
</body>
</html>
