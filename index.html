<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>躺平组合 Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
  background:#f5f6f7;
  color:#111;
}

/* ===== 顶部 ===== */
.header{
  padding:16px;
  background:#fff;
  position:sticky;
  top:0;
  z-index:10;
  border-bottom:1px solid #eee;
}

.title{
  font-size:20px;
  font-weight:700;
}

.sub{
  font-size:12px;
  color:#888;
  margin-top:2px;
}

/* ===== 概览 ===== */
.summary{
  display:flex;
  gap:10px;
  padding:12px;
}

.card{
  flex:1;
  background:#fff;
  border-radius:12px;
  padding:12px;
}

.card-title{
  font-size:12px;
  color:#666;
}

.big{
  font-size:20px;
  font-weight:700;
  margin-top:4px;
}

/* ===== 区块 ===== */
.section{
  margin-top:10px;
}

.section-title{
  font-size:15px;
  font-weight:600;
  padding:12px;
  color:#333;
}

/* ===== 行卡片 ===== */
.row{
  background:#fff;
  margin:8px 12px;
  border-radius:12px;
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* 左边 */
.left{
  display:flex;
  flex-direction:column;
}

.code{
  font-weight:700;
  font-size:15px;
}

.name{
  font-size:12px;
  color:#777;
  margin-top:2px;
}

/* 中间 */
.middle{
  text-align:right;
}

.label{
  font-size:11px;
  color:#999;
}

/* 右边 */
.right{
  text-align:right;
}

.pct{
  font-weight:700;
  font-size:15px;
}

/* ===== 涨跌颜色 ===== */
.up{color:#ff3b30;}
.down{color:#00b050;}
.flat{color:#999;}

/* ===== 动画 ===== */
.flash{
  animation:flash 0.6s;
}
@keyframes flash{
  0%{opacity:0.3}
  100%{opacity:1}
}

/* ===== 自选说明 ===== */
.banner{
  margin:10px 12px;
  background:#fff7e6;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  color:#666;
}

/* ===== 小屏优化 ===== */
@media(max-width:430px){
  .big{font-size:18px}
  .pct{font-size:14px}
}
</style>
</head>

<body>

<div class="header">
  <div class="title">躺平组合</div>
  <div class="sub">Z先生无偿分享 · 实时跟踪</div>
</div>

<!-- 概览 -->
<div class="summary">
  <div class="card">
    <div class="card-title">美股</div>
    <div class="big" id="usTotal">--</div>
  </div>
  <div class="card">
    <div class="card-title">港股</div>
    <div class="big" id="hkTotal">--</div>
  </div>
  <div class="card">
    <div class="card-title">A股</div>
    <div class="big" id="cnTotal">--</div>
  </div>
</div>

<!-- 美股 -->
<div class="section">
  <div class="section-title">🇺🇸 美股组合</div>
  <div id="usList"></div>
</div>

<!-- 港股 -->
<div class="section">
  <div class="section-title">🇭🇰 港股组合</div>
  <div id="hkList"></div>
</div>

<!-- A股 -->
<div class="section">
  <div class="section-title">🇨🇳 A股组合</div>
  <div id="cnList"></div>
</div>

<!-- 自选 -->
<div class="section">
  <div class="section-title">⭐ 自选追踪</div>
  <div class="banner">从推荐价开始计算收益</div>
  <div id="watchList"></div>
</div>

<script>
const DATA = {
  us:[
    {t:'QQQ',n:'纳指100',w:25,p:0.14},
    {t:'SPY',n:'标普500',w:25,p:-0.07},
    {t:'RING',n:'黄金矿',w:20,p:1.58},
    {t:'COPX',n:'铜矿',w:20,p:2.4},
    {t:'BITB',n:'比特币',w:10,p:1.63}
  ],
  hk:[
    {t:'03455',n:'纳指',p:0.5},
    {t:'03132',n:'半导体',p:1.2}
  ],
  cn:[
    {t:'513390',n:'纳指',p:-0.3},
    {t:'159652',n:'有色',p:0.9}
  ],
  watch:[
    {t:'300782',n:'卓胜微',p:2.42,s:14.82}
  ]
};

function cls(v){
  if(v>0)return 'up';
  if(v<0)return 'down';
  return 'flat';
}

function row(item){
  return `
  <div class="row flash">
    <div class="left">
      <div class="code">${item.t}</div>
      <div class="name">${item.n}</div>
    </div>

    <div class="right">
      <div class="pct ${cls(item.p)}">
        ${item.p>0?'+':''}${item.p}%
      </div>
    </div>
  </div>
  `;
}

function render(){
  document.getElementById('usList').innerHTML =
    DATA.us.map(row).join('');

  document.getElementById('hkList').innerHTML =
    DATA.hk.map(row).join('');

  document.getElementById('cnList').innerHTML =
    DATA.cn.map(row).join('');

  document.getElementById('watchList').innerHTML =
    DATA.watch.map(i=>`
      <div class="row">
        <div class="left">
          <div class="code">${i.t}</div>
          <div class="name">${i.n}</div>
        </div>
        <div class="right">
          <div class="pct ${cls(i.p)}">${i.p}%</div>
          <div class="pct ${cls(i.s)}">${i.s}%</div>
        </div>
      </div>
    `).join('');
}

render();
</script>

</body>
</html>
