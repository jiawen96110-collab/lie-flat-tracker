<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>躺平组合 · 优化版</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8f9fa;
  --card:#fff;
  --t1:#1d1d1f;
  --t3:#666;
  --t4:#999;
  --red:#ff3b30;
  --green:#00b050;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
  background:var(--bg);
}

/* ===== 顶部 ===== */
.nav{
  position:sticky;top:0;
  background:#fff;
  padding:16px;
  border-bottom:1px solid #eee;
}
.nav h1{font-size:20px}
.sub{font-size:12px;color:#888}

/* ===== 概览 ===== */
.sum-row{
  display:flex;
  gap:10px;
  padding:12px;
}
.sum-card{
  flex:1;
  background:#fff;
  border-radius:12px;
  padding:12px;
}
.sum-today{
  font-size:18px;
  font-weight:700;
}

/* ===== 卡片 ===== */
.sc{
  background:#fff;
  margin:10px;
  border-radius:14px;
  overflow:hidden;
}

.sc-hd{
  padding:12px;
  font-weight:600;
  border-bottom:1px solid #eee;
}

/* ===== 表格 ===== */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed; /* ⭐关键 */
}

thead th{
  font-size:12px;
  color:#999;
  padding:10px;
  text-align:right;
}
thead th:first-child,
thead th:nth-child(2){
  text-align:left;
}

/* ⭐固定列宽 */
thead th:nth-child(1),
tbody td:nth-child(1){width:60px;}

thead th:nth-child(2),
tbody td:nth-child(2){width:42%;}

thead th:nth-child(3),
tbody td:nth-child(3){width:80px;}

thead th:nth-child(4),
tbody td:nth-child(4){width:100px;}

td{
  padding:12px 10px;
  font-size:14px;
  vertical-align:middle; /* ⭐关键 */
  text-align:right;
}
td:first-child,
td:nth-child(2){text-align:left;}

tbody tr{
  border-bottom:1px solid #f0f0f0;
}

/* ===== 标的列 ===== */
.asset{
  display:flex;
  align-items:center;
}
.asset-box{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.tk{
  font-weight:700;
  font-size:14px;
  line-height:1.2;
}
.nm{
  font-size:12px;
  color:var(--t3);
  line-height:1.2;
}

/* ===== 涨跌 ===== */
.p{
  font-size:13px;
  font-weight:700;
  min-width:64px;
  display:inline-block;
  text-align:center;
  padding:4px 6px;
  border-radius:6px;
}
.g{color:var(--red);background:rgba(255,59,48,.1)}
.r{color:var(--green);background:rgba(0,176,80,.1)}
.z{color:#999;background:#f2f2f2}

/* ===== 自选 ===== */
.sector-tag{
  font-size:11px;
  background:#fff3e0;
  padding:2px 6px;
  border-radius:4px;
  margin-bottom:4px;
  display:inline-block;
}
.note-wrap{
  display:block;
  font-size:12px;
  color:#666;
  line-height:1.4;
}

.since-big{
  font-weight:700;
  line-height:1.2;
}
.since-sub{
  font-size:11px;
  color:#999;
  line-height:1.3;
}

/* ===== 移动端优化 ===== */
@media(max-width:430px){

  td{padding:10px 8px;}

  .tk{font-size:13px;}
  .nm{font-size:11px;}

  .p{
    min-width:56px;
    font-size:12px;
  }
}
</style>
</head>

<body>

<div class="nav">
  <h1>躺平组合</h1>
  <div class="sub">Z先生无偿分享</div>
</div>

<!-- 概览 -->
<div class="sum-row">
  <div class="sum-card"><div>美股</div><div class="sum-today">+0.98%</div></div>
  <div class="sum-card"><div>港股</div><div class="sum-today">+1.85%</div></div>
  <div class="sum-card"><div>A股</div><div class="sum-today">+0.88%</div></div>
</div>

<!-- 美股 -->
<div class="sc">
  <div class="sc-hd">美股组合</div>
  <table>
    <thead>
      <tr><th>仓位</th><th>标的</th><th>今日</th><th>今年</th></tr>
    </thead>
    <tbody>

<tr>
<td>25%</td>
<td class="asset">
  <div class="asset-box">
    <span class="tk">QQQ</span>
    <span class="nm">纳斯达克100</span>
  </div>
</td>
<td><span class="p g">+0.14%</span></td>
<td><span class="p r">-0.55%</span></td>
</tr>

<tr>
<td>25%</td>
<td class="asset">
  <div class="asset-box">
    <span class="tk">SPY</span>
    <span class="nm">标普500</span>
  </div>
</td>
<td><span class="p r">-0.07%</span></td>
<td><span class="p r">-0.02%</span></td>
</tr>

    </tbody>
  </table>
</div>

<!-- 自选 -->
<div class="sc">
  <div class="sc-hd">自选追踪</div>
  <table>
    <thead>
      <tr><th>标的</th><th>逻辑</th><th>今日</th><th>以来</th></tr>
    </thead>
    <tbody>

<tr>
<td>
  <span class="tk">300782</span>
  <span class="nm">卓胜微</span>
</td>

<td>
  <span class="sector-tag">射频芯片</span>
  <span class="note-wrap">国产替代核心标的</span>
</td>

<td><span class="p g">+2.42%</span></td>

<td>
  <span class="since-big g">+14.82%</span>
  <span class="since-sub">87 → 99.8</span>
</td>
</tr>

    </tbody>
  </table>
</div>

</body>
</html>
