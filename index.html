<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>躺平投资组合追踪器</title>

<style>
<style>
:root {
  --bg: #0a0d14;
  --bg-soft: #0f1422;

  --card: rgba(26, 29, 40, 0.88);
  --card-border: rgba(255,255,255,0.06);

  --text: #e6edf7;
  --text-dim: #8b95a7;

  --accent-us: #6366f1;
  --accent-hk: #f59e0b;
  --accent-a: #ef4444;

  --green: #22c55e; /* 跌 */
  --red: #ef4444;   /* 涨 */

  --green-bg: rgba(34,197,94,0.12);
  --red-bg: rgba(239,68,68,0.12);
}

/* ===== 基础 ===== */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC','Microsoft YaHei', sans-serif;
  background:
    radial-gradient(1200px 600px at 50% -200px, #1a2238 0%, transparent 60%),
    linear-gradient(180deg, #0a0d14 0%, #0f1422 100%);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}

/* ===== 标题 ===== */
.header {
  text-align: center;
  padding: 28px 0 10px;
}

.header h1 {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 1px;
  background: linear-gradient(90deg,#7aa2ff,#ffb86c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* ===== 状态栏 ===== */
.status-bar {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  margin:16px 0 24px;
}

.dot {
  width:8px;height:8px;border-radius:50%;
  background:#22c55e;
}

.time { color:var(--text-dim); font-size:0.85rem; }

.btn-refresh {
  background: rgba(99,102,241,0.15);
  border:1px solid rgba(99,102,241,0.3);
  color:#7c83ff;
  padding:6px 14px;
  border-radius:8px;
}

/* ===== 卡片 ===== */
.portfolios {
  max-width:1400px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
  gap:20px;
}

.portfolio {
  background: var(--card);
  border:1px solid var(--card-border);
  border-radius:18px;
  backdrop-filter: blur(12px);
  box-shadow:
    0 8px 30px rgba(0,0,0,0.4),
    inset 0 0 0.5px rgba(255,255,255,0.05);
}

/* ===== header ===== */
.portfolio-header {
  padding:18px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--card-border);
}

.name { font-weight:600; font-size:1.05rem; }

/* ===== tag ===== */
.market-tag {
  font-size:0.75rem;
  padding:4px 10px;
  border-radius:8px;
}

.us .market-tag { background:rgba(99,102,241,0.15); color:#8ea2ff; }
.hk .market-tag { background:rgba(245,158,11,0.15); color:#fbbf24; }
.a  .market-tag { background:rgba(239,68,68,0.15); color:#f87171; }

/* ===== summary ===== */
.portfolio-summary {
  padding:16px 22px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  border-bottom:1px solid var(--card-border);
}

.summary-item {
  padding:16px;
  border-radius:14px;
  text-align:center;
  font-weight:600;
}

.summary-item.positive {
  background: var(--red-bg);
}
.summary-item.positive .summary-value { color:var(--red); }

.summary-item.negative {
  background: var(--green-bg);
}
.summary-item.negative .summary-value { color:var(--green); }

/* ===== 持仓 ===== */
.holding {
  display:grid;
  grid-template-columns:50px 1fr 80px 80px;
  padding:12px 14px;
  align-items:center;
  border-radius:12px;
}

.holding:hover {
  background: rgba(255,255,255,0.03);
}

.weight {
  background: rgba(255,255,255,0.06);
  padding:4px;
  border-radius:8px;
  text-align:center;
  color:var(--text-dim);
}

/* ===== 涨跌颜色（核心修复） ===== */
.positive-text { color: var(--red); }   /* 涨=红 */
.negative-text { color: var(--green); } /* 跌=绿 */

/* ===== watch 区 ===== */
.watch-card {
  background: var(--card);
  border:1px solid var(--card-border);
  border-radius:18px;
  backdrop-filter: blur(12px);
}

.watch-item {
  padding:14px;
  border-bottom:1px solid var(--card-border);
}

.since-pct {
  font-size:1.4rem;
  font-weight:700;
}

/* ===== 手机优化 ===== */
@media (max-width:500px) {
  .portfolios { grid-template-columns:1fr; }

  .holding {
    grid-template-columns:40px 1fr 70px 70px;
    padding:10px;
  }
}
</style>
</style>
</head>

<body>

<div class="header">
  <h1>躺平投资组合追踪器</h1>
  <p class="subtitle">三市场 ETF 组合 · 实时行情 · Z先生自选追踪</p>
</div>

<div class="status-bar">
  <div class="dot" id="statusDot"></div>
  <span class="time" id="statusText">正在加载数据...</span>
  <button class="btn-refresh" onclick="refreshAll()">刷新</button>
</div>

<!-- 你后面的 JS 完全不用改 -->
<!-- 直接保留你原来的 script -->

</body>
</html>
