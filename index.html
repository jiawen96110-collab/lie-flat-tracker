<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>躺平组合 · Z先生</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f2f7;--card:#fff;--border:rgba(60,60,67,.12);--sep:rgba(60,60,67,.08);
  --t1:#1c1c1e;--t2:#3a3a3c;--t3:#636366;--t4:#aeaeb2;
  --green:#34c759;--green-bg:rgba(52,199,89,.10);
  --red:#ff3b30;--red-bg:rgba(255,59,48,.10);
  --blue:#007aff;--blue-bg:rgba(0,122,255,.08);
  --gold:#ff9f0a;--gold-bg:rgba(255,159,10,.10);
  --purple:#af52de;--purple-bg:rgba(175,82,222,.10);
  --font:-apple-system,'SF Pro Display','PingFang SC','Helvetica Neue',sans-serif;
  --mono:'SF Mono','Menlo',monospace;
  --r16:16px;--r12:12px;--r8:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;padding-bottom:40px;-webkit-font-smoothing:antialiased}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:rgba(242,242,247,.9);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(–border)}
.nav-inner{max-width:720px;margin:0 auto;padding:13px 16px 9px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;flex-direction:column}
.nav-brand h1{font-size:17px;font-weight:700;letter-spacing:-.5px}
.nav-brand .nav-sub{font-size:11px;color:var(–t3);margin-top:1px}
.nav-right{display:flex;align-items:center;gap:8px}
.live-badge{display:flex;align-items:center;gap:5px;background:var(–card);border:.5px solid var(–border);padding:5px 10px;border-radius:20px;font-size:11.5px;font-weight:500;color:var(–t2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(–green);flex-shrink:0;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── SEGMENT ── */
.seg-wrap{max-width:720px;margin:0 auto;padding:8px 16px}
.segment{display:flex;background:rgba(118,118,128,.12);border-radius:9px;padding:2px;gap:2px}
.seg{flex:1;padding:7px 3px;border:none;background:transparent;border-radius:7px;font-size:12.5px;font-weight:500;font-family:var(–font);color:var(–t3);cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:3px}
.seg.on{background:var(–card);color:var(–t1);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.10),0 0 0 .5px rgba(0,0,0,.04)}

/* ── LAYOUT ── */
.wrap{max-width:720px;margin:0 auto;padding:8px 16px 0;display:flex;flex-direction:column;gap:10px}

/* ── SUMMARY ROW ── */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sum-card{background:var(–card);border-radius:var(–r12);padding:12px 14px;box-shadow:var(–shadow)}
.sum-mkt{font-size:11px;color:var(–t3);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.sum-today{font-family:var(–mono);font-size:17px;font-weight:700;letter-spacing:-.5px;line-height:1}
.sum-ytd{font-family:var(–mono);font-size:11px;color:var(–t3);margin-top:3px}
.sum-ytd span{font-weight:600}

/* ── SECTION CARD ── */
.section-card{background:var(–card);border-radius:var(–r16);overflow:hidden;box-shadow:var(–shadow);animation:up .36s cubic-bezier(.22,1,.36,1) both}
.section-card:nth-child(1){animation-delay:.03s}.section-card:nth-child(2){animation-delay:.07s}.section-card:nth-child(3){animation-delay:.11s}.section-card:nth-child(4){animation-delay:.15s}.section-card:nth-child(5){animation-delay:.19s}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.section-card.hide{display:none}

/* ── SECTION HEADER ── */
.sec-hd{padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(–sep)}
.sec-hd-l{display:flex;align-items:center;gap:7px}
.mkt{font-family:var(–mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;letter-spacing:.3px}
.m-us{background:var(–blue-bg);color:var(–blue)}.m-hk{background:var(–green-bg);color:#1a8a3a}.m-cn{background:var(–red-bg);color:#d92c22}.m-watch{background:var(–gold-bg);color:#c47a00}
.sec-title{font-size:15px;font-weight:600;letter-spacing:-.3px}
.sec-tag{font-size:9px;background:rgba(118,118,128,.12);color:var(–t3);padding:2px 6px;border-radius:4px;font-weight:500}
.sec-hd-r{text-align:right}
.hd-stat{display:flex;align-items:center;justify-content:flex-end;gap:4px;font-size:11.5px;color:var(–t3);line-height:1.9}
.hd-lbl{font-size:10.5px}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
thead th{font-size:10.5px;font-weight:500;color:var(–t4);padding:6px 16px 5px;text-align:right;border-bottom:.5px solid var(–sep)}
thead th:first-child,thead th:nth-child(2){text-align:left}
tbody tr{border-bottom:.5px solid var(–sep);cursor:default}
tbody tr:last-child{border-bottom:none}
@media(hover:hover){tbody tr:hover{background:rgba(0,0,0,.018)}}
td{padding:12px 16px;font-size:13.5px;text-align:right;vertical-align:top}
td:first-child,td:nth-child(2){text-align:left}
.wt{font-family:var(–mono);font-size:11px;color:var(–t4);font-weight:500;padding-top:1px}
.tk{font-family:var(–mono);font-size:13px;font-weight:700;color:var(–blue);display:block;line-height:1.2}
.nm{font-size:12px;color:var(–t2);display:block;margin-top:2px}
/* ── PCT PILL ── */
.p{font-family:var(–mono);font-size:13px;font-weight:600;padding:4px 8px;border-radius:7px;display:inline-block;min-width:68px;text-align:center;letter-spacing:-.2px}
.p.g{color:var(–green);background:var(–green-bg)}.p.r{color:var(–red);background:var(–red-bg)}.p.z{color:var(–t3);background:rgba(118,118,128,.08)}.p.ld{color:var(–t4);background:rgba(118,118,128,.08);font-size:11px}
.pi{font-family:var(–mono);font-size:12px;font-weight:700}.pi.g{color:var(–green)}.pi.r{color:var(–red)}

/* ── WATCHLIST EXTRAS ── */
.watch-meta{font-size:10px;color:var(–t4);font-family:var(–mono);display:block;margin-top:2px;line-height:1.5}
.note-pill{display:inline-block;font-size:10.5px;color:var(–t3);line-height:1.5;max-width:180px}
.since-big{font-family:var(–mono);font-size:15px;font-weight:700;display:block;line-height:1.2}
.since-lbl{font-size:10px;color:var(–t4);display:block;margin-top:2px}

/* ── WATCH HEADER STRIP ── */
.watch-info-strip{background:linear-gradient(135deg,rgba(255,159,10,.08),rgba(175,82,222,.06));border-bottom:.5px solid var(–sep);padding:10px 16px;display:flex;align-items:center;gap:8px}
.strip-icon{font-size:20px}
.strip-text{font-size:12px;color:var(–t2);line-height:1.5}
.strip-text strong{color:var(–t1);font-weight:600}

/* ── FOOTER ── */
.footer{text-align:center;font-size:11px;color:var(–t4);line-height:1.7;padding:16px 16px 0}
@media(max-width:390px){.p{min-width:58px;font-size:12px}td{padding:10px 12px}.sum-today{font-size:15px}.summary-row{grid-template-columns:repeat(3,1fr);gap:6px}}
</style>

</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <h1>躺平组合</h1>
      <span class="nav-sub">跟踪 · 京城Z先生</span>
    </div>
    <div class="nav-right">
      <div class="live-badge">
        <div class="live-dot"></div>
        <span id="last-update">--:--:--</span>
      </div>
    </div>
  </div>
  <div class="seg-wrap">
    <div class="segment">
      <button class="seg on" data-tab="all">全部</button>
      <button class="seg" data-tab="us">🇺🇸 美股</button>
      <button class="seg" data-tab="hk">🇭🇰 港股</button>
      <button class="seg" data-tab="cn">🇨🇳 A股</button>
      <button class="seg" data-tab="watch">⭐ 自选</button>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- ── 今日概览 ── -->

  <div class="summary-row" id="summary-row">
    <div class="sum-card">
      <div class="sum-mkt">🇺🇸 美股</div>
      <div class="sum-today" id="s-us-today">--</div>
      <div class="sum-ytd">YTD <span id="s-us-ytd">--</span></div>
    </div>
    <div class="sum-card">
      <div class="sum-mkt">🇭🇰 港股</div>
      <div class="sum-today" id="s-hk-today">--</div>
      <div class="sum-ytd">YTD <span id="s-hk-ytd">--</span></div>
    </div>
    <div class="sum-card">
      <div class="sum-mkt">🇨🇳 A股</div>
      <div class="sum-today" id="s-cn-today">--</div>
      <div class="sum-ytd">YTD <span id="s-cn-ytd">--</span></div>
    </div>
  </div>

  <!-- ── US ── -->

  <div class="section-card" data-sec="us">
    <div class="sec-hd">
      <div class="sec-hd-l">
        <span class="mkt m-us">US</span>
        <span class="sec-title">美股躺平组合</span>
        <span class="sec-tag">被动</span>
      </div>
      <div class="sec-hd-r">
        <div class="hd-stat"><span class="hd-lbl">今日</span><span id="us-today">--</span></div>
        <div class="hd-stat"><span class="hd-lbl">YTD</span><span id="us-ytd">--</span></div>
      </div>
    </div>
    <table>
      <thead><tr><th>仓位</th><th>标的</th><th>今日</th><th>YTD</th></tr></thead>
      <tbody id="us-tbody"></tbody>
    </table>
  </div>

  <!-- ── HK ── -->

  <div class="section-card" data-sec="hk">
    <div class="sec-hd">
      <div class="sec-hd-l">
        <span class="mkt m-hk">HK</span>
        <span class="sec-title">港股躺平组合</span>
        <span class="sec-tag">被动</span>
      </div>
      <div class="sec-hd-r">
        <div class="hd-stat"><span class="hd-lbl">今日</span><span id="hk-today">--</span></div>
        <div class="hd-stat"><span class="hd-lbl">YTD</span><span id="hk-ytd">--</span></div>
      </div>
    </div>
    <table>
      <thead><tr><th>仓位</th><th>标的</th><th>今日</th><th>YTD</th></tr></thead>
      <tbody id="hk-tbody"></tbody>
    </table>
  </div>

  <!-- ── CN ── -->

  <div class="section-card" data-sec="cn">
    <div class="sec-hd">
      <div class="sec-hd-l">
        <span class="mkt m-cn">CN</span>
        <span class="sec-title">A股躺平组合</span>
        <span class="sec-tag">被动</span>
      </div>
      <div class="sec-hd-r">
        <div class="hd-stat"><span class="hd-lbl">今日</span><span id="cn-today">--</span></div>
        <div class="hd-stat"><span class="hd-lbl">YTD</span><span id="cn-ytd">--</span></div>
      </div>
    </div>
    <table>
      <thead><tr><th>仓位</th><th>标的</th><th>今日</th><th>YTD</th></tr></thead>
      <tbody id="cn-tbody"></tbody>
    </table>
  </div>

  <!-- ── WATCHLIST ── -->

  <div class="section-card" data-sec="watch">
    <div class="sec-hd">
      <div class="sec-hd-l">
        <span class="mkt m-watch">⭐</span>
        <span class="sec-title">Z先生自选追踪</span>
      </div>
    </div>
    <div class="watch-info-strip">
      <span class="strip-icon">📡</span>
      <span class="strip-text">实时跟踪 Z 先生推荐标的 · <strong>累计涨跌</strong>从推荐日收盘价起算</span>
    </div>
    <table>
      <thead><tr><th>标的</th><th>行业/逻辑</th><th>今日</th><th>推荐以来</th></tr></thead>
      <tbody id="watch-tbody"></tbody>
    </table>
  </div>

  <div class="footer">数据来源：腾讯财经 · 每30秒自动刷新 · 仅供参考，不构成投资建议</div>
</div>

<script>
// ═══════════════════════════════════════════════
// 躺平 ETF 组合
// ═══════════════════════════════════════════════
const ETF = {
  us:{h:[
    {w:'25%',c:'us_QQQ',t:'QQQ',n:'纳指100 ETF'},
    {w:'25%',c:'us_SPY',t:'SPY',n:'标普500 ETF'},
    {w:'20%',c:'us_RING',t:'RING',n:'黄金矿股 ETF'},
    {w:'20%',c:'us_COPX',t:'COPX',n:'全球铜矿 ETF'},
    {w:'10%',c:'us_BITB',t:'BITB',n:'比特币 ETF'},
  ]},
  hk:{h:[
    {w:'25%',c:'hk_03455',t:'03455',n:'纳指100 ETF'},
    {w:'20%',c:'hk_03132',t:'03132',n:'全球半导体 ETF'},
    {w:'20%',c:'hk_03147',t:'03147',n:'中国创业板 ETF'},
    {w:'20%',c:'hk_03110',t:'03110',n:'恒生高股息 ETF'},
    {w:'15%',c:'hk_02840',t:'02840',n:'黄金 ETF'},
  ]},
  cn:{h:[
    {w:'25%',c:'cn_513390',t:'513390',n:'纳指100 ETF'},
    {w:'25%',c:'cn_159652',t:'159652',n:'有色50 ETF'},
    {w:'25%',c:'cn_588200',t:'588200',n:'科创芯片 ETF'},
    {w:'15%',c:'cn_515880',t:'515880',n:'通信 ETF'},
    {w:'10%',c:'cn_518880',t:'518880',n:'黄金 ETF'},
  ]}
};

// ═══════════════════════════════════════════════
// ⭐ Z先生自选追踪列表
// 新增标的时直接追加一行，告诉我收盘价我帮你填
// ═══════════════════════════════════════════════
const WATCH = [
  {
    ticker:  '300782',
    name:    '卓胜微',
    sym:     'sz300782',       // 腾讯API代码
    date:    '2026-03-26',    // 推荐日
    price:   87.00,           // 推荐日收盘价
    sector:  '射频芯片',
    note:    '国内射频前端芯片龙头，射频开关/LNA/PA/滤波器全覆盖，安卓手机国产替代核心标的'
  },
  // ── 下次新增在这里 ──
];

// ═══════════════════════════════════════════════
// 静态YTD兜底（实时今日从API取）
// ═══════════════════════════════════════════════
const YTD = {
  us_QQQ:-0.55, us_SPY:-0.02, us_RING:+14.83, us_COPX:+13.62, us_BITB:-17.41,
  hk_03455:-0.53, hk_03132:+25.08, hk_03147:+11.40, hk_03110:+9.10, hk_02840:+10.25,
  cn_513390:-5.03, cn_159652:+8.54, cn_588200:+10.16, cn_515880:+19.77, cn_518880:+7.48,
};
const STATIC_TODAY = {
  us_QQQ:+0.68, us_SPY:+0.58, us_RING:+0.14, us_COPX:-0.57, us_BITB:+1.14,
  hk_03455:+1.21, hk_03132:+2.58, hk_03147:+4.99, hk_03110:+0.67, hk_02840:+0.85,
  cn_513390:+1.01, cn_159652:-0.06, cn_588200:+2.42, cn_515880:+2.50, cn_518880:+0.90,
};

const TMAP = {
  us_QQQ:'usQQQ',us_SPY:'usSPY',us_RING:'usRING',us_COPX:'usCOPX',us_BITB:'usBITB',
  hk_03455:'hk03455',hk_03132:'hk03132',hk_03147:'hk03147',hk_03110:'hk03110',hk_02840:'hk02840',
  cn_513390:'sh513390',cn_159652:'sz159652',cn_588200:'sh588200',cn_515880:'sh515880',cn_518880:'sh518880',
};

const live = {};
let apiLoaded = false;
const PROXY = 'https://lieflat-proxy.jiawen96110.workers.dev';

// ─── 渲染工具 ────────────────────────────────
function pill(v) {
  if (v===null||v===undefined||isNaN(v)) return '<span class="p ld">--</span>';
  const c=v>0?'g':v<0?'r':'z', s=v>0?'+':'';
  return `<span class="p ${c}">${s}${v.toFixed(2)}%</span>`;
}
function inline(v, size='12px') {
  if (v===null||v===undefined||isNaN(v)) return `<span style="color:var(--t4);font-family:var(--mono);font-size:${size};font-weight:600">--</span>`;
  const c=v>0?'g':v<0?'r':'', s=v>0?'+':'';
  return `<span class="pi ${c}" style="font-size:${size}">${s}${v.toFixed(2)}%</span>`;
}

// ─── 渲染 ETF 组合 ────────────────────────────
function renderETF(key) {
  const group=ETF[key], tbody=document.getElementById(`${key}-tbody`);
  let tw=0, yw=0, rows='';
  for (const h of group.h) {
    // today: use live data if available, else null (show "--" until API responds)
    // STATIC_TODAY only used as absolute last resort if apiLoaded stays false
    const today = live[h.c]?.today ?? (apiLoaded ? null : STATIC_TODAY[h.c]);
    const ytd   = YTD[h.c] ?? null;
    const w = parseFloat(h.w)/100;
    if (!isNaN(today)) tw += w*today;
    if (!isNaN(ytd))   yw += w*ytd;
    rows += `<tr>
      <td class="wt">${h.w}</td>
      <td><span class="tk">${h.t}</span><span class="nm">${h.n}</span></td>
      <td>${pill(today)}</td>
      <td>${pill(ytd)}</td>
    </tr>`;
  }
  tbody.innerHTML = rows;
  document.getElementById(`${key}-today`).innerHTML = inline(tw);
  document.getElementById(`${key}-ytd`).innerHTML   = inline(yw);
  // summary cards
  const sc = document.getElementById(`s-${key}-today`);
  const sy = document.getElementById(`s-${key}-ytd`);
  if (sc) { sc.innerHTML = inline(tw,'15px'); sc.style.display='block'; }
  if (sy) { sy.innerHTML = inline(yw,'11px'); }
}

// ─── 渲染自选 ────────────────────────────────
function renderWatch() {
  const tbody = document.getElementById('watch-tbody');
  if (!WATCH.length) {
    tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:28px;color:var(--t4);font-size:13px">暂无追踪标的</td></tr>';
    return;
  }
  let rows='';
  for (let i=0;i<WATCH.length;i++) {
    const w=WATCH[i], d=live[`w${i}`]||{};
    // 推荐以来 = (当前价 - 推荐日价) / 推荐日价
    let sinceVal=null;
    if (w.price && d.price>0) sinceVal=(d.price-w.price)/w.price*100;
    const sinceDisplay = sinceVal!==null
      ? `<span class="since-big ${sinceVal>0?'pi g':sinceVal<0?'pi r':''}">${sinceVal>0?'+':''}${sinceVal.toFixed(2)}%</span><span class="since-lbl">自 ${w.date}</span>`
      : `<span class="since-big" style="color:var(--t4)">--%</span><span class="since-lbl">自 ${w.date}</span>`;
    rows += `<tr>
      <td>
        <span class="tk">${w.ticker}</span>
        <span class="nm">${w.name}</span>
        <span class="watch-meta">推荐价 ¥${w.price.toFixed(2)} · 当前 ${d.price>0?'¥'+d.price.toFixed(2):'--'}</span>
      </td>
      <td>
        <span style="display:inline-block;background:var(--gold-bg);color:#c47a00;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-bottom:4px">${w.sector}</span>
        <span class="note-pill">${w.note}</span>
      </td>
      <td>${pill(d.today)}</td>
      <td>${sinceDisplay}</td>
    </tr>`;
  }
  tbody.innerHTML = rows;
}

// ─── Tab 切换 ────────────────────────────────
document.querySelectorAll('.seg').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.seg').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    const t=btn.dataset.tab;
    // summary row visible only on 'all'
    document.getElementById('summary-row').style.display = t==='all'?'':'none';
    document.querySelectorAll('.section-card').forEach(c=>{
      c.classList.toggle('hide', t!=='all' && c.dataset.sec!==t);
    });
  });
});

// ─── 数据拉取 ────────────────────────────────
async function fetchAll() {
  const symMap={};
  for (const [k,s] of Object.entries(TMAP)) symMap[s]=k;
  WATCH.forEach((w,i)=>{ symMap[w.sym]=`w${i}`; });
  const ql=Object.keys(symMap).join(',');
  try {
    const raw=await(await fetch(`${PROXY}?q=${ql}`)).text();
    const re=/v_([a-zA-Z0-9]+)="([^"]+)"/g; let m;
    while((m=re.exec(raw))!==null){
      const sym=m[1], f=m[2].split('~'), key=symMap[sym];
      if(!key) continue;
      if(!live[key]) live[key]={};
      const p=parseFloat(f[32]), pr=parseFloat(f[3]);
      if(!isNaN(p))  live[key].today=p;
      if(!isNaN(pr)) live[key].price=pr;
      apiLoaded=true;
    }
  } catch(e){}
  renderAll();
  document.getElementById('last-update').textContent=new Date().toTimeString().slice(0,8);
}

function renderAll(){
  renderETF('us'); renderETF('hk'); renderETF('cn'); renderWatch();
}

// Show YTD immediately (static), today shows "--" until API responds
renderAll();
fetchAll();
setInterval(fetchAll,30000);
</script>
