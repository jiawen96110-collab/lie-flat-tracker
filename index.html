<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>躺平组合·数据整理</title>
<style>
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0e1a;
      --card: #151c2e;
      --card-hover: #1d2538;
      --border: #2a3145;
      --text: #e8eef9;
      --text-dim: #8a94a8;
      --accent-us: #4e9ef8;
      --accent-hk: #f9a825;
      --accent-a: #f76c6c;
      --accent-share: #ff9800;
      --red: #f76c6c;
      --green: #4caf7d;
      --red-bg: rgba(247,108,108,0.12);
      --green-bg: rgba(76,175,125,0.12);
      --shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f8ff;
      --card: #ffffff;
      --card-hover: #f8fafc;
      --border: #e2e8f0;
      --text: #1a202c;
      --text-dim: #718096;
      --accent-us: #3b82f6;
      --accent-hk: #f59e0b;
      --accent-a: #ef4444;
      --accent-share: #f97316;
      --red: #ef4444;
      --green: #10b981;
      --red-bg: rgba(239,68,68,0.08);
      --green-bg: rgba(16,185,129,0.08);
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; min-height:100vh;
    background-color:var(--bg) !important;
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    padding:16px; line-height:1.5;
    overflow-x:hidden; -webkit-overflow-scrolling:touch;
  }

  .main-container { max-width:1200px; margin:0 auto; }

  /* ── 头部 ── */
  .header { text-align:center; padding:32px 0 24px; }
  .header h1 { font-size:2.2rem; font-weight:800; color:var(--text); margin-bottom:8px; letter-spacing:-0.5px; }
  .header .subtitle { font-size:1rem; color:var(--text-dim); max-width:500px; margin:0 auto; }

  /* ── 状态栏 ── */
  .status-bar {
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; padding:10px 16px;
    background:var(--card); border-radius:12px;
    border:1px solid var(--border); margin:0 auto 8px;
    font-size:0.85rem;
  }
  .status-left { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
  .status-bar .dot { width:8px; height:8px; border-radius:50%; background:var(--green); flex-shrink:0; }
  .status-bar .dot.loading { background:var(--accent-us); animation:pulse 1.5s infinite; }
  .status-bar .dot.error { background:var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .status-bar .time { color:var(--text); font-weight:500; font-size:0.82rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .status-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }

  /* 更新时间醒目提示 */
  .update-badge {
    font-size:0.72rem; color:var(--text-dim);
    background:rgba(136,146,168,0.1);
    padding:3px 8px; border-radius:6px;
    white-space:nowrap;
  }

  .btn-refresh {
    background:var(--accent-us); border:none; color:white;
    padding:5px 12px; border-radius:6px; font-size:0.75rem;
    cursor:pointer; transition:all 0.2s; white-space:nowrap;
  }
  .btn-refresh:hover { opacity:0.9; }
  .btn-refresh:disabled { opacity:0.5; cursor:not-allowed; }

  /* ── 三市场组合 ── */
  .portfolios {
    max-width:1200px; margin:16px auto 32px;
    display:grid; grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); gap:20px;
  }
  .portfolio { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; transition:all 0.2s; }
  .portfolio:hover { box-shadow:var(--shadow); }

  .portfolio-header {
    padding:16px 20px; display:flex; align-items:center;
    justify-content:space-between; border-bottom:1px solid var(--border);
  }
  .portfolio-header .left { display:flex; align-items:center; gap:10px; }
  .portfolio-header .flag { font-size:1.4rem; }
  .portfolio-header .name { font-size:1.1rem; font-weight:700; }
  .market-tag { font-size:0.7rem; padding:4px 8px; border-radius:6px; font-weight:600; color:#fff; }
  .us .market-tag { background:var(--accent-us); }
  .hk .market-tag { background:var(--accent-hk); }
  .a  .market-tag { background:var(--accent-a); }

  /* 权重色块按市场区分颜色 */
  .us .holding .weight { background:var(--accent-us); }
  .hk .holding .weight { background:var(--accent-hk); }
  .a  .holding .weight { background:var(--accent-a); }

  .portfolio-summary {
    padding:12px 20px; display:flex;
    justify-content:space-between; border-bottom:1px solid var(--border);
  }
  .summary-item { text-align:center; flex:1; }
  .summary-item .summary-label { font-size:0.75rem; color:var(--text-dim); margin-bottom:6px; }
  .summary-value { display:inline-block; padding:4px 10px; border-radius:8px; font-size:1rem; font-weight:600; }
  .summary-item.positive .summary-value { background:var(--red-bg); color:var(--red); }
  .summary-item.negative .summary-value { background:var(--green-bg); color:var(--green); }
  .summary-item.neutral  .summary-value { background:rgba(136,146,168,0.1); color:var(--text-dim); }

  .holdings { padding:8px 12px 12px; }
  .change-header {
    display:grid; grid-template-columns:40px 1fr 70px 70px;
    gap:10px; padding:8px 12px;
    font-size:0.7rem; color:var(--text-dim);
    border-bottom:1px solid var(--border);
  }
  .change-header span:nth-child(3),
  .change-header span:nth-child(4) { text-align:right; }

  .holding {
    display:grid; grid-template-columns:40px 1fr 70px 70px;
    align-items:center; gap:10px; padding:10px 12px;
  }
  .holding:hover { background:var(--card-hover); }
  .holding .weight {
    border-radius:6px; padding:6px 0; text-align:center;
    font-size:0.8rem; color:white; font-weight:600;
  }
  .holding .info .ticker { font-weight:600; font-size:0.9rem; }
  .holding .info .name-cn { font-size:0.75rem; color:var(--text-dim); }
  .holding .change { text-align:right; font-size:0.8rem; font-weight:600; }
  .positive-text { color:var(--red) !important; }
  .negative-text { color:var(--green) !important; }

  /* ── 行业概念数据整理（Z先生参考） ── */
  .share-section { max-width:1200px; margin:0 auto 40px; }
  .share-card { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }

  .share-card-header {
    padding:16px 20px; display:flex; justify-content:space-between;
    align-items:center; border-bottom:1px solid var(--border);
    flex-wrap:nowrap; gap:12px;
  }
  .share-card-header .label { display:flex; align-items:center; gap:10px; white-space:nowrap; flex-shrink:0; }
  .share-card-header .flag { font-size:1.4rem; }
  .share-card-header .name { font-size:1.1rem; font-weight:700; }
  .share-note {
    font-size:0.7rem; padding:4px 10px; border-radius:6px;
    font-weight:600; background:#6b7280; color:white;
    white-space:nowrap; flex-shrink:0;
  }

  /* ── 排序工具栏 ── */
  .share-toolbar {
    display:flex; align-items:center; gap:6px;
    padding:9px 12px; border-bottom:1px solid var(--border);
    font-size:0.75rem; color:var(--text-dim); flex-wrap:wrap;
  }
  .sort-label { margin-right:2px; flex-shrink:0; }
  .sort-btn {
    background:none; border:1px solid var(--border);
    border-radius:6px; padding:3px 9px; font-size:0.72rem;
    color:var(--text-dim); cursor:pointer; transition:all 0.15s;
    display:inline-flex; align-items:center; gap:4px;
  }
  .sort-btn:hover { background:var(--card-hover); }
  .sort-btn.active { background:var(--accent-us); border-color:var(--accent-us); color:#fff; }

  /* ── 表头 ── */
  .share-table-header {
    display:grid;
    grid-template-columns:20px 70px minmax(0,1fr) 64px 64px;
    padding:8px 12px; gap:8px;
    font-size:0.72rem; color:var(--text-dim);
    border-bottom:1px solid var(--border);
  }
  .share-table-header span:nth-child(4),
  .share-table-header span:nth-child(5) { text-align:right; }

  /* ── 分组标题 ── */
  .group-header {
    display:flex; align-items:center; gap:8px;
    padding:8px 12px 6px;
    font-size:0.72rem; font-weight:700;
    color:var(--text-dim);
    border-bottom:1px dashed var(--border);
    letter-spacing:0.5px;
    margin-top:2px;
  }
  .group-dot {
    width:6px; height:6px; border-radius:50%; flex-shrink:0;
  }

  /* ── 行 ── */
  .share-items { padding:0; }
  .share-item { border-bottom:1px solid var(--border); cursor:pointer; }
  .share-item:last-child { border-bottom:none; }
  .share-item:hover .share-row { background:var(--card-hover); }

  .share-row {
    display:grid;
    grid-template-columns:20px 70px minmax(0,1fr) 64px 64px;
    align-items:center; padding:9px 12px;
    font-size:12px; gap:8px;
  }

  /* 国旗列 */
  .share-flag {
    font-size:14px; display:flex;
    align-items:center; justify-content:center; line-height:1;
  }
  /* 代码列 */
  .share-ticker {
    font-weight:600; color:var(--accent-us);
    display:flex; align-items:center;
    white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; line-height:1;
  }
  /* 名称列 */
  .share-name {
    font-weight:600;
    display:flex; align-items:center;
    white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; line-height:1;
  }
  /* 当日 / 累计 */
  .share-day, .share-since {
    font-weight:600; text-align:right;
    white-space:nowrap; line-height:1;
    display:flex; align-items:center; justify-content:flex-end;
    font-size:13px;
  }

  /* ── 展开详情 ── */
  .share-detail {
    padding:12px 12px 14px;
    border-top:1px dashed var(--border);
    display:none; font-size:12px;
  }
  .share-detail.open { display:block; }

  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  .detail-row { padding:8px 10px; border-radius:6px; line-height:1.65; border-radius:0; }
  .sector-row   { background:rgba(59,130,246,0.08);  border-left:3px solid var(--accent-us); border-radius:0 4px 4px 0; }
  .logic-row    { background:rgba(249,115,22,0.08);   border-left:3px solid var(--accent-share); border-radius:0 4px 4px 0; margin-bottom:8px; }
  .analysis-row { background:rgba(168,85,247,0.08);   border-left:3px solid #a855f7; border-radius:0 4px 4px 0; margin-bottom:8px; }
  .info-row     { background:rgba(136,146,168,0.08);  border-left:3px solid var(--text-dim); border-radius:0 4px 4px 0; }
  .detail-label { font-weight:700; margin-right:6px; }

  /* 价格追踪卡片 */
  .price-track {
    display:flex; align-items:center; gap:8px;
    padding:9px 12px; border-radius:6px; margin-bottom:0;
    background:rgba(136,146,168,0.08);
    border-left:3px solid var(--text-dim);
    border-radius:0 4px 4px 0;
    font-size:12px;
  }
  .price-item { display:flex; flex-direction:column; gap:2px; }
  .price-lbl { font-size:0.68rem; color:var(--text-dim); }
  .price-val { font-weight:700; font-size:13px; }
  .price-arrow { color:var(--text-dim); font-size:14px; }
  .price-since {
    margin-left:auto; padding:4px 10px; border-radius:6px;
    font-weight:700; font-size:13px;
  }
  .price-since.up   { background:var(--red-bg);   color:var(--red); }
  .price-since.down { background:var(--green-bg); color:var(--green); }
  .price-since.flat { background:rgba(136,146,168,0.1); color:var(--text-dim); }

  /* ── 加载骨架 ── */
  .loading-skeleton {
    height:16px;
    background:linear-gradient(90deg,rgba(255,255,255,0.08) 25%,rgba(255,255,255,0.12) 50%,rgba(255,255,255,0.08) 75%);
    background-size:400% 100%; animation:shimmer 1.5s infinite; border-radius:4px;
  }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  /* ── 页脚 ── */
  .footer { text-align:center; padding:24px 0 16px; color:var(--text-dim); font-size:0.8rem; }
  .footer-note { font-size:0.75rem; margin-top:8px; opacity:0.7; }

  @media (max-width:900px) { .portfolios { grid-template-columns:1fr; } }
  @media (max-width:768px) {
    body { padding:12px; }
    .holding { grid-template-columns:36px 1fr 62px 62px; padding:8px; }
    .holding .change { font-size:0.85rem; }
    .share-row,
    .share-table-header { grid-template-columns:20px 60px minmax(0,1fr) 58px 58px; }
    .share-day, .share-since { font-size:13px; }
    .detail-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="main-container">

  <div class="header">
    <h1>🛏 躺平组合·分享记录</h1>
    <p class="subtitle">三市场ETF组合 · 行业概念数据整理（Z先生参考）</p>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <div class="dot" id="statusDot"></div>
      <span class="time" id="statusText">正在加载数据...</span>
      <span class="update-badge" id="updateBadge"></span>
    </div>
    <div class="status-right">
      <button class="btn-refresh" id="btnRefresh" onclick="refreshAll()">⟳ 刷新</button>
    </div>
  </div>

  <!-- 三市场组合 -->
  <div class="portfolios" id="portfolios">
    <div class="portfolio us" id="port-us">
      <div class="portfolio-header">
        <div class="left"><span class="flag">🇺🇸</span><span class="name">美股躺平组合</span></div>

      </div>
      <div class="portfolio-summary" id="summary-us">
        <div class="summary-item neutral"><div class="summary-label">当日</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
        <div class="summary-item neutral"><div class="summary-label">YTD</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
      </div>
      <div class="holdings">
        <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
        <div id="holdings-us"></div>
      </div>
    </div>

    <div class="portfolio hk" id="port-hk">
      <div class="portfolio-header">
        <div class="left"><span class="flag">🇭🇰</span><span class="name">港股躺平组合</span></div>
        <span class="market-tag">跨市场平衡配置，攻守兼备</span>
      </div>
      <div class="portfolio-summary" id="summary-hk">
        <div class="summary-item neutral"><div class="summary-label">当日</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
        <div class="summary-item neutral"><div class="summary-label">YTD</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
      </div>
      <div class="holdings">
        <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
        <div id="holdings-hk"></div>
      </div>
    </div>

    <div class="portfolio a" id="port-a">
      <div class="portfolio-header">
        <div class="left"><span class="flag">🇨🇳</span><span class="name">A股躺平组合</span></div>
        <span class="market-tag">科技主线为主，周期资产辅助</span>
      </div>
      <div class="portfolio-summary" id="summary-a">
        <div class="summary-item neutral"><div class="summary-label">当日</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
        <div class="summary-item neutral"><div class="summary-label">YTD</div><div class="summary-value"><div class="loading-skeleton" style="width:60px;margin:0 auto"></div></div></div>
      </div>
      <div class="holdings">
        <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
        <div id="holdings-a"></div>
      </div>
    </div>
  </div>

  <!-- 行业概念数据整理（Z先生参考） -->
  <div class="share-section">
    <div class="share-card">
      <div class="share-card-header">
        <div class="label">
          <span class="flag">📈</span>
          <span class="name">行业概念数据整理（Z先生参考）</span>

      <div class="share-toolbar">
        <span class="sort-label">排序：</span>
        <button class="sort-btn active" id="sort-default"    onclick="sortShares('default')">📋 默认</button>
        <button class="sort-btn"        id="sort-since-desc" onclick="sortShares('since-desc')">累计 ↓</button>
        <button class="sort-btn"        id="sort-date-desc"  onclick="sortShares('date-desc')">🕐 最新</button>
      </div>

      <div class="share-table-header">
        <span></span>
        <span>代码</span>
        <span>名称</span>
        <span style="text-align:right">当日</span>
        <span style="text-align:right">累计</span>
      </div>
      <div class="share-items" id="share-list"></div>
    </div>
  </div>

  <div class="footer">
    数据来源: 腾讯财经 · 自动刷新间隔 30s<br>
    <span class="footer-note">本内容为Z先生公开分享的ETF组合与行业概念数据整理，如要参与请自行研究决策。市场有风险，投资需谨慎。</span>
  </div>
</div>

<script>
if (window.matchMedia) {
  const mq = window.matchMedia('(prefers-color-scheme: dark)');
  const upd = () => document.documentElement.setAttribute('data-theme', mq.matches?'dark':'light');
  mq.addEventListener('change', upd); upd();
}

function formatFullDate() {
  const w=['周日','周一','周二','周三','周四','周五','周六'];
  const n=new Date();
  const y=n.getFullYear(),m=(n.getMonth()+1).toString().padStart(2,'0');
  const d=n.getDate().toString().padStart(2,'0'),wd=w[n.getDay()];
  const h=n.getHours().toString().padStart(2,'0'),mi=n.getMinutes().toString().padStart(2,'0'),s=n.getSeconds().toString().padStart(2,'0');
  return `${y}年${m}月${d}日 ${wd} ${h}:${mi}:${s}`;
}
function formatShortTime() {
  const n=new Date();
  const h=n.getHours().toString().padStart(2,'0'),mi=n.getMinutes().toString().padStart(2,'0'),s=n.getSeconds().toString().padStart(2,'0');
  return `${h}:${mi}:${s} 更新`;
}

function getColorClass(v){ if(v==null||isNaN(v))return ''; return v>0.001?'positive-text':v<-0.001?'negative-text':''; }
function getSummaryClass(v){ if(v==null||isNaN(v))return 'neutral'; return v>0.001?'positive':v<-0.001?'negative':'neutral'; }

const PORTFOLIOS = {
  us:{name:'美股躺平组合',holdings:[
    {code:'usQQQ', display:'QQQ', nameCn:'纳指100 ETF',     weight:25},
    {code:'usSPY', display:'SPY', nameCn:'标普500 ETF',     weight:25},
    {code:'usRING',display:'RING',nameCn:'全球黄金矿股 ETF',weight:20},
    {code:'usCOPX',display:'COPX',nameCn:'全球铜矿股 ETF', weight:20},
    {code:'usBITB',display:'BITB',nameCn:'比特币 ETF',      weight:10},
  ]},
  hk:{name:'港股躺平组合',holdings:[
    {code:'hk03455',display:'03455',nameCn:'纳指100 ETF',   weight:25},
    {code:'hk03132',display:'03132',nameCn:'全球半导体 ETF',weight:20},
    {code:'hk03147',display:'03147',nameCn:'中国创业板 ETF',weight:20},
    {code:'hk03110',display:'03110',nameCn:'恒生高股息 ETF',weight:20},
    {code:'hk02840',display:'02840',nameCn:'黄金 ETF',      weight:15},
  ]},
  a:{name:'A股躺平组合',holdings:[
    {code:'sh513390',display:'513390',nameCn:'纳指100 ETF', weight:25},
    {code:'sz159652',display:'159652',nameCn:'有色50 ETF',  weight:25},
    {code:'sh588200',display:'588200',nameCn:'科创芯片 ETF',weight:25},
    {code:'sh515880',display:'515880',nameCn:'通信 ETF',    weight:15},
    {code:'sh518880',display:'518880',nameCn:'黄金 ETF',    weight:10},
  ]}
};

const YTD_BASE = {
  'usQQQ':613.537,'usSPY':680.063,'usRING':73.64,'usCOPX':71.78,'usBITB':47.44,
  'hk03455':4809.267,'hk03132':37.56,'hk03147':12.46,'hk03110':30.12,'hk02840':3112.00,
  'sh513390':2.107,'sz159652':1.674,'sh588200':2.342,'sh515880':1.027,'sh518880':9.301,
};

/* 分享记录 — 含 group 字段用于分组 */

let _jid=0;
function qqJsonp(codes,timeout=8000){
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    const timer=setTimeout(()=>{s.remove();reject(new Error('timeout'));},timeout);
    s.onload=()=>{clearTimeout(timer);s.remove();const r={};codes.forEach(c=>{const v=window['v_'+c];if(v)r[c]=v;});resolve(r);};
    s.onerror=()=>{clearTimeout(timer);s.remove();reject(new Error('err'));};
    s.src=`https://qt.gtimg.cn/q=${codes.join(',')}`;
    document.head.appendChild(s);
  });
}

function parseQuote(code,raw){
  if(!raw)return null;
  const p=raw.split('~');
  const price=parseFloat(p[3]);
  if(!price||price<=0)return null;
  let dp=parseFloat(p[32]);
  if(isNaN(dp)){const prev=parseFloat(code.startsWith('hk')?p[5]:p[4]);if(prev>0)dp=((price-prev)/prev)*100;}
  return{code,price,dailyPct:isNaN(dp)?null:dp};
}

function renderSummary(key,rt,ytd){
  const port=PORTFOLIOS[key];
  let dW=0,yW=0,dOk=false,yOk=false;
  port.holdings.forEach(h=>{
    const w=h.weight/100,q=rt[h.code]||{},y=ytd[h.code];
    if(q.dailyPct!=null){dW+=q.dailyPct*w;dOk=true;}
    if(y!=null){yW+=y*w;yOk=true;}
  });
  const dv=dOk?dW:null,yv=yOk?yW:null;
  document.getElementById(`summary-${key}`).innerHTML=`
    <div class="summary-item ${getSummaryClass(dv)}"><div class="summary-label">当日</div><div class="summary-value">${fmt(dv)}</div></div>

}

let currentSort='default';
function sortShares(mode){
  currentSort=mode;
  document.getElementById('sort-default').classList.toggle('active', mode==='default');
  document.getElementById('sort-since-desc').classList.toggle('active', mode==='since-desc');
  document.getElementById('sort-date-desc').classList.toggle('active', mode==='date-desc');
  renderShareRecords();
}

function getSharesSorted(){
  const list=[...SHARE_RECORDS.map((w,i)=>({...w,_i:i}))];
  const gs=w=>{const d=SHARE_CACHE[w.sym];return(d&&d.price&&w.price)?(d.price-w.price)/w.price*100:null;};
  const gd=w=>{const d=SHARE_CACHE[w.sym];return d?d.dailyPct:null;};
  if(currentSort==='since-desc') list.sort((a,b)=>{const sa=gs(a),sb=gs(b);if(sa==null&&sb==null)return 0;if(sa==null)return 1;if(sb==null)return -1;return sb-sa;});
  else if(currentSort==='date-desc')  list.sort((a,b)=>b.date.localeCompare(a.date));
  return list;
}

function renderShareRecords(){
  const container=document.getElementById('share-list');
  const list=getSharesSorted();
  const useGroup=(currentSort==='default');
  let html='';
  let lastGroup='';

  list.forEach(w=>{
    /* 默认排序时插入分组标题 */
    if(useGroup && w.group!==lastGroup){
      lastGroup=w.group;
      const col=GROUP_COLORS[w.group]||'var(--text-dim)';
      html+=`<div class="group-header">
        <span class="group-dot" style="background:${col}"></span>
        <span style="color:${col}">${w.group}</span>
      </div>`;
    }

    const d=SHARE_CACHE[w.sym]||{};
    const since=(d.price&&w.price)?((d.price-w.price)/w.price*100):null;
    const c1=getColorClass(d.dailyPct);
    const c2=getColorClass(since);
    const nowPrice=d.price?d.price.toFixed(2):'--';

    /* 价格追踪块 */
    const sinceClass=since==null?'flat':since>0.001?'up':'down';
    const priceBadge=`<div class="price-track">
      <div class="price-item"><span class="price-lbl">记录价</span><span class="price-val">${w.price.toFixed(2)}</span></div>
      <span class="price-arrow">→</span>
      <div class="price-item"><span class="price-lbl">现价</span><span class="price-val">${nowPrice}</span></div>
      <div class="price-since ${sinceClass}">${fmt(since)}</div>
    </div>`;

    html+=`<div class="share-item" onclick="toggleShareDetail('sd-${w._i}')">
      <div class="share-row">
        <div class="share-flag">${w.flag}</div>
        <div class="share-ticker">${w.ticker}</div>
        <div class="share-name">${w.name}</div>
        <div class="share-day ${c1}">${fmt(d.dailyPct)}</div>
        <div class="share-since ${c2}">${fmt(since)}</div>
      </div>
      <div class="share-detail" id="sd-${w._i}">
        <div class="detail-grid">
          <div class="detail-row sector-row"><span class="detail-label">行业</span>${w.sector}</div>
          <div class="detail-row info-row"><span class="detail-label">记录日期</span>${w.date}</div>
        </div>
        <div class="detail-row logic-row"><span class="detail-label">逻辑</span>${w.logic}</div>
        <div class="detail-row analysis-row"><span class="detail-label">分析</span>${w.analysis}</div>
        ${priceBadge}
      </div>
    </div>`;
  });
  container.innerHTML=html;
}

function toggleShareDetail(id){
  document.getElementById(id).classList.toggle('open');
}

async function loadPortfolio(key){
  const port=PORTFOLIOS[key],c=CACHE[key];
  if(!c.loaded)renderLoadingHoldings(key);
  try{
    const codes=port.holdings.map(h=>h.code);
    const rawMap=await qqJsonp(codes);
    port.holdings.forEach(h=>{
      const q=parseQuote(h.code,rawMap[h.code]);
      if(q){c.rt[h.code]=q;const base=YTD_BASE[h.code];if(base>0&&q.price>0)c.ytd[h.code]=((q.price-base)/base)*100;}
    });
  }catch(e){}
  renderHoldings(key,c.rt,c.ytd);
  renderSummary(key,c.rt,c.ytd);
  c.loaded=true;
}

async function loadShareRecords(){
  try{
    const codes=SHARE_RECORDS.map(w=>w.sym);
    const rawMap=await qqJsonp(codes);
    SHARE_RECORDS.forEach(w=>{
      const q=parseQuote(w.sym,rawMap[w.sym]);
      if(q)SHARE_CACHE[w.sym]=q;
    });
  }catch(e){}
  renderShareRecords();
}

function setStatus(s,m){
  const dot=document.getElementById('statusDot');
  const text=document.getElementById('statusText');
  dot.className='dot '+(s==='ok'?'':s==='loading'?'loading':'error');
  text.textContent=m;
}

async function refreshAll(){
  const btn=document.getElementById('btnRefresh');

  setStatus('loading',_first?'正在获取数据...':'刷新中...');
  try{
    await Promise.allSettled([...['us','hk','a'].map(k=>loadPortfolio(k)),loadShareRecords()]);

    const ms=((performance.now()-t0)/1000).toFixed(1);
    setStatus('ok',formatFullDate());
  }catch(e){setStatus('error','加载失败');}

}
