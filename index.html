<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>躺平组合 · 行情版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f7fa;--card:#fff;--border:#e4e7ec;--text-primary:#1d2129;--text-secondary:#4e5969;--brand:#0070e0;--up:#00b42a;--down:#f77272;--radius:16px;--shadow:0 2px 12px rgba(0,0,0,0.06);--font:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;--mono:'SF Mono',monospace}
body{font-family:var(--font);background:var(--bg);padding-bottom:40px}
.header{position:sticky;top:0;background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border)}
.header-inner{max-width:720px;margin:0 auto;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.title-group h1{font-size:19px}
.sub{font-size:12px;color:var(--text-secondary)}
#refreshBtn{padding:6px 12px;border-radius:12px;border:none;background:var(--brand);color:#fff;cursor:pointer}
.tabbar{max-width:720px;margin:0 auto;padding:8px 20px}
.tabs{display:flex;background:#f2f3f5;border-radius:12px;padding:2px;gap:2px}
.tab{flex:1;padding:8px;border-radius:10px;border:none;background:transparent;cursor:pointer}
.tab.active{background:var(--card);box-shadow:var(--shadow)}
.container{max-width:720px;margin:0 auto;padding:8px 20px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)}
.section.hidden{display:none}
.card-header{padding:16px;display:flex;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.card-left{display:flex;gap:8px;align-items:center}
.badge{padding:4px 8px;border-radius:8px;font-size:11px;font-weight:600}
.badge-us{background:rgba(0,112,224,0.1);color:var(--brand)}
.badge-hk{background:rgba(0,180,42,0.1);color:var(--up)}
.badge-cn{background:rgba(247,114,114,0.1);color:var(--down)}
.badge-watch{background:rgba(255,107,53,0.1);color:#ff6b35}
table{width:100%;border-collapse:collapse}
th,td{padding:12px 16px;text-align:right;border-bottom:0.5px solid var(--border)}
th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}
.code{font-family:var(--mono);font-weight:600;color:var(--brand)}
.name{font-size:12px;color:var(--text-secondary);margin-top:2px}
.pct{display:inline-block;min-width:72px;padding:4px 8px;border-radius:10px;font-family:var(--mono);font-weight:600}
.pct-up{color:var(--up);background:rgba(0,180,42,0.08)}
.pct-down{color:var(--down);background:rgba(247,114,114,0.08)}
.stat-up{color:var(--up)}.stat-down{color:var(--down)}
.add-form{padding:16px;background:#f2f3f5;display:flex;gap:8px}
.add-form input{flex:1;padding:10px;border:1px solid var(--border);border-radius:12px}
.add-form button{padding:8px 16px;background:var(--brand);color:#fff;border:none;border-radius:12px;cursor:pointer}
.delete-btn{padding:4px 12px;background:#f7f8fa;border-radius:8px;cursor:pointer}
.footer{max-width:720px;margin:0 auto;padding:12px 20px;text-align:center;font-size:11px;color:var(--text-secondary)}
</style>
</head>

<body>
<div class="header">
  <div class="header-inner">
    <div><h1>📈 躺平组合</h1><div class="sub">ETF 全天候跟踪</div></div>
    <div><span id="last-update">--:--:--</span> <button id="refreshBtn">刷新</button></div>
  </div>
  <div class="tabbar"><div class="tabs">
    <button class="tab active" data-target="all">全部</button>
    <button class="tab" data-target="us">🇺🇸 美股</button>
    <button class="tab" data-target="hk">🇭🇰 港股</button>
    <button class="tab" data-target="cn">🇨🇳 A股</button>
    <button class="tab" data-target="watchlist">⭐ 自选</button>
  </div></div>
</div>

<div class="container">
  <div class="card section" data-section="us"><div class="card-header"><div class="card-left"><div class="badge badge-us">US</div><div>美股组合</div></div><div><span class="stat-label">今日</span><span id="us-today">--</span> <span class="stat-label">今年</span><span id="us-ytd">--</span></div></div><div class="table-wrap"><table><thead><tr><th>仓位</th><th>标的</th><th>今日</th><th>今年</th></tr></thead><tbody id="us-tbody"></tbody></table></div></div>
  <div class="card section" data-section="hk"><div class="card-header"><div class="card-left"><div class="badge badge-hk">HK</div><div>港股组合</div></div><div><span class="stat-label">今日</span><span id="hk-today">--</span> <span class="stat-label">今年</span><span id="hk-ytd">--</span></div></div><div class="table-wrap"><table><thead><tr><th>仓位</th><th>标的</th><th>今日</th><th>今年</th></tr></thead><tbody id="hk-tbody"></tbody></table></div></div>
  <div class="card section" data-section="cn"><div class="card-header"><div class="card-left"><div class="badge badge-cn">CN</div><div>A股组合</div></div><div><span class="stat-label">今日</span><span id="cn-today">--</span> <span class="stat-label">今年</span><span id="cn-ytd">--</span></div></div><div class="table-wrap"><table><thead><tr><th>仓位</th><th>标的</th><th>今日</th><th>今年</th></tr></thead><tbody id="cn-tbody"></tbody></table></div></div>
  
  <div class="card section" data-section="watchlist"><div class="card-header"><div class="card-left"><div class="badge badge-watch">⭐</div><div>自选股</div></div><div>总数: <span id="watchlist-count">0</span></div></div><div class="add-form"><input type="text" id="stockCode" placeholder="代码: 300782 / 00700 / AAPL"><button id="addBtn">添加</button></div><div class="table-wrap"><table><thead><tr><th>代码</th><th>名称</th><th>最新价</th><th>今日</th><th>累计收益</th><th>自选时间</th><th></th></tr></thead><tbody id="watchlist-tbody"></tbody></table></div></div>
</div>
<div class="footer">数据：腾讯财经 · 每30秒刷新</div>

<script>
const PROXY = 'https://lieflat-proxy.jiawen96110.workers.dev';
const PORTFOLIOS = {
  us:[['25%','QQQ','纳指100'],['25%','SPY','标普500'],['20%','RING','黄金矿股'],['20%','COPX','铜矿'],['10%','BITB','比特币']],
  hk:[['25%','03455','纳指100'],['20%','03132','半导体'],['20%','03147','创业板'],['20%','03110','高股息'],['15%','02840','黄金']],
  cn:[['25%','513390','纳指100'],['25%','159652','有色50'],['25%','588200','科创芯片'],['15%','515880','通信'],['10%','518880','黄金']]
};

let watchlist = JSON.parse(localStorage.getItem('watchlist') || JSON.stringify([{
  id:Date.now(), code:'300782', market:'cn', name:'卓胜微', costPrice:0, addTime:'2026-03-26'
}]));

function getCode(code,market){
  if(market=='us') return `us${code}`;
  if(market=='hk') return `hk${code}`;
  return code.startsWith('6')?`sh${code}`:`sz${code}`;
}

async function fetchData(symbols){
  try{
    let res=await fetch(`${PROXY}?q=${symbols.join(',')}`);
    let text=await res.text();
    let data={};
    text.replace(/v_([^=]+)="([^"]+)"/g,(_,s,val)=>{
      let f=val.split('~');
      if(f[32]) data[s]={name:f[1],price:+f[3],change:+f[32],ytd:f[37]?+f[37]:null};
    });
    return data;
  }catch(e){return {}}
}

async function updatePortfolios(){
  let symbols=[];
  for(let m in PORTFOLIOS) PORTFOLIOS[m].forEach(p=>symbols.push(getCode(p[1],m)));
  let data=await fetchData(symbols);
  
  for(let m in PORTFOLIOS){
    let sumToday=0,sumYtd=0,html='';
    for(let p of PORTFOLIOS[m]){
      let d=data[getCode(p[1],m)]||{change:0,ytd:0};
      let w=parseFloat(p[0])/100;
      sumToday+=w*d.change;
      if(d.ytd) sumYtd+=w*d.ytd;
      let cls=d.change>0?'pct-up':d.change<0?'pct-down':'pct-flat';
      let sign=d.change>0?'+':'';
      html+=`<tr><td>${p[0]}</td><td><div class="code">${p[1]}</div><div class="name">${p[2]}</div></td><td><span class="pct ${cls}">${sign}${d.change.toFixed(2)}%</span></td><td>${d.ytd?d.ytd.toFixed(2)+'%':'--'}</td></tr>`;
    }
    document.getElementById(`${m}-tbody`).innerHTML=html;
    document.getElementById(`${m}-today`).innerHTML=`<span class="${sumToday>0?'stat-up':sumToday<0?'stat-down':''}">${sumToday>0?'+':''}${sumToday.toFixed(2)}%</span>`;
    document.getElementById(`${m}-ytd`).innerHTML=sumYtd.toFixed(2)+'%';
  }
}

async function renderWatchlist(){
  if(!watchlist.length) return document.getElementById('watchlist-tbody').innerHTML='<tr><td colspan="7" style="text-align:center">暂无自选</td></tr>';
  let symbols=watchlist.map(s=>getCode(s.code,s.market));
  let data=await fetchData(symbols);
  let html='';
  for(let s of watchlist){
    let d=data[getCode(s.code,s.market)];
    if(d&&s.costPrice===0) s.costPrice=d.price*0.95;
    let profit=d&&s.costPrice?((d.price-s.costPrice)/s.costPrice*100):0;
    html+=`<tr><td>${s.code}</td><td>${d?.name||s.name}</td><td>${d?.price.toFixed(2)||'--'}</td><td class="${d?.change>0?'stat-up':d?.change<0?'stat-down':''}">${d?`${d.change>0?'+':''}${d.change.toFixed(2)}%`:'--'}</td><td class="${profit>0?'stat-up':profit<0?'stat-down':''}">${profit?`${profit>0?'+':''}${profit.toFixed(2)}%`:'--'}</td><td class="watch-time">${s.addTime}</td><td><button class="delete-btn" onclick="deleteStock(${s.id})">删</button></td></tr>`;
  }
  document.getElementById('watchlist-tbody').innerHTML=html;
  document.getElementById('watchlist-count').innerHTML=watchlist.length;
}

window.deleteStock=function(id){
  watchlist=watchlist.filter(s=>s.id!=id);
  localStorage.setItem('watchlist',JSON.stringify(watchlist));
  renderWatchlist();
};

document.getElementById('addBtn').onclick=async()=>{
  let code=document.getElementById('stockCode').value.trim().toUpperCase();
  if(!code) return alert('输入代码');
  let market= /^\d{5}$/.test(code)?'hk':/^\d{6}$/.test(code)?'cn':/^[A-Z]+$/.test(code)?'us':null;
  if(!market) return alert('格式错误');
  if(watchlist.some(s=>s.code==code)) return alert('已存在');
  let d=await fetchData([getCode(code,market)]);
  let stockData=d[getCode(code,market)];
  if(!stockData) return alert('获取失败');
  watchlist.unshift({id:Date.now(),code,market,name:stockData.name,costPrice:stockData.price,addTime:new Date().toLocaleString()});
  localStorage.setItem('watchlist',JSON.stringify(watchlist));
  renderWatchlist();
  document.getElementById('stockCode').value='';
};

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.toggle('hidden',t.dataset.target!=='all'&&s.dataset.section!==t.dataset.target));
});

let timer;
async function refresh(){ await updatePortfolios(); await renderWatchlist(); document.getElementById('last-update').innerText=new Date().toTimeString().slice(0,8); }
document.getElementById('refreshBtn').onclick=()=>{refresh();clearInterval(timer);timer=setInterval(refresh,30000);};
refresh(); timer=setInterval(refresh,30000);
setInterval(()=>document.getElementById('last-update').innerText=new Date().toTimeString().slice(0,8),1000);
</script>
</body>
</html>
