name: Update Portfolio History

on:
  schedule:
    # A/H markets after close and US market after close (UTC).
    - cron: '0 9,22 * * 1-5'
  workflow_dispatch:

concurrency:
  group: portfolio-history
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build split-adjusted history
        run: python3 fetch_portfolio_history.py

      - name: Validate generated data
        run: |
          node --check portfolio_config.js
          node --check portfolio_history.js

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio_history.js
          git diff --staged --quiet || git commit -m "chore: update portfolio history $(date -u +'%Y-%m-%d')"
          git push
