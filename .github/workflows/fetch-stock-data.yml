name: Fetch Stock Data

on:
  schedule:
    - cron: '*/30 * * * *'   # 每30分钟自动运行
  workflow_dispatch:           # 允许手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Tencent Finance Data
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import re
          import datetime

          SYMBOLS = [
              'usQQQ','usSPY','usRING','usCOPX','usBITB',
              'hk03455','hk03132','hk03147','hk03110','hk02840',
              'sh513390','sz159652','sh588200','sh515880','sh518880',
              'sz300782',
          ]

          SYM_MAP = {
              'usQQQ':'us_QQQ','usSPY':'us_SPY','usRING':'us_RING',
              'usCOPX':'us_COPX','usBITB':'us_BITB',
              'hk03455':'hk_03455','hk03132':'hk_03132','hk03147':'hk_03147',
              'hk03110':'hk_03110','hk02840':'hk_02840',
              'sh513390':'cn_513390','sz159652':'cn_159652','sh588200':'cn_588200',
              'sh515880':'cn_515880','sh518880':'cn_518880',
              'sz300782':'watch_300782',
          }

          url = "https://qt.gtimg.cn/q=" + ",".join(SYMBOLS)
          headers = {
              'Referer': 'https://finance.qq.com',
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }

          result = {"updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"), "data": {}}

          try:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=15) as resp:
                  raw = resp.read().decode('gbk', errors='replace')

              for m in re.finditer(r'v_(\w+)="([^"]+)"', raw):
                  sym = m.group(1)
                  fields = m.group(2).split('~')
                  key = SYM_MAP.get(sym)
                  if key and len(fields) > 32:
                      try:
                          today = float(fields[32])
                          price = float(fields[3])
                          result["data"][key] = {"today": round(today, 4), "price": round(price, 4)}
                      except Exception:
                          pass

              print(f"Fetched {len(result['data'])} symbols")

          except Exception as e:
              print(f"Fetch error: {e}")
              # 保留上次数据，不覆盖
              import os, sys
              if os.path.exists("data.json"):
                  print("Keeping existing data.json")
                  sys.exit(0)

          with open("data.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print("data.json written successfully")
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update stock data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
